body:
  text: 卷二雜症頭疾頭痛蓖麻子一粒搗碎同棗肉些須搗勻丸如黃豆大用絲綿裹之納鼻孔內少頃必有清涕流出即將丸取出痛即愈永不再發倘不急將丸取出久留鼻內必致腦髓流出反成不可藥救之症切記切記岐天師別傳一方用藁本牙皂各一個共為末絹卷燒煙附鼻孔聞之效壽域神方頭痛不止楊梅為末以少許㗜鼻取嚏妙本草綱目頭痛不可忍鮮蘿蔔自然汁加龍腦薄荷少許滴入鼻中如左痛滴右鼻右痛滴左鼻左右皆痛兩鼻並滴立效秘方集驗偏正頭痛紫荊皮五兩炒獨活三兩去節炒赤芍炒白芷菖蒲各二兩蔥頭煎濃湯調敷藥到立止如神赤水亢珠一方用蓖麻子一兩去皮研爛貼痛處單方全集氣鬱偏頭痛蓖麻同乳香食鹽搗貼太陽穴立止證治匯補熱鬱腦中頭痛硝石為末吹入鼻中即止同上頭腦疼痛片腦一錢紙卷作捻燒煙燻鼻吐出痰涎即愈普濟方太陽痛生薑三片皮紙包水濕入火灰煨熟以兩片貼太陽一片貼印堂中以帶縛之立愈經驗秘方頭風腦寒細辛三莖瓜蒂七枚丁香三粒糯米七粒腦子麝香各豆大一粒共為末隨左右頭風搐鼻內良久出涎升許即愈李惺庵方證治準繩醫書多分頭痛頭風為二門然一病也淺而近者名頭痛深而遠者名頭風當驗其邪所從來而治之偏正頭風蓖麻子乳香各等分研塗患處立愈硤川沈氏方半邊頭風魕饅頭七八個敲碎煎湯入小瓷瓶內以瓶口對患處熏兩三次至頭上有汗出不痛方住月譚朱氏方八般頭風半夏末入百草霜少許作紙捻燒煙就鼻內㗜之口中含水有涎吐出再含三次見效衛生寶鑑熏頭風天南星一個艾五錢熏之錢青埨方頭風痛久而牽引眉目漸至失明者川烏去皮細辛防風蠍梢各等分研細生薑汁調貼患處若眉目牽引不正貼太陽穴上方鈔頭風白屑楮木作枕六十日一易新者外臺秘要癩頭蝸牛三十條水三碗煎洗之二次必愈張仲景外函禿頭鴿糞火焙硫黃明礬銀硃陀僧各五錢入鹽三分共為細末先以米泔水洗後以藥敷傳家寶臘梨白禿者灰窯內燒過紅土墼四兩百草霜雄黃各一兩膽礬六錢榆皮三錢輕粉一錢共為末豬膽汁調剃頭後擦之百發百中其效如神陸氏積德堂方腦漏真艾一兩辛夷二錢羌活獨活防風藁本細辛各五分共為末摻艾內卷作條點火熏鼻即愈醫方摘要腦漏鼻涕臭石首燒灰為末吹入鼻內即愈同壽菉一方用藿香末吹鼻妙簡易良方面疾少年面皰紫背浮萍四兩漢防己一兩煎濃汁洗之仍用萍在斑䵟上熱擦日三五次物雖微末其功甚大不可小看普濟方面上皴路大豬蹄四枚洗淨煮如膠及臥時用塗面上次早以漿水洗之半月後麵皮細急如童子袖珍方面上酒刺菟絲子煎水洗之即愈馮氏錦囊面上粉刺益母草燒灰肥皂各一兩共搗為丸日洗三次十日後粉刺自然不生須忌酒姜恐其再發集簡方面上紫塊狀如錢大或滿面俱有用穿山甲十片燒存性野大黃生薑各四兩取汁川椒末五錢共和研生絹包擦如干醋潤濕數次如初屢效陸氏積德堂方面上黑氣半夏焙研米醋調敷不可見風不計遍數從早至晚如此三日皂角湯洗下面瑩如玉也摘玄方黑粗醜黑豬胰五具蕪菁子二兩土瓜根杏仁各一兩醇酒浸之夜塗旦洗老者少少者白神驗肘後方面上忽生紅黑丹如疥狀不急治至遍身必死將鹿角燒為末以豬油調揸單方全集面上黑斑白附子白芨白蘞白茯苓密陀僧定粉各等分共為末及睡時將面洗淨用漿水以藥塗之次早洗去如此數次以黑斑除去為止傳家寶面上黑䵟雀斑黑牽牛白殭蠶各二兩細辛一兩合研細末煉蜜為丸如彈子大日洗數次一月之後其斑自去矣同上面上有靨痕並一切瘢跡屎白二錢以人津和勻蜜少許塗面三四日即光同上面生白駁面上生了白駁似癬非癬皮漸生白無藥可治只用鰻鱺魚脂火炙出一兩先拭駁上刮令燥痛後以油塗上不過三次即愈同上酒糟臉天冬川椒白芷苦杏仁去皮硫黃各一錢共研細末用桕油和丸臨臥時擦面上忌房事百日愈集驗方抓破面皮生薑自然汁調輕粉末敷之無疤奇方類編兩腮紅腫白花百合一斤山芝麻根去皮貝母玄明粉各一錢銀硃七分加白麵調敷即愈同上一方用赤小豆末敷之立效同上痄腮青靛花敷之立愈同上大笑脫腮烏梅搗碎為餅塞滿牙盡頭處張口流涎隨手掇上傳信方眼疾七十二種眼疾羊膽一枚割開入蜂蜜一錢線扎兩手揉勻白水煮一滾即取出涼水浸半日去生水傾出內汁點之秘方集驗風熱眼作痛作癢及風淚眼赤眼時眼皮硝六錢新汲水一鍾煎七分入瓷器內候冷定洗眼每日洗三五次微開眼冷水入眼內用中指擦五遍如癢甚加明礬一二錢泡洗尤妙同壽菉時火眼青魚膽八片腦點之醫鏡風火眼防風荊芥赤芍川連各二分歸尾膽礬銅青各一分杏仁十四粒去皮尖絹包煎洗之種福堂方暴發腫痛將青布一塊水浸洗令乾另用生薑汁白礬末將布蘸搽眼胞上閉目少頃淚出痛止乾坤生意清涼膏治暴赤痛芙蓉葉末水和貼太陽穴鴻飛集一方用黃連冬青葉煎湯洗之海上方眼赤癢痛黑棗二枚去核納入白礬一塊用竹箸夾住在油燈下燒之下承涼水一杯棗焦礬沸滴入水杯俟滴完連棗放酒杯內露一宿次日將杯放開水內頓溫頻洗自愈沈心齋驗方眼赤生翳枸杞子搗汁日點三五次神效肘後方眼眶赤爛不拘風火皆治銅青五分枯礬三分為末水一鍾飯鍋上燉熟用竹紙蓋上熏起清水洗愈程氏續即得方一方用杏仁三粒去皮尖膽礬三釐為細末滾水泡鍾內用竹紙蓋上取面上水洗抹即日見效王氏傳方爛眼皮及捲毛倒睫用青鹽火煅以碗合地上出火氣研細每用五分熱湯半盞泡溫洗曹氏經驗方紅腫患眼紅腫痛甚一團肝火積聚惟用旋下熱童便以碗盛貯乘熱開著眼睛淋洗彼時雖覺少有折痛卻愈得快速重者洗二三次自愈或用自己小便亦可但不可用食蔥蒜韭薤並飲燒酒黃赤之便傳家寶砂物入眼凡遇飛砂吹灰小蟲等物入眼痛甚難開只用淨水一碗以竹管插入水碗內口吹不住其砂物自去或令明眼人將眼捺開用綿帕照砂物抹去同上石灰擦瞎山梔子煎膿汁不住手洗一二時辰痛即止奇方彙纂迎風流淚並眼目昏花霜後桑葉煎水頻洗神效奇方類編冷淚目昏用乾薑肥者為末每用一匙沸湯點洗或用貝母一枚膩白者胡椒七粒為末點之經驗單方眼昏浮翳蕤仁二兩去油入硼砂一錢麝香二分研勻點之去翳絕妙同上眼花生翳用刀刮指甲細屑和乳汁點翳上即退同上眼翳膜年久不散每日三次以舌舐其膜漸漸下緣人真氣使然同上老眼昏花並去翳障硼砂二錢荸薺粉四錢川黃連一錢薑製加冰片一分麝香二分共研極細末收入瓷瓶內勿令泄氣用清水黏藥戥秤杪點或燈草點更好不傷眼睛如時眼火眼先服發散藥一二劑然然點之存仁堂秘菉眼內起星久而不去白蒺藜二錢水煎洗之日三次三日即愈生生編眼中胬肉赤筋及瞳人障蔽雀糞名白丁香不拘多少以初胎男子之乳調點即愈點少許不可多日用本草胬肉侵睛用臘月雄豬膽入馬牙硝於內將風吹乾為末入腦麝點之證治匯補損目破睛用牛口涎每日點兩次須要避風黑睛破者亦瘥葉天士方眼睛突出一二寸者以新汲水灌漬眼中數易之自入梅師方眼生偷針凡眼內眥頭忽結成疱三五日便生膿汁俗呼為偷針此由熱氣客於眥間搏激津液所成視其背上即有細紅瘡點以針頭破之即瘥乃解太陽經之客邪也醫統眼生珠管鉛丹五錢鯉魚膽汁和如膏日點三五次聖惠方一方用牛膝並葉搗汁日點三四次同上青盲雄鼠膽鼠膽最小略一驚惶便碎矣鯉魚膽各二枚和勻滴之立效同上一方用豬膽五枚取汁於銅器中慢火煎令可丸如黍米大納眼中外臺秘要耳疾耳痛用蛇蛻燒灰存性為末吹入以治風盛用枯礬末吹入治風濕或青箬燒灰吹之亦效簡便良方一方用白鹽炒熱重綿包熨備急方耳內腫痛流膿番木鱉一個磨水滴耳內即愈秘方撮要耳爛頂好安息香灰吹之先用棉花捲出耳中毒水俟毒水淨盡然後吹三四次愈錢氏驗方耳衄少陽經火龍骨末吹入效證治匯補耳痹龍骨麝香輕粉枯礬各等分為末吹入耳即愈方鈔耳閉細辛石菖蒲木通各一分麝香一釐共為末綿裹塞耳即愈奇方類編耳常嗚生地黃切斷紙包火煨塞耳數易之同上耳虛嗚巴豆菖蒲同研松脂黃占和條納耳中抽之神效本草綱目一方用麝少許全蠍十四個薄荷十四葉裹麝蠍瓦上焙乾共研末滴水捏作錠子塞耳內極效圖經耳聾上好新鐵片三塊咬口內用好磁石塞兩耳靜坐其耳忽鳴而通有頃刻通者有坐數日通者秘方集驗一方用真北細辛研末熔黃蠟為丸如鼠糞大綿裹塞耳內二三次即效種福堂方耳久聾斑蝥三枚炒巴豆二兩去心皮入麝香少許丸如棗核大綿裹塞耳中以微響黃水出為度證治匯補耵耳人耳間有津液輕則不能為害若風熱搏之津液結塞成核能令暴聾為之耵耳用生豬油地龍釜墨各等分研細末以蔥汁和捏如棗核薄綿裹入耳令潤則挑出同上膿耳熱氣乘虛隨脈入耳聚熱不散膿汁時出為之膿耳用輕粉明礬黃丹龍骨麝香蚌粉為末綿纏竹拭耳或用白礬胭脂麝香為末吹之同上底耳冬青樹葉搗汁傾入耳內隨傾隨令自流數次可愈矣夏氏刊方一方用枯礬為末填耳立效同壽菉停耳由氣鬱生痰內火攻衝形似赤肉或兼膿汁潰爛用韭菜搗汁日滴三次繩墨一方將耳內膿水用棉花絞乾生熟明礬各半研為細末吹少許入耳內數次即愈集效方扯落耳熱馬屎封之如無熱者炒熱封之裹定勿動即生合倘馬屎無覓牛屎亦效存仁堂秘菉鼻病赤鼻乃陽明胃火上炎用食鹽研細每晨撮少許擦齒噙水蕩漱旋吐掌中掬以洗面行之月餘鼻色復舊且有益於齒蘇譚紅鼻酒糟鼻硫黃四兩燒酒三斤煮逐漸添入待乾將口涎在手心化開搽鼻上四五次即愈錄竹堂方酒豉鼻及婦人鼻生黑粉刺硫黃五錢杏仁二錢半各研為末以酒麴藥調勻夜搽日洗漸效同上鼻塞蓖麻子三百粒大棗一斤搗勻綿裹塞日易之一月全愈聖濟方鼻腫乃肺經火盛也用皂角末吹入打清嚏數十即愈蓋鼻因氣壅令打嚏則壅塞之氣盡開散故不必清肺而腫自消矣岐天師別傳鼻懸白鯗骨入鍋內炒聞香而愈右經堂方鼻痔瓜蒂炒甘遂炒各四錢枯礬五分松香五分為衣香油調硬些每用一丸入鼻內點痔化為臭水一日一次自爛下集驗方一方用硼砂一錢輕粉雄黃各三分冰片五釐共為末日點五六次漸化為水而愈青囊萬選鼻疔荔枝肉爛黃雞糞同打爛塗上即愈種福堂方鼻疳爛通其孔者鹿角剉碎焙焦白礬煅過各一兩頭髮燈上燒過五錢共研為末先用椒水洗淨疳孔然後搽之如不收口可用瓦松燒存性為末搽之奇方類編鼻瘡杏仁去皮尖研如膏以人乳調塗之同上鼻中肉墜用藕節有毛處一節燒存性為末吹患處同上鼻中瘜肉狗頭骨燒灰加硇砂少許為末吹入鼻中瘜肉自化匯補一方用蝴蝶一味不拘多寡煅綿裹一字納入鼻中明醫指掌鼻臭瘜肉杏仁去皮輕粉各一錢雄黃五分麝香少許共研細末臨臥時以箸點一米許於內同上食物入鼻介介作痛不出用牛脂一棗大納鼻中吸入脂消則物隨出也外臺秘要口病香口闢臭明礬入麝香為末擦牙上生生編口臭用香茹含之證治要訣口破滑石一錢辰砂三錢冰片二分研末摻患處兼治牙疳鵝口俱禁水漱集驗方口爛鳳尾草井內所生青苔草瓦上焙乾加冰片少許共研細末先用甘草湯洗過後摻之三日即愈王氏效方口疳縮砂殼煅研擦之即愈活幼新書一方用雞肫黃皮燒灰敷亦立效同上口內走馬各樣疳瘡取多年田野中白螺螄殼再加孩兒茶少許共為末吹患處數次即愈同壽菉口瘡破爛腫痛連喉百法治之不效者取蘿蔔自然汁頻頻漱吐自愈或用吳茱萸為末醋調塗足心同上一方用五倍子末摻之吐涎便能飲食同上唇病繭唇唇中腫起白皮皺裂名日繭唇宜以五倍子蜜陀僧甘草各二錢共為末再用黃柏皮二兩將三味末塗柏上炙乾刮片貼唇上明醫指掌唇吻燥痛橄欖仁研爛敷之開寶本草唇燥緊裂豬胰浸酒搽之或用橄欖不拘多少燒灰豬脂和塗患處摘玄方唇口緊小不能開合不能飲食不治即死用白布作燈炷如指大安斧上燃燒令刀上汗出拭取敷唇上日二三度或用舊青布燒灰和豬脂調敷同壽菉一方用馬齒莧煮汁洗之同上冬月唇乾血出桃仁搗爛豬油調塗集驗方唇裂生瘡瓦松生薑搗和入鹽少許塗之百一方舌病舌卒腫大狀如豬脬塞口殺人用釜底煤和酒塗之梅師方一方用朴硝白礬為末搽舌上立消濟生方舌腫滿口不能出聲用蒲黃末摻之即效若舌腫出外或以冰片少許抹上或以蓖麻油蘸紙作捻燒煙燻之隨即消縮種福堂方舌腫閉塞咽喉即時氣絕至危之症用皂礬不拘多少以新瓦火煅變色紅放地上令冷研細將病人用鐵鉗拗開牙關以藥搽其舌即活奇方類編舌腫不消以米醋和釜底墨厚敷舌之上下脫則更敷須臾即消千金方木舌腫滿塞口殺人赤芍藥甘草煎水熱漱聖濟總菉一方用蒲黃乾薑末各等分干搽愈芝隱方重舌灶中心對鍋底土酒調塗舌上用黃丹如豆大安舌下聖惠方熱症多舌出有病愈而舌不入者冰片一分研抹舌上即收醫宗說約一方用大麻子為末入紙條內燒煙燻之鼻孔有涎流出即收乾坤秘韞舌爛臭穢不可近銅綠白芷各一兩共為末摻舌上溫醋漱之集簡方舌上生胎諸病舌胎以布染井水抹後用薑片時時擦之自去陶華方牙齒牢牙固齒凡人一生全賴牙齒飲食滋養須於少壯解小便時咬牙閉口每早叩齒幾遍至老不落傳家寶牙齒搖動欲落生地當歸各等分同煎濃汁漱之其齒自牢醫鏡牙齒痛不可忍取落不必用手川椒細辛各一兩草烏蓽茇各五錢研為末每用少許揩在患處內外不過三四次自落同上風牙痛生絲瓜一條擦鹽火燒存性研末頻擦涎盡即愈腮腫以水調貼之嚴月軒方寒牙痛用胡椒蓽茇為君細辛石膏為佐研末擦之或用橄欖細嚼即愈證治匯補蟲牙痛礦灰不拘多少為末砂糖和丸如米粒大塞蛀孔中其效如神明醫指掌風寒蟲牙痛白芷北細辛各五分肉桂麻黃草烏各三分真蟾酥一分五釐共為細末麵糊丸如桐子大每用一丸咬痛牙下即愈談野翁方一方用防風荊芥芫花蜂房各一錢細辛三分川椒十粒食鹽少許水醋各半煎漱口立愈用藥法象牙痰火硝一錢冰片明雄黃各一分玄明粉五分共為細末擦患處立愈種德堂方胃火牙痛好軟石膏一兩火煅淡酒淬過為末入防風荊芥細辛白芷各五分為末日用揩牙甚效保壽堂方牙蝕透骨穿腮生南星一個剜空入雄黃一塊麵裹燒候雄黃作汁以杯合定出火毒去面為末入麝香少許拂瘡數日甚效經驗單方擦牙散杏仁不拘多少用針刺向燈火上燒黑存性研細末搽擦患處錄竹堂方一方用川大黃煅成灰研細末早晚擦之永不牙疼簡便方咽喉咽喉卒腫食飲不通米醋和黃柏末敷之冷即易肘後方咽喉腫痛牙皂去皮米醋浸炙七次勿令大焦為末每吹少許入咽吐涎即止聖濟總菉一方用山豆根三錢醋磨汁含之追涎即愈斗門方咽喉腫爛硼砂玄明粉殭蠶各一錢冰片一分共研細末以紙管吹五六分入喉立愈若時邪傳染者再加雄黃三分硃砂五分無不效驗青浦李氏刊方喉腫閉塞勺水不能下附子一個破故紙五錢共研末調如糊作膏布攤如膏藥大如茶鍾貼腳心中央以火烘之一時辰喉即寬而開一線路可以服藥雷公活人菉急救喉風壁蟢窠數個瓦上焙乾研細吹之血散痰消立愈傳家寶纏喉風纏喉風者熱結於喉腫繞於外且麻且癢也用牽牛鼻繩燒灰吹之甚效李時珍方一方用淡白梅一個去核將蜒蚰一條嵌在梅內含之即瘥集效方纏喉風雙乳蛾絕妙立驗方用榆樹上出過蛓毛窠一個剪病人指甲腳爪如左邊乳蛾剪其左手左腳甲右邊乳蛾剪其右邊手甲足甲若雙乳蛾左右皆剪用食鹽少許同入窠內煅過為末吹入患處以手指拍其後項視其所患在左拍左在右拍右兩邊皆患兩邊皆拍即時破潰痰血並出王肯堂方通關散治乳蛾並喉內一切熱毒膽礬二錢硼砂一錢共為末入青魚膽內陰乾研極細加山豆根一錢瓷器收貯吹患處流涎即愈奇方類編乳蛾喉痹烏龍尾梁上倒掛塵也枯礬豬牙皂莢以鹽炒黃各等分為末或吹或點皆妙瀕湖方走馬喉痹以鵝翎蘸燈窩油掃之取吐則效蘇沈良方喉癬喉風黃柏末百草霜各五分雄鵝膽二個青魚膽枯礬收五個蛓毛窠內有蟲者燒存性一兩共為細末吹之傳心菉咽喉諸藥不效丹溪云此非喉症乃是鼻中生一條紅線如發懸一黑泡大如櫻珠垂掛到咽門而止口中飲食不入用土牛膝根獨條肥大者搗碎入好醋三五滴同打細滴入鼻中二三點即系斷珠破吐出瘀血立安赤水玄珠熏鼻法咽喉閉結湯藥不通有形之物已難下咽必取無形之氣從鼻而入用巴豆壓油紙上取油紙捻成條子點燈吹滅以煙燻鼻使口鼻流涎牙關自開類案刺喉法乳蛾諸症在關上者必有血泡用喉針或筆管點破即寬在關下不見者難治用蘆管削尖令病人含水一口從鼻孔放管進擊一下出血甚妙匯補刺少商穴及探吐法喉症殺人最速救治者急將病人兩臂緊捋數十捋使血聚大指上用油頭繩扎住指根針刺少商穴在手大拇指甲外離甲一分許出血如放痧一般兩手皆然其甚者十指俱刺之一面以鵝毛蘸桐油或燈盞油探喉中引其吐去痰涎即咽生蘿蔔汁其喉自寬或用礬湯探吐亦佳經驗乩方附分別治法初起便覺怕冷畏風頭痛身熱者此有表邪礬湯酸澀不可服尤大忌梅子誤服酸斂便難挽回如無表邪方可服蜒蚰梅子然不若一起便咽生蘿蔔汁為妙再遇喉痹早晚嚼生蘿蔔數片可免此患同上鬚髮染黑鬚發樺皮一片包側柏一枝燒煙薰香油碗內成煤以手抹須鬢上多能鄙事烏須用好墨一塊填在鳳仙花粗梗內外用麻紮緊俟霜後取出磨墨拔白點之自黑奇方類編一方用古墨母丁香各等分好醋和成錠子以薑汁少許用新筆拔去白者點之即黑同上附拔白日期正月甲子日二月初八日三月十三日四月十六日五月二十五日六月十四十九日七月二十八日八月十九日九月十六日十月初十十三日十一月初十十二日十二月初七日閏月照上月姚司空刊方發黃蓖麻子仁香油煎焦去渣三日後頻刷之摘玄方發內生蝨水銀和棗肉研爛塗氈帽上帶一夕盡死簡易良方發槁不澤木瓜浸油梳頭或桑根白皮柏葉各一斤煎汁沐之則光潤有色聖惠方發不生側柏葉陰乾作末和麻油塗之梅師方發不長亂髮洗淨曬乾以油煎焦於缽內細研為膏搽之易長多能集女子少年鬢髮黃白青石榴一隻黑豆一升捶碎好醋至升同煮豆爛去豆不用再煎至升收貯每早敷發李仙姑方婦人發少能多側柏葉不拘多少陰乾為末加油塗之其發驟生少年更效同壽菉一方用羊屎納鯽魚肚中瓦缶固濟燒灰和香油塗之不幾日發生且光黑可愛傳家寶婦人發短能長東行棗根三尺橫行甑上蒸之兩頭汁出用敷發上同上婦人梳頭不落髮側柏葉二片如手指大胡桃肉榧子肉各二個共研細擦頭皮或浸水掠頭亦可同上手足諸病兩手不能下凡人有伸欠而兩手不能下者將人抱住縛在柱上又把木棒打去病人自然把手來遮隔而兩手自下矣亦有婦人而得此症者縛在柱上令一人解其下衣而彼怕羞自然以兩手來遮隔亦一時手下石室秘菉手足疼痛用一人抱住身子以兩人兩腿夾住左右各足一條輕輕捶之千數覺兩足少快然後以手執其三里之間少為伸之者七次放足執其兩手捻之者千下而治已左右手各如是一日之間而手足之疼痛可已同上手足腫痛傷寒時氣毒攻手足腫痛欲斷牛肉裹之腫消痛止範汪方手足心腫乃風也椒鹽末等分醋和敷之良肘後方手足發疣以白梁米粉鐵鐺炒末研末以眾人唾和敷厚一寸即消同上手足疣目蒴藿子揉爛塗目上聖惠方手足偏風蒴藿葉火燎厚鋪床上趁熱眠於上冷復易之冬月取根春碎熬熱用外臺秘要手足痛風冷痛如虎咬者用樟木屑一斗急流水一石煎極滾泡之乘熱安足於桶上熏之以草荐圍住勿令湯氣入口其功甚捷此家傳經驗方也醫學正傳手足風痹黃蜂窠大者一個小者三四個燒灰獨囊蒜一碗百草霜一錢五分同搗敷上一時取下埋在陰處忌生冷葷腥乾坤秘韞風痹暖手鐵砂四兩硇砂三錢黑腳白礬六錢研末以熱醋或水拌濕汕紙裹置袋內任意執之冷再拌聖濟菉手足瘑瘡舊履系燒灰敷之千金翼纏足生瘡荊芥燒灰蔥汁調敷先以甘草湯洗之摘玄方足趾雞眼作痛作瘡地骨皮同紅花研細敷之次日即愈閨閣事宜足躄筋急桂末白酒和塗之一日一上甲乙經足上轉筋以故綿浸醋中甑蒸熱裹之冷即易勿停取瘥止圖經遠行足趼成泡者水調生面塗之一夜即平海上方病後足腫但節飲食以養胃氣外用狗脊煎湯漬洗蘊要夏月趾腫不能行走者九月收茄根懸檐下逐日煎湯洗之簡便方嵌甲胡桃皮燒灰貼醫林集要手足甲疽熏黃蛇皮少許為末用泔水洗淨割去甲入肉處敷之一頃痛足神效便民圖纂手足為風濕所傷兼有腳氣用晚蠶砂以米醋拌炒令熱以綿絮包熨之存仁堂秘菉腳冷不隨不能行者用醇酒三斗水一斗入甕中灰火溫之漬腳至膝常著灰火勿令冷三日止千金方腳縫出水好黃丹入花蕊石末摻之談野翁誠效方腳趾爛用蚌蛤粉乾擦之壽域神方腳丫爛滑石一兩石膏五錢鍛枯白礬少許研摻之李時珍方一方用茶葉嚼爛敷之有效攝生方腳疰枯礬黃柏為末摻之方鈔腳堿蔥根荸薺搗汁一碗煎再取松香四兩麻油再煎滴水成珠方入煎汁攤膏藥貼即落單方秘菉一方用荸薺半個貼患處過夜次晚再貼五六夜其堿連根脫出十便良方心腹疼痛九種心痛用真蘄艾灸大拇足趾甲男左女右三壯立效病機沙篆中惡心痛殺白烏骨雞拍心即瘥廣利方心痛點眼法透明雄黃火硝各等分加麝香少許共為末新汲水調點眼內眥精明穴男左女右扶行數步立愈但痛止切不可即飲食食必復痛乾坤生意火龍丹治心痛腹疝絞腸痧雄黃焰硝各等分淨為極細末每用些少點小眼角易安方一方用大蒜搗爛塗足心即愈千金方腹急痛一切男婦腹痛緊急不知何病只用鹽微炒或布或絹包熨痛處立止傳家寶回陽丹治陰毒厥冷腹痛牡蠣燒不灰木燒良薑炒川烏泡白芍藥各一錢麝少許每用一錢男用女津調塗外腎女用男津調塗兩乳明醫指掌腹痛危篤黑鹽四兩炒極熱以絹包鹽置臍上用錫壺注滾水於包上熨之即愈經驗良方腹痛效方紅棗二個巴豆三粒同搗爛裹縛臍上立止文竹山堂方腰腳軟痛腰腳軟二蠶砂炒熱熨之保命集腰腳痛天麻半夏細辛各二兩絹袋二個各盛藥令勻蒸熱交互熨痛處汗出則愈數日再熨簡易方腰腳冷痛烏頭三個去皮臍研末醋調貼須臾痛止十便良方卒然腰痛黑豆六升水拌濕炒熱布裹熨之冷即易延年秘菉虛寒腰痛烏頭附子尖天南星各二錢五分雄黃樟腦丁香各一錢五分硃砂乾薑各一錢麝香五釐共為末薑汁調烘熱摩腹上指掌腳弱病用杉木桶濯足排樟腦於兩股間以布縛定月餘甚效續博物志腳筋攣痛用木瓜數枚以酒水各半煮爛搗膏乘熱貼於痛處以帛裹之冷即易日三五度食療本草腳心腫痛因久行久立致者以水和地龍糞厚敷一夕愈永類鈐方女人束腳止痛用蕎麥稈煮濃湯加枯礬少許浸足幾次束縛可即止痛多能集虛汗自汗盜汗隨時出汗為自汗屬陽虛睡中出汗為盜汗屬陰虛用五倍子研末津調填臍中縛定一夜即止也集靈一方用麻黃根蛤粉粟米各等分為末袋盛撲之佳本草從新自汗不止何首烏末津調封臍中集簡方盜汗五倍子去蛀末炙乾研末男用女唾女用男唾調厚糊填臍中用膏藥貼之勿令泄氣兩次即愈種德堂方手汗黃耆葛根各一兩荊芥防風各二錢水煎湯一盆熱熏而溫洗三次即止石室秘菉腳汗白礬乾葛煎湯洗濟生編腳底多汗燒屍場上土鋪於鞋底內蹉之灰亦可集玄方塗乳止汗川鬱金研細末臨臥以津調塗乳上自止醫宗必讀癆病骨蒸發熱雄黃一兩末入小便一升研如粉乃取黃理石一枚方圓一尺者炭火燒之三食頃濃淋汁於石上置薄氈於上患人脫衣坐之衣被圍住勿令泄氣三五度瘥外臺秘要虛火背熱虛火上行背內熱如火炙者附子末津調塗湧泉穴摘玄方燒香治癆玄參一斤甘松六兩為末煉蜜一斤和勻入瓶中封閉地中埋罯十日取出更用灰木六兩煉蜜六兩同和入瓶更罯五日取出燒之常令聞香疾自愈頌曰初八瓶中封固煮一復時破瓶取搗入蜜別以瓶盛埋地中罯過用亦可薰衣經驗單方灸癆蟲法用癸亥日灸兩腰眼低陷中之穴每穴灸艾七炷十一炷尤妙先隔一日點穴方睡至半夜子時交癸亥日期便灸其蟲俱從大便中出即用火焚之並埋之深坑中證治匯補救癆怯妙法凡男女患一切癆怯者用上好箭頭砂一兩透明雄黃五錢共為細末單層綿紙包固選未曾行經十二三歲壯實童女將藥貼放童女臍內汗巾栓縛一周時取下秤藥比前重三錢余者更妙即刻拴於病人臍上須先備人乳十餘碗候病人口乾作燥與乳飲之渴止乳亦止然後解下臍上之藥其病自去再用補養調理十人九活傳家寶陰絕癆蟲傳染法從來癆病十無一痊總因肺有癆蟲醫藥莫加何能療愈要知病人將死之前蟲必飛出或轉投入諸竅內亦漸成癆不救此所謂傳屍癆也傳染多在親人或乘人昏忙時或乘人沉睡時蟲即入竅因此往往蔓延甚厲無法可治予得異人神法以免其蟲則傳染之患自除法於病人將終之前幾日用水龍骨數斤即船上舊油石灰箍桶艌船人家頗多在病床前常燒不絕病人即發譫語意若深怨此煙蓋蟲食人血漸成怪幻為煙搤所不得飛出借人言以為痛恨也病人既故仍燒不止其胸前明明高拱一塊即癆蟲閉死矣蟲既不得飛出則傳染之病遂絕此法經驗非常仍望知者遍傳令受害之家永脫此厄便是積德同上血症吐血採石榴花風乾作末吹鼻中立瘥千葉者尤佳吳瑞本草衄血不止薄荷汁滴之或以乾者水煮綿裹塞鼻許學士本事方一方用新汲水隨左右洗足即止屢試有效葉氏摘玄方一方用冷水浸紙貼囟上以熨斗熨之立止貞元廣利方舌衄齒衄蒲黃炒螺青各一錢為末摻舌上鹽湯漱明醫指掌少小鼻衄小勞輒出桑耳熬焦搗末每發時以杏仁大塞鼻中數度即可斷肘後方牙根出血名牙瀉草決明煎水噙之立止奇方類編牙關出血如一線槐花略炒為末以指頭蘸末搽牙以止為度同上齒縫出血梧桐淚研末干貼齒縫如血不止另易之準繩一方用紙紝子蘸乾蟾酥少許於血出處按之立止同上耳中出血麝香少許人牙煅存性出火毒共為細末用少許吹之即止秘方集驗一方用蒲黃炒黑研末摻入簡便方皮膚間忽然血濺出用煮酒罈上紙碎扯如楊花攤於血出處即止百一選方汗血胎髮燒灰撲之濟生編五竅出血將井花水當面連噴幾口急分開頭髮用草紙數層蘸醋令透搭在囟門其血立止醫說腸風漏血穀精草馬兜鈴藤川烏頭荊三稜各等分炒煎水先熏後洗之普濟方小便尿血萵苣菜搗敷臍上即止海上方女人陰血因交接傷動者五倍子末摻之良熊氏方黃疸黃疸痧香瓜蒂七杭以瓦焙乾研末入鼻內候流鼻涕即愈忌見燈火併食鹽物三十六黃方急黃病苦瓠一枚開孔以水煮之攪取汁滴入鼻中去黃水本草拾遺熱病發黃瓜蒂為末以大豆許吹鼻中輕則半日重則一日流出黃水乃愈千金翼濕熱發黃生薑時時周身擦之其黃自退也傷寒捶法一方用茵陳蒿一把同生姜一塊搗爛於胸前四肢日日擦之有效本草類方黃疸水腫綠豆一升煎湯洗浴即愈吳仲衡傳方黃疸腫滿苦壺蘆瓤如大棗許以童子小便二合浸之一時取兩酸棗大納兩鼻中深吸氣待黃水出良傷寒類藥黃疸癊黃並取瓜蒂丁香赤小豆各七枚為末吹豆許入鼻少時黃水流出隔日一用瘥乃止孟詵食療黃疸遍身如金瓜蒂二錢母丁香一錢赤小豆五分黍米四十九粒共為細末每夜用少許吹兩鼻孔內㗜入便睡明日取下黃水亦可揩牙追涎醫方選要黃疸困篤用半斤大雄雞背上破開不去毛帶熱血合患胸前冷則換之日換數雞拔去積毒即愈此雞有毒人不可食犬亦不食也唐瑤經驗方黃疸通治陳年自鯗肉不拘幾塊稻草一把燒灰雞子清調如膏藥樣貼臍上一日一換六七次即愈活人心書附驗死生法用二指重按病人膻中穴二指左右分開中間有血色者可治無血色者不治證治要訣陰症陰症此症四肢厥冷指甲唇舌皆青昏迷不醒用麥面做一圈蒸熟置臍上再用雞蛋五六個煮熟去殼豎放圈內以好銀簪插蛋中良久拔出換簪換蛋以銀簪不黑為止傳家寶陰症肚痛明礬火硝胡椒各一錢真黃丹八分共為細末陳醋為丸男左女右握在手心以帛縛之汗出而愈奇方類編一方用麝香二分納臍內以布蓋上將錫壺盛熱水熨之立刻見效同上陰症呃逆乳香同硫黃燒煙嗅之傷寒蘊要陰症玉莖縮入於內須要令人拿定急將艾丸如綠豆大在龜頭馬口各灸一壯其莖即出救急方陰症脫肛伏龍肝一兩鱉頭骨五錢百藥煎一錢五分共研為末每用一二錢濃煎紫蘇湯候溫洗過以清麻油調藥敷肛門上即能縮入景岳全書陰症危急雞蛋十數枚煮百滾蛋頭少去殼對臍口掩上蛋冷即換熱者蛋完即愈其蛋即黑色不可食治病時蛋切不可著陰人手同壽菉一方用蔥白一大握如茶盞大用紙卷緊卻以快刀切齊一片如指厚安於臍上以熱熨斗熨之待汗出為度一片未效再切一片熨之同上一方用芥菜子末新水調如膏藥貼臍上汗出取效同上時症天行疫癘常以東行桃枝煎熬湯浴之佳類要一方取初病人衣放於甑上蒸過則一家不染綱目闢禳瘟疫正月上寅日搗女青末三角絲囊盛系帳中大吉肘後方一法元旦日取古塚磚咒懸大門上一年無疫疾同上疫病初發但覺頭痛即以水調芥菜子末填臍以熱物隔布一層熨之即汗出而愈壽域神方大頭瘟用馬藍頭一把搗汁將鵝毛搽上一日五六次熱氣頓出親驗真神方也種福堂方抱頭火丹即大頭瘟將扁柏葉搗爛用雞子清調敷神效同上鸕鷀瘟兩腮腫脹憎寒惡熱者用赤豆半升為末水調敷或用側柏葉搗爛敷之同上蝦蟆瘟遍身如蝦蟆皮屬風熱用側柏葉自然汁調蚯蚓糞敷之或丁香尖南星醋磨敷醫鏡清涼救苦散治一切天行時疫頭面耳目鼻腮項頸紅腫痛用芙蓉葉二桑葉白芨白蘞白芷雄黃大黃黃連黃柏車前子赤小豆芒硝各等分共研末蜜水調敷頻頻掃之延壽書闢瘟仙丹紅棗八枚降香五錢蒼朮二錢芸香一錢共為末以粥飲作丸約重錢許中空一小孔藏硃砂少許瓷罐收貯遇疫病時行焚爐中能避瘟氣端素齋驗方瘧疾治瘧奇方兼治三陰硃砂胡椒各一兩共研極細末以無聲為度配合均勻貯瓷瓶或錫盒不使出氣用時取暖臍膏一張挑末藥一茶匙安放膏藥中間勿令四眼見對臍緊貼雖瘧止不輕揭聽其自落靡不神效三陰瘧十日一換用至三膏亦能奏功然瘧必三四遭後方用否則截之太早風寒未出恐生別症孕婦忌用德清徐氏施濟方勞瘧瘴瘧野狐肝一具陰肝重五日五更初北斗下受氣為末粳米作丸綠豆大每以一丸緋帛裹系手中指男左女右聖惠方截瘧大棗三個去皮核斑蝥二個焙乾同研勻以熟豬油調捏成餅如指頭大貼在印堂一宿而愈上儀堂施送方一方五月五日取花蜘蛛曬乾絳囊盛之臨期男左女右係臂上勿令知之普濟方祛瘧大老薑一片日出時東向對日朱書辟惡二字呵氣於上縛左臂神效陶氏別菉傷寒傷寒七十二症出汗法紅棗七個胡椒天麻子各七粒入銀硃一錢乳碎男左手放右腿彎內女右手放左腿彎內將藥放手心蓋被即有汗如雨同壽菉結胸傷寒大黃七寸巴豆十四粒共為末用唾調作餅蓋在臍上以艾團灸之候有熱氣透內方住此方不拘壯瘦虛實人俱可用灸後即以溫湯輕將手帕拭去毒此法救人甚多不可輕視同上陰症傷寒腹痛厥逆芥菜子研末水調貼臍上生生編陰症傷寒指甲青者用老雄雞一隻當脊開連腸血等乘熱急裹在臍上將布縛定一周時即醒陽物若縮用手扯住錄竹堂方傷寒陽毒狂亂甚者以青布一尺浸冷水貼其胸前南陽活人書傷寒發狂難制用炭火一盆以陳醋澆火上氣入病者鼻中即安方鈔傷寒目翳燒豆豉二七枚研末吹之肘後方傷寒舌出過寸梅花片腦半分為末摻之隨手而愈夷堅志傷寒舌生芒刺黑胎新汲水浸青布洗其舌以薑片刮舌自退類編傷寒風痹發汗不出以火燒地用水灑之布干桃葉於上厚二三寸席臥溫覆取大汗被中敷粉極燥便瘥本草從新停食傷寒陳香糟六兩生薑水菖蒲根各四兩鹽二兩共搗炒熱為餅敷胸前痛處火熨之內響即去如口渴任吃茶水待大便下惡物愈單方彙編黃耳傷寒用苦參磨水滴入耳中或用猴姜根汁或用苦薄荷汁土木香汁滴入耳中醫寶說赤膈傷寒用三稜針刺腫出血能蠲痛同上速解法凡患傷寒元氣不足汗不能出又不能大表者用老生薑八兩切片舂碎炒熱用綿裹姜用兩人每持一團與病人先擦兩手心兩腳心後擦前心背心如冷再換熱姜得身上火熱自然寒氣逼出或即汗或發細細紅累即愈秘方集驗咳嗽咳嗽熏法熏黃一兩以蠟紙調卷作筒十枚燒煙吸咽取吐止一日一熏惟食白粥七日後以羊肉羹補之千金方年久呷嗽至三十年者莨菪子木香熏黃各等分為末以羊脂塗青紙上撒末於上卷作筒燒煙燻吸之崔氏纂要老嗽不止故茅屋上塵年久著煙火者和石黃款冬花婦人月經衣帶為末水和塗茅上待乾入竹筒中燒煙吸咽無不瘥也本草拾遺久嗽不止款冬花二兩於無風處燒之以筆管吸菸嚥下即用食物壓下證治匯補久嗽欲死用厚榆皮削如指大長尺余納喉中頻出入當吐膿血而愈古今錄驗風寒久嗽非此不除天南星款冬花鵝管石佛耳草雄黃各等分共為末拌艾以姜一厚片置舌上次於艾上燒之須令煙入喉中為妙醫宗必讀上氣咳嗽腹滿羸瘦者楸葉三斗水三斗煮三十沸去滓煎至可丸如棗大以筒納入下部中立愈海上方一切勞嗽胸膈痞滿者鵝管石雄黃佛耳草款冬花各等分為末每用一錢安香爐上焚之以筒吸菸入喉中日二次宣明方霍亂霍亂轉筋腹痛以苦酒煮絮裹之聖惠方霍亂腹痛甚者炒食鹽一包熨其心腹令氣透又以一包熨其背少頃即止簡易方霍亂轉筋入腹無可奈何者以米醋煮青布搽之冷即易千金方霍亂轉筋入腹殺人以小蒜鹽各一兩搗敷臍中灸七壯立止聖濟總菉霍亂轉筋身冷心下微溫者硃砂二兩研蠟三兩和丸著火籠中熏之周圍厚覆勿令煙泄兼床下著火令腹微暖良久當汗出而蘇外臺秘要霍亂轉筋欲死氣絕腹有暖氣者以鹽填臍中灸鹽上七壯即蘇乾坤秘韞霍亂急救法轉筋者男子以手挽其陰女子以手牽乳近兩旁後以鹽填臍中灼艾不計壯數雖已死而胸中有熱氣者立蘇研生蒜塗腳掌心雖昏危入腹者亦效再以大蓼一握煎湯洗之心腹卒痛以鹽斤許炒熱紙包紗護頓其胸腹頻火熨覺熱氣透入即蘇證治匯補乾霍亂治法乾霍亂者忽然心腹脹滿絞刺疼痛欲吐不吐欲利不利狀若神依頃刻之間忽然悶絕此由脾上鬱極不得發越以致火熱內擾即俗名絞腸痧也用麻皮蘸油刮臂膊上或刺膝腕內有紅筋刺出紫血或刺十指頭出血立愈若轉筋不止用木瓜鹽二味煎熱湯浸兩足亦妙十便良方絞腸痧陰陽治法腸痛難忍看有陰痧腹痛而手足冷身上有紅點以燈草蘸油點火燒之即愈有陽痧腸痛而手足暖以針刺其手指近爪甲處一分半許出血即安須先自兩臂捋下其惡血令聚指頭然後刺之集簡方附王肯堂二方王肯堂云霍亂乃邪氣用事正氣無主潰亂之際大忌薑湯米湯及烏梅梅醬等湯服之立死雖熱湯亦不可用禁之禁之小腹作痛脹緊如石氣冷並結者乃房勞傷也切不可誤以為霍亂妄投冷水及補藥之類服之立死但用消傷破血調氣之劑如紅花蘇木桃仁當歸木香青皮檳榔之類酒煎加童便調和大口嚥下又令病人坐蔥湯中浸之醫鏡嘔吐注車注船凡人登車及船煩悶頭痛嘔吐者宜用徐長卿石長生車前子車下李根皮各等分搗碎以方囊系半合於衣帶及頭上則免此患肘後方塞鼻丸聞藥即吐百藥不效伏龍肝為末水丸塞兩鼻孔遂不再吐如神經驗廣集鼻嗅散服藥不效用硫黃乳香各等分為末酒煎急令病人嗅氣即住衛生易簡方立效丹雄黃二錢酒一盞煎至七分乘熱令吐者嗅氣即止普濟方呃逆虛寒呃逆乳香硫黃艾葉各三錢為末好酒一鍾煎數沸乘熱使病人鼻嗅其氣再用搗姜渣擦胸前亦好醫宗說約灸期門法婦人屈乳頭向下盡處骨間動脈是穴男女乳小者以手一指為率陷中動脈是穴男左女右灸三七壯再不正者灸臍下丹田二三十壯間有活者證治匯補呃逆不止黃蠟燒煙熏二三次即止醫方摘要呃逆欲死或以紙捻鼻嚏而止或以詐冤盜賊而止或鼻聞食香調氣而止皆抑之駭之而使氣下也此救呃逆要法若額上出汗連聲不絕者危古今醫鑑痞癬腹中痞塊玉簪葉同獨囊蒜搗爛穿山甲為末好醋成餅量痞大小貼之兩炷香為度其痞化為膿血從大便出然須量人大小強弱貼之衛生備要痞塊硬痛吳茱萸炒熱布裹熨之宜良李氏刊方痞塊硬痛如刀刺者商陸根不拘多少搗碎蒸之以新布裹熨痛處冷再換孫真人方灸痞法擇破日清晨令患人勿飲食一進門檻內即睡倒地上將病人男左女右手以掌至指根長短為則在肛門往背上比得停留以墨記之取艾七炷用七姓人揉熟在患人頭前地上擺七壯如王字樣取七壯之尖灸病人穴上余皆一齊灸地臨灸咒曰乾元亨利貞天地之德也灸畢至日將落時方許食粥雞肉等物以發之忌生冷七日此日但換門檻可灸數人灸畢將病人身下灰土並艾灰俱掃送十字路上弗可回顧若遇人神在腰雖破日亦不宜灸自一歲至六十歲俱可灸但灸瘡不發者難治乃遼左戴神醫所授法也錄竹堂方抓癖膏血餘香油桐油生豬腦子各半斤桃仁四兩白蠟四錢同下鍋內文武火熬的腦子盡濾去渣下黃丹十四兩熬成膏待溫再下胡黃連白芷蘇木紅花三稜莪朮各三錢歸尾硇砂各五錢麝香一錢五分各為細末入前膏內攪勻收貯勿令泄氣有塊先用皮硝煎水洗患處次用姜擦方用絹帛攤貼後用鞋底炙熱熨之五七十遍覺內熱方可痞即消縮其效如神李滄溪方大人小兒癖塊方甘草甘遂莧菜各三錢磠砂一錢木鱉子四個去殼鱉肉一兩蔥頭七個加蜜少許共搗成膏以狗皮攤貼如藥干用蔥蜜潤之二次即消葉天士方諸氣走注風毒疼痛芥菜子為末以雞蛋白調敷曹氏經驗方走氣疼痛酸醋淬麩皮炒熱熨之曹氏經驗方走注氣痛氣痛之病忽有一處如打撲之狀不可忍走注不定靜時其處冷如霜雪此皆暴寒傷之也以白酒煮楊柳白皮暖熨之有赤點處鑱去血妙凡諸卒腫急痛熨之皆即止姚僧坦集驗方流火馬前子一個用粗碗底磨水以雞翎掃遍少頃又磨又掃一日三五次其痛即止三日後全消經驗秘方一方用生煤炭研極細末醋調敷患處即消便易良方風氣痛老薑鳳仙葉香油川椒末共搗擦痛處或用鳳仙子煎湯洗亦效醫學集成濕氣痛鳳仙草一束大蔥一束搗爛蒼朮八兩防風荊芥各五兩煎湯入桶中令患者坐湯內多用舊衣服浸湯搭其痛處湯冷再添不過三四次即愈若遍身以此湯洗浴尤妙醫鏡腳氣發足膝紅腫乃濕熱留於肌肉之中若不早治其氣上行至心即死矣急用朴硝大黃寒水石牙皂為末雞子清調敷甚妙或用人中黃為末芭蕉汁調敷亦效同上腳氣上衝腹脹滿悶蓖麻葉蒸搗裹之一日二三易即消或灸風市肩髃曲池三穴或七壯或五十壯甚驗匯補腳氣走痛蘿蔔煎湯洗之仍以蘿蔔曬乾為末鋪襪內聖濟總菉腳氣腿腫久不瘥者生黑附子一個去皮臍為散生薑汁調如膏塗之藥干再塗腫消為度簡要濟眾腳氣成漏跟有一孔深半寸許其痛異常用人中白煅有水出滴入瘡口證治要訣腳氣痛不可忍以致口眼喎斜手腳如搐不省人事昏迷如死黃建煙二斤炒熱以坐桶盛入內將腳解光放入煙中出汗少冷又炒熱隔日一熏熏七次即可除根同壽菉疝氣偏墜小腸氣痛陳石灰炒五倍子山梔子各等分為末面和醋調敷一夜即消大全良方一方用棉子仁煎湯洗之斗門方疝氣陰囊如斗木鱉子七個皂角二條煨黃玄胡五錢川椒一合共炒為末以燒酒調如稀粥塗在腎囊上外以綿紙包裹再以布包縛隨縮隨收一時即愈李慍庵方疝氣囊腫不消硼砂一分水研塗之即消桂軒隨菉一方取田間青蛙皮貼之自愈袖珍方腎囊風雞蛋炒出油揸之自效奇方類編燥囊散治陰囊濕癢搔之則汁水流珠用此極效牡蠣醋煅一兩硫黃苦參蛇床子枯礬各二錢雄黃一錢共為細末先用蒼朮椒鹽煎湯洗濕處後用此藥摻之景岳全書瀉痢水瀉不止木鱉仁母丁香各五個麝香一分研末米湯調作膏納臍中貼之外以膏藥護住吳旻扶壽精方久瀉不痊生蔥搗爛入黃丹為丸如豆大填臍中外用膏藥貼之立止十便良方泄瀉暴痢大蒜搗貼兩足心亦可貼臍中即愈千金翼腹中絞痛痢下窘迫炒鹽二包互相熨之世效單方治痢仙方茜草一握煎水洗兩足底即愈奇方類編一方用梧桐葉三四斤煎水洗足自愈同上赤白痢巴豆新者不拘多少研如泥雄黃明淨者研極細共成為膏將病人眉心中穴用水洗淨以膏攤油紙上每用如此大貼穴上壯年一炷香老幼半炷香或三四寸視人大小用之香盡即將藥輕輕揭去拭盡神效內府秘方禁口痢雖極危急心胸微有熱氣者亦能治之大蓖麻子巴豆各去殼四十九粒牛黃一錢五分透明雄黃透明硃砂陰砂不用麝香各五分冰片一分共為極細末和前蓖麻子巴豆研如泥加蔥汁白蜜各少許為丸如榛子大先將紙貼患者眉心紙上安藥藥再用膏藥貼之眉心皮膚腫起即愈如不腫者不治錄竹堂方久痢大腸滑脫訶子赤石脂龍骨各等分為末以蠟茶少許和藥摻腸頭上用絹帛揉入景岳全書痢後脫肛經霜浮萍草瓦焙乾為末熱鞋底上熨之馮氏錦囊一方用五倍子末三錢白礬一塊水煎洗之立效三因方大小便溺二便不通經三五日危急者蔥白杵填臍中艾火灸七壯立下日用本草一方用皂莢放桶內燒煙坐熏立通集要方男婦二便不通危在頃刻田螺十個蔥白七根麝香五分輕粉少許共搗成泥敷臍上以熨斗烙之立救一命奇方類編大小便不通用蝸牛三個連殼搗放臍中以手揉按之即通加麝香一分更妙錄竹堂方大便不通豬糞燒灰存性加皂角末拌勻先用竹筒入肛門內將藥吹入頃刻即通同上大便秘結至極昏不知人豬膽一枚入好醋少許扎鵝毛管上灌入糞門內同壽菉蜜導法白蜜六七兩煉稠厚黃色滴水凝硬再加入鹽皂牙末各五分和勻急傾入冷水中捻如指大三四塊先將香油抹殼道中後用蜜條放入即通丹溪心法小便不通獨囊大蒜一個梔子二十一個鹽一撮共搗敷臍中良久即通若不通敷陰囊上立效種福堂方一方用萵苣子搗貼臍中立愈海上方便閉垂死桃枝柳枝木通川椒枯礬各一兩蔥白七個燈心一把水三十碗煎半用瓷罐熱盛一半熏外腎周圍以被圍繞不令外風得入冷即易之其效大奇醫宗必讀急救受熱便閉方因受熱小便數日不通小腹脹痛難忍者用蝸牛一二條去殼安放病人臍中入冰片少許蝸牛即化為水腹內一線涼下小便即通內府秘方婦人小便不通生白礬末五釐入臍以一指甲水滴之嫏嬛記一方用皂角煎湯洗陰戶若在胎前名曰轉胞是胎壓轉尿泡不小便也宜穩婆托法增訂達生編淋症遺精五淋以白礬為細末填臍中滴以井水通即去同壽菉急淋陰腫泥蔥半斤煨熱杵爛貼臍上外臺秘要小便淋澀或有白者以赤根樓蔥近根截一寸許安臍中以艾灸七壯程氏續即得方小便沙淋瓦松即生屋上者煎濃湯乘熱熏洗小腹約兩時即通經驗單方熱淋痛甚或不通者豬膽一枚去汁少許入麝香三釐以陰莖納其中外線兜住於內良久即愈證治匯補熱淋不通田螺十五個水養待螺吐出泥澄去清水以泥入膩粉五分調塗臍上尿立通將螺放之如若殺害則不效同上遺精治法每夕臨臥時用絲帶將腳大拇指縛結並花縛各指總縛左右腳俱用此法凡泄精後切忌解小便濟生方一方用五倍子研細末以女兒津調貼臍內立止種福堂方夢遺用闊布帶將大腿一隻或左或右扣系項睡醒則解伸左右更換曲腿睡自止傳家寶水腫蠱脹腫脹好輕粉二錢巴豆四兩生硫黃一錢研勻成餅先以新綿鋪臍上次以藥餅當臍掩之外用帛緊束之如人行十里許即下水待行三五度即去藥以溫粥補之一餅可治三五人愈後宜淡食忌油鹽大戒房事病機沙篆肚腹腫脹獨囊大蒜煨熱去皮綿裹塞糞門冷即換亦治關格脹滿大小便不通單方全集水腫尿少針砂醋煮炒乾豬苓生地龍口各三錢為末蔥涎研和敷臍中約一寸厚縛之待小便多為度日二易之入甘遂更妙陸氏積德堂方水氣腫繭田螺大蒜車前子各等分煎膏貼臍上水從小便出盡即愈宜良李氏刊方浮腫冬瓜皮煎湯浴洗立消同上蠱脹活烏背鯽魚一尾重四五兩者愈大愈佳再用獨子肥皂一個去子用殼同全魚搗爛團貼臍上臍雖平而有紋影者其氣自入輕者貼一二日重者貼三五日才應氣蠱下泄余蠱瀉下即愈是方余蠱皆可用惟蜘蛛蠱不用同上十種水蠱腫滿喘促不得眠赤商陸根杵碎貼臍心絹帛縛定病自小便出同壽菉腹皮青色不速治須叟死胡粉是錫粉非鉛粉鹽熬色變以摩腹上子母秘菉元戟膏治腹滿如石陰囊腫大大戟芫花甘遂海藻各等分為末醋調和麵攤綿紙上貼腫處口咬甘草不過兩三時水即下矣濟生秘覽水腫灸法中脘二七壯在臍上四寸上下一寸居岐骨與臍之分中又灸水分穴如年壯在臍上一寸禁刺刺之則水盡即死刺灸要訣癲狂癇病邪狂癲癇不欲眠妄行不休黑早走起於寅時勿令人見用左手摘向東桃葉七瓣暗系病人發內即安集效方羊癲風生薑飛羅面各一兩麝香七分黃梔子蔥頭雞子清各七個地龍七條共樁爛和勻烘熱以絹帕縛於腹上過三日見有青筋照方備藥再縛三日無青筋則愈重者不過三服即可除根永不復發矣梅溪顧氏刊方一切發狂勢不可遏用炭火一盆醋一碗傾於火上其煙衝入病人鼻內將薑汁噴於病人頭面身體手足即安方可察其陽狂陰燥用藥醫宗說約一切熱病發狂床帳務要揭開放入爽氣良久隨用銅鏡按在心胸間熱勢稍退即除若傷寒溫熱發狂渴不止者將朴硝一斤研細用水一盆將青布方圓尺許三五塊浸於硝水中搭在病人胸堂並後心上頻易冷者搭之如得睡汗乃愈同上癇症初發用皂角汁灌鼻內其風涎即從鼻口中涕唾而出若蘇後其涎不止急以鹽湯服之自止醫宗金鑑一方發時灸百會穴不拘壯數以蘇為止再發再灸以愈為度刺灸要訣風癇先出手指如數物狀乃發也灸髮際宛宛中三壯豬癇病如屍厥口吐清沫灸巨闕三壯羊癇目瞪吐舌羊鳴灸第九椎下間三五壯馬癇張口搖頭身反折馬鳴灸僕參左右各三壯牛癇善驚反折手掣手搖灸手少陰掌後去腕五分陷中五癇並見病機沙篆邪氣鬼祟家有邪氣真雄黃三錢水一碗以東南桃枝咒灑滿屋則絕跡勿令婦女見知集簡方邪氣鬼交虎骨二兩硃砂蕪荑鬼臼鬼箭雄黃藜蘆各一兩共為末煉蜜丸如彈子大囊盛二丸男左女右繫於背上再用丸子在病人房內燒之同壽菉一方令病者合二大拇指以艾團灸二指當中同上辟邪符元旦日篆書聻字貼於門上一切鬼祟遠離千里相傳人死為鬼人見懼之鬼死為聻鬼見怕之書貼則闔家一年不染邪疫岣嶁神書鬼排卒死吹醋少許入鼻中千金方鬼壓鬼打如人初到客舍及無人冷房睡著覺鬼物壓打其人呃呃有聲呼之不醒不救必死其法用雄黃牛黃各一錢硃砂五分研末和勻以一錢燒於床下一錢溫酒調灌之奇方類編灸鬼法治一切驚狂譫語逾垣上屋罵詈不避親疏等症以病者兩手大指用細麻繩扎縛定以大艾炷置於其中兩介甲及兩指角肉四處著火一處不著即無效矣七壯神妙秦承祖方山魈木客狐貍蟲蛇作祟憑身者以本人褲子抱頭則妖自大笑而去永不再至蓋妖原欲盜人之精氣也然最喜清潔見人汙物包頭則其人之不潔可知矣故棄之而去亦因其好潔而亂之也不成氣之物而睡夢中來壓人者亦以此法治之石室秘菉持咒除祟明雄黃蒼朮各五分入好艾絨三分研末為丸丸時虔誦鬥咒三七遍密藏左手內俟口作邪語時放右手中指中節上焚之不必焚過即得霍然月譚朱氏驗方告土法請土馬五位寫明東西南北中央之神如無土馬即寫紙上作牌亦可用小魚數尾肉一塊鴨蛋一個粉團五枚裝青黃赤黑白五色各一盤東青西白南赤北黑中央黃燭爐供器五副按方位同供一𧍕內作黃紙五疏填寫病人年庚及致病之由在動土處虔誠拜禱如東方禱畢即將東方神馬焚送其禮物香燭供器一併拋棄東方空地如有水處拋棄水中西南北三方皆仿此四方禱畢焚送中央即在動土地上掘一坑坎將神馬並禮物等項一併化填於內再掘土之時暗取一土帶回令病人吹氣一口於上隨即用紙包好不可令旁人見走至四顧無人處將紙包拋棄而歸由拳盛氏抄本
