body:
  text: 卷八一切傷痛殺傷殺傷內膜未損者急取蔥白熱鍋炒熱遍敷傷處冷則再換雖氣絕者猶可救活硤川沈氏刊方殺傷不透膜者用烏賊魚骨或龍骨為細末敷瘡口上血立止即蘇傷處無痛矣殺傷未收口者千年石灰入象皮研末敷之秘方集驗跌打傷跌傷神方生薑二兩打碎火酒四兩釜內同煎攪勻敷之立愈慈惠小編跌破出血烏賊魚骨末敷之直指方跌破頭凡跌破頭腦手足血流不止急忙無藥切不可用香灰按上每致害痛極難收口可即用吃的煙末一撮搗在患處紮好莫透風莫食發物即止痛最易完口傳家寶面目撲跌青紫用半夏磨汁塗之立效錄竹堂方耳鼻傷落用人發入陽城罐以鹽泥固濟煅過為末乘急以所傷耳鼻蘸藥安綴故處以軟絹縛定效勿令動自生合集驗方跌損唇皮用桑白皮作線縫之以生肌散摻之自合石室秘菉皮破筋斷取金沸草根搗汁塗筋封口二七日便可相續止痛一次即愈不必再塗正骨心法一方用白膠香一味為細末敷之醫宗金鑑筋骨損傷白米粉四兩炒黃入乳香沒藥末各五錢酒調成膏攤貼之御藥院方從高跌下及墜馬傷損取淨土和醋蒸熱布裹熨之袖珍方急救方凡人或跌或打脅破腸出急以油抹入煎人參枸杞汁淋之連食羊腎粥十日愈或以冷水噴其面更妙簡便方跌打損傷青腫生梔子末同白麵用水調敷之拔出青毒奇方類編一方用生豆腐切片貼之數次即愈同上跌打皮破肉傷用鹽藏楊梅和核搗如泥做成餅子以竹筒收之如遇破傷研末敷之如神屢驗魯班方跌打傷破頭面手足大口血流不止老松香為極細末將所傷破口捏湊一處用藥末厚敷上將布扎住十日即愈曹氏經驗方跌撲折骨鳳仙花葉搗爛頻頻塗上即安宜良李氏刊方跌打併夾棍刀傷方半夏一錢八分大黃一錢冰片半分共研末敷之即愈同上跌傷潰爛杭城計姓墮城跌石上劃開左腿已爛百餘日視其傷口長三寸余深寸余潰爛有膿血用黃連煎水洗去血跡以金瘡鐵扇散末藥敷之三日而愈海昌沈氏醫案重物壓打凡手足肩背被重物打傷或青腫紫赤血痕疼痛不致內傷用蘇木煎汁磨真降香塗之不可落水連塗數日其腫消散屢試屢效杭城邵氏梓送方一方用虎膽草搗爛搽傷處即愈同上皮金膏治跌撲損傷刀傷擦傷並釘鞋打傷足跟病久陰瘡擦痛用廣東皮金紙一張俗名洋皮金照患處大小剪取將金面貼傷處過宿即愈神效之極軍中宜多備之同上閃折傷閃頸促腰用硼砂研粉以骨簪蘸津沾粉點兩目淚出稍松連點三次立時全愈全生集閃腰治法木香一錢麝香三分共研為細末右痛吹左鼻左痛吹右鼻令病人手上下和之醫宗說約手足閃轤青腫威靈仙紫荊皮二味煎水洗即退青止痛赤水玄珠折傷閃肭骨接續斷接骨草葉搗爛罨之立效衛生易簡方諸閃凡閃腰打傷閃肭並手足損傷不出血但有青紫內傷者先以蔥白搗爛炒熱將痛處擦遍隨用生大黃研末薑汁調敷儘量飲以好酒即三月半年不愈者神效秘方集驗折傷水獺一隻支解入罐內固濟待乾煅存性為末以黃米煮粥攤患處摻獺末於粥上布裹之立止疼痛經驗單方腦破骨折蜜和蔥白搗勻厚敷立效懷德塞秘菉骨折腫痛狗骨燒研熱醋調塗敬修齋方折傷腫痛梔子白麵同搗塗之甚效集簡方一方用栝蔞根搗塗重布裹之熱除痛即止肘後方折傷接骨市上乞兒破鞋底一隻燒灰飛羅面焙黃各等分好醋調成糊敷患處以絹束之杉片夾定須臾痛止骨節有聲為效楊誠經驗方一方用大蝦蟆生研如泥劈竹裹縛其骨自痊奚囊備急方接骨靈丹白朮香根用酒糟搗爛敷之即愈宜良李氏刊方一方用白蘿蔔切碎搗爛略去粗汁敷患處裹緊過夜即愈經驗良方跌撲傷損扭閃出骨竅等證蠶沙綠豆粉各四兩炒黃枯礬二兩四錢共為末醋調敷之絹包縛定換三四次即愈忌產婦近之邵真人經驗方金刃傷刀傷切不可見水用圖書石滑石末摻之或用刀刮青石末摻之或大黃炒黑篩末摻之或韭菜汁拌陳石灰陰乾摻之或用堅實細炭並老松香各等分研篩細末以韭菜汁拌陰乾再篩研細末摻之如急用不用韭菜汁亦可單方總菉刀傷流血不止石榴花四兩同石灰半升研為細末敷上便瘥神效海上方一方用嫩紫蘇葉桑葉同搗貼之永類鈐方一方用紫藤香即降香佳者瓷瓦鋒刮下石碾碾細敷之血即止又無瘢痕延生一術刀傷痛久不止用好雞骨炭擲地鏗然有聲者同松香明透者各等分研極細再多用老韭菜搗汁拌入陰乾復研復拌三四遍為細末收貯於上巳端午七夕等日調製之敷患處痛立止完好如常切不可飲冷水奇方類編刀劈斧傷用降香一兩研極細末白蠟三錢研細末和勻敷滿患處用絹帕扎縛得緊不可下水經風三周時全愈廣善篇醫方刀割斧砍槍箭夾剪傷生半夏研細帶血敷上立止痛能收口生肌錢青掄方一方用獨殼大慄研敷或倉猝嚼敷亦可集效方刀斧傷綠豆粉新鐵鍋內炒紫色用新汲水調勻敷患處貼以紙將杉木片縛定立效同壽菉一方同茶葉燒灰或干葉為末皆可敷取效同上刀箭傷定粉風化石灰各一兩枯白礬二錢乳香沒藥各五分以上五味俱各另研各研末和勻再研干搽之止血住痛敬修齋方重傷血不止口嚼燈心掩之即止同上金刃致命傷用堅實條炭二三寸燒至紅透入鐵皿內或石臼中加紅糖二三兩搗至千杵如醬凡遇致命重傷尚存一息者急將此藥敷於患處再用或綢或布包裹七日即愈如金刃透膜及斷指折足血流不住等傷先敷此藥外取葫蘆肉白衣一層貼上其血即住唯忌食生冷不忌一切發物至傷之大小不拘定炭之二三寸糖之二三兩也陶樸存方金傷內爛生蛆皂礬飛過為末乾摻其蛆即死衍慶塞驗方金瘡傷重被驚者以女人中衣舊者炙襠熨之李筌太白經注金瘡出血蔥白連根葉煨熟搗爛敷之冷即易而愈本草發明金瘡腸出糯米三升於端午前四十九日以冷水浸之一日兩換水輕淘轉勿令攪碎至端午日取出陰乾絹袋盛掛通風處每用旋取炒黑為末冷水調如膏藥隨瘡大小裹定瘡口以布包定勿動直候瘡瘥靈苑方一方用小麥五升水九升煮四升綿瀝淨汁待極冷令病人臥席上一人含汁噀其背則腸漸入噀時勿令病人知之及多人在旁言語如未入抬席四角輕搖則自入既入者須用麻油潤線縫緊仍以帛扎束慎勿驚動使瘡口復迸劉涓子鬼遺方胡季堂云線縫當以細線縫皮勿令粗針大線縫傷好肉則肉自內生其線縫處日久自然長脫否則好肉傷壞益增劇矣胡司寇急救方金瘡筋斷脈絕血盡人亡天花粉三兩赤芍二兩薑黃白芷各一兩共為末先用繩索或絹帶扎住血路然後以茶清調敷用軟絹縛之其血立止其腫頻消若金瘡著水番花者薤汁調敷瘡口兩旁以火微炙之或用稻稈煙燻之瘡口水出即愈秘方隨菉龍骨散龍骨煅白芨各等分金瘡口小干敷口大涼水調敷經驗廣集血餘散黑頭髮數斤在剃頭棚擇少壯者洗淨油膩濾干將鮮大竹數段打空一節將發裝入築極緊用木塞口黃泥封固放微火灰內煅一夜存性打開發成灰矣取貯瓷器遇刀傷敷之即愈其效如神同上刀斧斬並跌打損破一切水火傷飛過五六次黃丹四兩潮腦末二兩共研細入瓷罐內收貯遇有諸症蜜調二茶匙敷患處頃刻痛止過夜結痂和濟局方箭鏃傷血出不止者用真降香末罨之即血止痛定明日結痂無瘢其效如神軍中常帶之和育齋方一方用慄炭燒紅透即研為細末乘熱罨之亦可止血定痛此係急治便而且易之法毛楓山方箭鏃木器傷用艾綿攤成餅子將火硝細末鋪上再用大蜣螂搗成末鋪火硝上包在傷處一日一夜即出葉天士方湯火傷急救方以好杭粉為細末同婦女所用好頭油調塗之如無或柏子油亦可沈氏經驗方一方用生大黃切片曬研細末不近火以嫩桐油調敷即愈同上一方用梨子搗碎敷之止痛且不腐爛神效廣利方湯火傷痛不可忍以菜油一碗浸一刻即不痛兩三日便退皮如不便浸頻頻塗之凡湯火傷切勿以冷水冷物及井泥尿泥激之其熱氣遇冷則入之愈深輕者攣縮重則直逼火毒攻心速之死矣秘方集效湯火傷爛見骨者百草霜三錢輕粉一錢五分共為末麻油調搽效單方摘要湯火傷灼用景德鎮瓷器打碎埋灶內炭火鋪上一夜取出去火毒為末入黃丹少許敷之立愈活幼口議一方用蓖麻仁蛤粉各等分研膏湯傷以油調火灼以水調塗之古今錄驗湯火灼傷粟米即小米崔焦投水澄取汁煎稠如糖頻敷之能止痛滅瘢痕或半生半炒研末酒調敷之崔行功纂要一方用瓶盛麻油以箸就樹夾取黃葵花收入瓶內勿犯人手密封收之遇有傷者以油塗之甚妙經驗秘方湯火傷瘡焮赤疼痛毒腐成膿用麻油四兩當歸一兩煎焦去滓入黃蠟一兩攪化放冷攤帛貼上能止疼痛拔熱毒斂瘡口神效醫林集要一方用稻草灰冷水淘七遍帶石攤上干即易若瘡濕者焙乾油敷二三次可愈衛生易簡方湯潑火燒用水中大蚌置瓷盆內將其口向上放無人處俟其口開時預將冰片麝香各二三分同研細末以匙挑二三分傾入蚌口內其口即閉而蚌內之肉即化為水然後再入冰麝少許用雞翎黏埽傷處先從四面邊沿層層埽入痛楚自減如無大蚌小者亦可此急救最驗之第一方也及其火氣即退將用下蚌殼燒存性碾細末入冰麝少許從邊圍埽如無蚌處用冰片從四面磨起漸及於中亦可漸瘥江蘇胡臬臺刊傳方湯泡煮熟雞蛋黃炒出油一盅調生大黃揸之集簡方湯泡火燒大麥淨砂鍋內炒至漆黑為度取出以紙鋪地上出火氣研細末爛者干揸未破者以香油桐油調揸止痛立愈奇方類編一方用人糞瓦上焙枯黑研末香油調塗亦效同上湯燙火燒螺螄殼多年乾白者火煅為末如瘡破乾摻如不破清油調敷乾坤秘韞一方用多年廟上獸頭為末香油調敷奇方纂要被回祿火傷者用大黃末桐油調敷或曰以地榆滑石研末敷之不獨止痛亦不潰爛且愈後無疤痕惠迪編一方用石灰一小塊用井水調化仍將水逼去加和麻油調敷傷處亦妙同上煙火傷寒水石大黃黃柏各等分為末蜜調敷之最忌冷水犯之爛見筋骨慎之生生編熱油燒痛以白蜜塗之陸氏積德塞方火藥傷火藥爛痛用蚌殼須鹽籮中者煅研末搗爛茶葉同搽即愈同壽菉炮竹火沖眼瞎令人解熱小便澆之即痛定徐用自己小便常洗自明度氏即得方刑傷預備夾棍方用肥皂子水浸透去外黑皮用里白肉並仁搗如泥如明日用事今晚用此敷之上至腳臁脡一節下至腳底板心並指甲內處處敷勻不可有一毫空隙處以油紙包外用裹腳纏足其藥與皮肉一樣顏色不變用事時一些不礙毫無干涉出來時以黃豆漿溫溫洗之其豆漿須預先一日將豆泡爛磨漿候著用神哉神哉奇方類編初夾急救方將豬油四兩胡椒照人一歲一粒搗爛敷上紮好不用洗不可解動一夜即愈集效方夾棍傷一出衙門即用熱童便一盆將足浸之如便冷燒紅磚二塊碎之即熱直浸至童便面上浮起白油其傷盡出矣不𭼊不疒貢再用肥皂搗如泥入雞子清和勻敷傷處以草紙包裹腳縛緊一夜不可動即效濟生秘覽夾傷敷藥骨未碎者土牛膝敷骨碎者土鱉蟲同活蟹搗敷衍慶堂方拶傷手指皂礬二兩水四五碗砂鍋內熬滾將手熏洗浸漬良久即活血止痛不致潰爛其洗手水過夜即臭惡不可聞便易良方一方指上拶過有凹痕用銀硃和酒磨濃依痕圈之自復種福堂方夾打傷痛不可忍者活鯽魚一個約重三四兩者陳酒糟一鍾銅末五錢胡桃肉四兩共搗敷患處同上杖傷桑子二三斗入罈子內麻布扎口放在避陰處將他臭過到下霜後取濾榨去渣用小罐收貯清汁遇傷搽上立止痛二次全愈宜良李氏刊方杖破玉簪花手排熟貼患處或用嫩荷葉貼亦可試效方杖破腫痛鳳仙花葉搗如泥塗腫破處干則又上一夜血散即愈冬月收取乾者研末水和塗之通變要法杖瘡腫痛大黃滑石赤石脂各等分為末茶湯洗淨貼趙氏經驗方杖瘡疼痛綠豆粉炒研以雞蛋白和塗之妙生生編杖瘡青腫以濕綿紙鋪腫處用燒過酒糟搗燒厚鋪紙上良久痛處如蟻行熱氣上升即散楊氏簡便方一方用豆腐切片貼之頻易一法以燒酒煮貼之色紅即易不紅乃已濟生拔萃方杖瘡久爛深潭不能收口血竭白占各一錢硃砂輕粉各二錢共研末摻上一日夜其肉四圍生起兩日即平公門秘方起死回生丹凡夾拶杖傷死血鬱結疼痛壞爛命在頃刻者用麝香一分冰片三分乳香沒藥各一錢五分樟腦二錢輕粉血竭各三錢共研極細後將黃蠟一兩豬板油一兩二錢同化調藥成膏貼患處晝夜流出惡水即時蘇蘇同上破傷風破傷風用病人耳中膜並爪甲上刮末唾調敷上簡易良方破傷風腫新殺豬肉乘熱割片貼患處連換三片其腫立消單方摘要破傷風浮腫蟬脫為末蔥涎調敷破處即時去惡水立效同壽菉破傷血出何首烏末敷之即止神效筆峰雜興破傷風病用白麵燒鹽各一撮新汲水調塗之普濟方一方用杏仁杵膏厚塗上燃燭遙炙之千金翼神妙散止血生肌令無瘢痕鹽藏楊梅和核搗如泥做成錠子以竹筒收之凡遇破傷研末敷之其效如神保生余菉人咬傷人咬傷用熱尿洗去牙黃瘀血以蟬酥丸塗孔中或嚼生栗子敷之或嚼生白果搽之如痛用麻油紙捻火焰熏之用干屎裝荔枝殼內加艾圍灸之以不痛為度單方總菉人咬傷瘡龜板骨鱉肚骨各一片燒研油塗之葉氏摘玄人咬舌斷速用狗舌一條切正如人舌大小將病人坐在椅上仰面頭放在椅背上以自己手拿住喉嚨則舌自伸出急將狗舌蘸藥末接在人舌上一交接永不落矣名接舌神丹岐天師降鸞方附藥末方人參龍齒俱用透明者生地各三錢象皮一錢冰片三分地蝨二十個土狗三個去頭翅先將人參各項俱研末後用地蝨土狗搗爛入前藥末內搗之佩身上三日乾為末盛在瓶內遇有此等病治之神效石室秘菉人咬指傷痛不可忍久則爛脫手指並手掌急用人尿入瓶將指浸之一夕愈如爛克蛇烏龜殼灰敷赤水玄珠一方用鱉甲燒灰敷之方鈔口咬指頭害欲斷者櫟漆樹葉生搗去筋加津唾潤搗搽上仍用軟絹包護不可見風錄竹堂方附指爪抓傷以橄欖核磨水搽之過宿則無痕跡新集良方附踢傷或手足或面及擦壞皮肉冬青葉同醋煮數沸略滴麻油少許在內取葉換貼自好衛生家寶方獸咬傷虎咬傷急用豬肉貼之隨貼隨化隨化隨易速用地榆一斤為細末加入三七根末三兩苦參末四兩隨濕隨摻止血定痛即愈石室秘菉虎咬爪傷以蠶豆葉搗敷如無葉時以枯蠶豆水浸軟連皮搗敷亦應濟世便易集猢猻抓傷以金毛狗脊焙研末摻之或麻油調搽亦愈同上馬咬傷雞冠血塗之牝馬用雌雞牡馬用雄雞肘後方一方用婦人月經布或人中白燒灰為末和豬脂調敷或用鞭梢燒灰塗之馮氏錦囊馬咬及踏傷以寒水石敷傷處旬日即愈集驗方馬咬踏瘡腫痛作熱雄鼠屎二七杭故馬鞘五寸和燒研末豬脂調敷之梅師方馬氣入瘡或馬汗馬毛入瘡皆致腫痛煩熱入腹則殺人以生烏頭末敷瘡口良久有黃水出即愈靈苑方狐尿刺人腫痛欲死麻鞋網繩如棗大婦人內衣有血者手大一片鉤頭棘針二七枚並燒研以豬脂調敷當有蟲出陳藏器本草豬咬腫痛龜板燒研香油調搽之醫方摘要豬齧成瘡松脂煉作餅貼之千金方犬咬舊屋瓦上刮下青苔屑按之即止邵真人經驗方犬咬痛絕昏悶浸椒水調莽草末敷之便民圖纂家犬咬傷先須忍痛以河水捏淨血之用生虎骨刮末擦咬處即愈或刮肉店墩板上油膩拌砂糖敷效積德堂方常犬咬傷蓖麻子五十粒去殼以井花水研膏先以鹽水洗傷痛處貼之袖珍方猘犬咬傷地黃搗汁飯餅塗之百度愈百一方一方用床腳下土和水敷之灸七壯本草拾遺癲犬咬傷用槐樹白皮一塊安傷處再以白麵作圈圍之內以人糞填滿蓋槐皮一塊用大艾灸十四五壯候熱透身上出汗即愈胡臬臺急救方瘋犬咬傷此乃九死一生之症宜於無風處用熱小便擠去惡血再以荔枝殼或胡桃殼填滿人糞灸七八十壯或一二百壯以其人臭汗出大困為度經驗廣集一方用瓦松雄黃研貼即不發生生編犬傷救急方一切惡犬咬傷如倉卒無藥即以百草霜麻油調敷或用蔥搗爛貼之牛糞敷之或蚯蚓糞敷之或口嚼杏仁爛敷之皆能救急如少延緩恐毒氣入經為害不淺因陳古方附避犬法凡行路遇惡犬即以左手大拇指掏寅上吹氣一口輪至戌上掏之犬即退伏瑣碎菉貓咬傷薄荷汁塗之有效戴原禮方貓咬成瘡雄鼠屎燒灰油和敷之曾經效驗壽域神方鼠咬傷取貓涎敷之或貓屎揉之即愈同上一方用斑蝥燒灰麝香少許津唾調敷單方纂要鼠咬傷痛貓頭燒灰油調敷之瘥為度趙氏經驗方壁虎咬傷以清水淋壁上注傷處自愈簡便方蟲咬傷蟲傷獸齧端午日取白礬一塊自早日曬至晚收用凡遇蟲獸咬者將此礬末敷之效夏氏簡易方諸蟲毒傷用燈草蘸油點燈以燈煙燻之極效同上一切毒蟲傷將近鼻三五寸牛鼻繩和冷水搗汁敷之立解敬修齋方一方用五靈脂末塗之立愈金匱鉤玄百蟲咬傷以燈火熏之出水妙濟生編諸色惡蟲咬傷薑汁先洗用明礬雄黃貼之立效屢驗神方一方用香油浸紫蘇塗之十便良方諸蛇咬傷用刀一把燒紅置白礬於上汁出熱滴之立瘥貞元十三年有兩僧流南方到鄭州俱被蛇咬令用此法便瘥更無他苦劉禹錫傳信方一方用自己新鮮大糞擦傷處即愈永不爛屢驗海上方惡蛇咬傷地松搗敷之易簡方一方用開口椒及葉搗封之良肘後方毒蛇咬傷用針刺傷處出血以泥蛤蛥搗爛敷咬處即好備急方蛇傷爛入骨者白芷末加膽礬麝香少許日日摻之立愈單方摘要蛇傷目黑口禁毒入腹中熟雞子數枚合著傷處頻易以除其毒普濟方蛇傷手腫新剝羊肚一個帶臭割一口將手入浸即時痛止腫消醫學大成赤白蛇纏用𥂦糞杓上竹箍燒灰研細用香油或麻油調搽患處即愈宜良李氏刊方赤練蛇咬先用活雞刀割一塊貼咬處換貼二三塊自愈集驗方蛇咬久潰小茴香搗末敷之千金翼蛇虺咬傷生蠶蛾研敷之必效方虺蝮咬傷其毒內攻即死立將傷處用繩絹扎定勿使毒入心腹令人口含米醋或燒酒吮傷處以吸拔其毒隨吮隨吐隨換酒醋再吮俟紅淡腫消為度吮者不可誤咽中毒奇效良方附治蛇法蛇畏雄黃凡居山野陰濕之處每用雄黃丸如桐子大燒煙以薰衣袍被褥之類則毒不敢侵而蛇皆遠避矣景岳全書蜈蚣咬傷鹽湯洗傷處痛止用劉寄奴擦之或吳茱萸搗爛敷之或白鯗皮貼之或雄黃糞擂水塗之單方彙編蠍螫傷蠍有雌雄兩種雄者螫人痛在一處以井底泥敷患處干則再易雌者螫人痛牽遍體以瓦溝下泥隨痛處搭之若無雨以新汲水從屋上淋下取泥肘後方八腳蟲傷其蟲隱壁間以尿射人遍身生瘡狀如湯火傷用烏雞翎燒灰雞子清調敷勝金方壁錢傷即奇虫尸𮥼也用白礬塗之經驗良方蟢蛛傷俗名壁蟢其蟲咬人至死惟用桑柴灰入滾水攪過澄清調生白礬塗咬處旋干旋塗即愈孟氏幼科蜂傷牛屎蟹殼人參甘草芋頭葉並大蝸牛搗爛俱可塗之乾坤生意蜂蠆傷蟹殼燒存性研末蜜調塗之證治要訣鐵胡蜂螫傷取芋艿莽擦患處其腫即止無莽用子亦可活法機要毒蜂刺傷薄荷葉按貼之或蚯蚓糞塗之外臺秘要毒蜂螫傷將死者將陽物垢手掏擦患處奇方類編一方取蜂房為末豬脂和敷或煎水洗孫真人方蛓毛傷馬齒莧搗熟封之甚效靈苑方一方用甘草湯洗即愈或即將蛓毛肚腸搽於患處其痛亦緩吳興楊氏傳方蜘蛛傷用蔥一枝去尖頭將蚯蚓入蔥管中緊掏兩頭令勿泄氣頭搖動即化為水以點咬處甚效譚氏兒科一切蛇蠍毒蟲螫傷雄黃麝香蟾酥草烏胡椒各等分為錠熔蠟成之水磨塗用簡要濟眾方蛇蠍蜈蚣蜘蛛咬傷灸法凡蛇蠍蜈蚣蜘蛛咬傷痛急勢危者急用艾火於傷處灸之拔散毒氣即安或用獨蒜片隔蒜灸之二三壯換一片毒甚者灸五六十壯刺灸心法蠶咬成瘡者蜜調麝香敷之廣利方桑蟲咬丁香末蜜調塗之聖惠方蛘辣俗名羊夾咬以蚯蚓泥乾擦之或細嚼甘草敷之俱妙簡易良方蚯蚓咬或於地上坐臥不覺咬腎陰腫鹽湯溫洗數次甚效同壽菉毒蟻螫人用梳垢封之立愈瀕湖集簡方附蚊蟲鴿屎水龍骨風茄花研末和勻燒煙燻之絕種經驗廣集附壁蝨即臭蟲羊骨頭一個秦椒半斤共入火盆內同鋸木屑燒之門牖閉緊勿令出煙其蟲自死同上附衣蝨百部秦艽為末燒煙燻之並煮湯洗衣青囊萬選諸刺入肉傷刺入肉中百理不瘥松脂流出如乳頭香者敷上以帛裹三五日當有根出不癢不痛不覺自安兵部手集針刺入肉螻蛄蟲一個搗爛敷刺處即出經驗良方針刺折在肉內刮人指甲末用酸棗搗爛塗之次日定出聖惠方拔箭頭並竹木刺肉陝州出的花蕊石擇其形似硫黃有白班頭者二兩煅七次研末擦之自出宜良李氏刊方竹木刺入肉鮮蟹黃雀糞共搗爛敷之立出或以牛膝草嚼爛敷之亦妙奇方纂要竹木簽刺入肉羊糞為末水調敷刺上候痛搔之刺自出靈苑方竹刺入肉端午日取晚蠶蛾生投竹筒中令自乾死為末取少許津和塗之便民圖纂拔竹刺蓖麻子研敷刺處即出敬修齋方木刺入肉干羊屎燒灰豬脂和塗不覺自出千金方葦刺入肉生嚼栗子敷之外臺秘要蛇骨刺肉燒死鼠為末敷之危氏得效方毒物入內傷鐵物入肉用栗子三十個每人嚼一個不時敷上敷完三十個之後即出曾經試驗活人書鐵沙入肉用南瓜心貼口上即出若鉛彈入肉會走即用水銀從瘡口灌入使其不走然後設法取出四聲本草鐵箭入肉象牙刮末水和敷之即出也簡要濟眾箭鏃入肉不可拔者螳螂一隻巴豆半粒同研敷傷處微癢且忍極癢乃撼拔之以黃連貫眾湯化石灰敷之陶氏別菉一方用天水牛取一角者小瓶盛之入硇砂一錢同水數滴在內待自然化水取滴傷處即出也本草綱目瓷鋒嵌腳三角白果去殼衣心以菜油浸透搗餅貼之再易而愈如多年爛者四五次即瘥經驗良方蛇入七孔割母豬尾血滴入即出千金方蛇入人口因熱取涼臥地上有蛇入口不得出者用快刀破蛇尾納生椒二三粒裹定須臾即自退出也聖惠方百蟲入耳人乳滴之即出聖濟總菉一方用生油調銅綠滴之即出衛生家寶方一方用雄黃燒捻熏之自出十便良方飛蟲入耳生半夏末麻油調塗耳門外即出許學士本事方蠅入人耳皂莢蠹蟲研爛同鮮魚血點之危氏得效方蜈蚣入耳油煎雞肉熱盛器內以物蓋之蓋上留一小孔令患者以耳對蓋孔雞氣熏入蜈蚣盡攢雞肉上即愈同壽菉採珍集採珍集夏月置茉莉床頭能引蜈蚣蜒蚰入耳羊乳滴入耳內即化為水簡易良方螞蟻入耳精豬肉一塊炙香放耳邊即出百一選方蛆蟲入耳杏仁搗爛取油滴入非出即死扶壽精方一方用綠礬摻入即化為水摘玄方壁蝨入耳稻稈灰煎汁灌入耳內即死垂水而出江湖紀聞蚤蝨入耳菖蒲末炒熱袋盛枕之即愈普濟方黃豆入耳用鵝翎管截長二寸許去其中膜留少許於一頭以有膜之頭入耳中口吸氣即出薩氏瑞竹堂方物入耳中不可出以麻繩剪一頭散溶牛膠在上探入耳中使其物黏之徐徐引出效孫氏秘寶方麥芒入目以青布覆目中持蠐螬從布上摩之芒著布上出也千金方塵灰入目刀砍桑樹出脂水取以點眼立愈延生一術沙塵入目取活蜣螂一枚持其斧於眼上影之即出徐氏秘菉天絲入目石菖蒲捶碎左目塞右鼻右目塞左鼻百發百中或用木梳垢為小丸放眼角邊即出程氏續即得方飛絲入目用新筆於眼內運攪即收在筆上懷德堂方兔毛入目白礬拳大一塊水洗去塵以舌舔礬良久其毛從舌根上出李希舜經驗方煙滋入目好吃煙者誤犯如將別湯洗之愈洗愈痛必至瞎而後已須用亂頭髮或綜纓緩緩揉之即愈單方摘要雜物入目豬脂煮取水面如油者仰臥去枕點鼻中不過數度與物俱出聖惠方眼為物傷膽鯉魚膽各二枚雞膽三枚和勻日日點之廣濟方染鶴毒痛仙鶴或傍樹枝或臥叢草將頭搔癢遺有頂毒黏在樹草間人以手摸腳踏登時赤腫疼痛異常急以青松毛和糯米飯同搗敷之立瘥林泉備用凍裂傷凍瘡記所凍之處來年櫻桃上市擦之當年不發曹氏驗方一方用橄欖核燒研油調塗之乾坤生意凍耳用薑汁煎塗錢青掄方凍腳根用茄根煎湯洗同上一切凍瘡年久不愈者於六月初六日十六二十六用獨囊蒜杵爛日中曬熱塗於凍發之處即於日中曬乾忌患處著水醫宗金鑑凍瘡發裂用甘草煎湯洗之次以黃連黃柏黃芩末入輕粉麻油調敷攝生眾妙方凍瘡皸裂桐油一碗發一握熬化瓶收每以溫水洗令軟敷之即安劉氏保壽堂方凍瘡裂痛乳汁調黃柏末塗之黎居士易簡方手足凍裂五倍子為末同牛骨髓填裂縫內即安如無牛骨髓牛鼻繩末亦可秘方集驗一方用附子去皮為末以水面調塗之良談野翁方手裂松毛扁柏葉臭梧桐葉冬青葉棉花核共搗爛作團燒煙燻之自愈月潭朱氏驗方手足開裂經春夏不愈者瀝青二兩黃蠟一兩共熬熱攪勻瓦罐盛貯先以熱湯洗令皮軟拭乾將藥於慢火炙溶敷之壽域神方一方用生薑汁紅糟鹽同臘月豬膏研爛熱擦入皸內一時雖痛少頃便軟皸合再用即安同上腳凍開裂用敗荷葉梗燒存性合頭垢煎桐油熱和調膏抹成一塊臨用切作小條掗在裂中效衛生寶鑑凍腳裂坼蒸熟藕搗爛塗之普濟萬腳坼破裂凡冬月患此行步疼痛用湯洗淨拭乾將黃蠟一兩溶化入松香末三分以少許安刀頭上溶化滴入坼中即效生生編一方用蛇殼亂頭髮各二兩鮮豬板油二斤用清水二十飯碗鍋放露天同此三味入銅鍋煮去氣以棍頻攪熬至殼發無形為度後入黃蠟四兩溶化和勻傾入極厚瓷缽待其自凝患裂者先以溫湯洗淨臨臥用抿子腳挑抿裂內立時定痛冬至日合者更效赤水玄珠附屍腳圻裂烊膠著布上烘貼之千金方
