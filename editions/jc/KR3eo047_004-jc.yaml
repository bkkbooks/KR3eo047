body:
  text: 卷四奇症頭風畏冷一人頭風首裹重綿三十年不愈以蕎麥粉二升水調作二餅更互合頭上微汗出即愈李樓怪證方頭疽生蛆頭皮內時有蛆出以刀切破擠絲瓜葉汁搽之蛆即盡絕根小山怪證方頭腦鳴響狀如蟲蛀名大白蟻以茶子為末吹入鼻中取效醫方摘要腦上癰癤石灰入飯內搗爛合之李樓怪證方腦漏流膿破瓢白雞冠花白螺螄殼各等分共燒存性血竭麝香各五分研為末以好酒灑濕熟艾連葉揉成餅貼在頂門上用熨斗熨之以愈為度王帶存奇疾方鬼剃頭一名油瘋生頭髮內毛髮脫落成片皮膚色紅光亮甚癢亦有生鬚眉間及面部用海艾藁本菊花蔓荊子防風荊穗薄荷藿香甘松各二錢水五六碗同藥煎數滾連湯共入敞口缽內先將熱氣熏面候湯稍溫用布蘸洗日洗二三次洗後避風忌食魚腥發物醫宗金鑑人面瘡一人生瘡如人面雙眼口鼻俱全且能食物用雷丸三錢研為細末加入輕粉白茯苓各一錢調勻敷上即消岐天師別傳眉毛不生烏麻花陰乾為末以烏麻油漬之日塗奇方纂要一方用半夏芥菜子各等分為末生薑自然汁調搽數次即生簡易良方眉毛忽落用桑葉七爿每日洗之一月重生如舊須落亦然石室秘菉眼長異肉有人眼內長肉二條長一寸如線香之粗觸出於眼外此乃祟也雖是肝膽之火無祟則不能長此異肉用冰片黃連甘草各一分硼砂半分共研細末無聲為度用人乳調少許點肉尖上覺眼珠火炮出一時收入而愈同上耳內長肉有人耳內忽長肉一條手不可近色紅帶紫乃腎火滕燒於耳也用硼砂冰片各一分點之立化為水同上耳中有核大如棗核痛不可動者以燒酒滴耳中仰之半時即可鉗出李樓怪證方鼻中生線鼻中生紅線一條長尺許少動之則痛欲死人以為飲酒之病也而余以為不然是祟也用硼砂冰片各一分研為末以人乳調之輕輕點在紅線中間忽然覺有人如將病人打一拳一般頃刻即消奇絕之方也蓋硼砂亦是殺祟之物也岐天師別傳瘡生舌上一人忽生瘡於舌上吐出在外寸余上結成黃靨難以食物人以為病在心也心熱故生此瘡此亦近理之談而不知非也有祟以憑之也方用冰片一分入在蚌口內立化為水乃以鵝翎敷掃其上立刻收入其舌便可飲食矣蚌乃至陰之物以至陰攻至陰之邪則邪自退走況又加以冰片之辛溫逐邪不遺餘力自然手到功成也同上舌腫出口不入此蜈蚣毒也急用蓖麻子取油作捻燒煙燻之即收入傳家室舌腫破棺散腫大塞滿脹硬即時氣絕名為翣舌用皂礬不拘多少新瓦上火煅變紅色放地上候冷研細將病人拗開牙關用此擦舌立愈重舌木舌同治並效南陽活人書重舌涎出水漿不入者用元精石二兩牛黃硃砂龍腦各一分共為末以針刺舌上去血鹽湯漱口摻末咽津效聖惠方產後舌出不收用丹砂敷之暗擲盆盎作墜地聲驚之即自收奇方類編唇瘡出齒有人唇上生瘡久則瘡口出齒牙於唇上者乃七情憂鬱火動生齒奇症也用冰片一分殭蠶末一錢黃柏炒為末三錢摻之自消齒矣岐天師別傳喉中生肉綿裹箸頭掛鹽揩之日五六度孫真人千金方喉痛怪病有人喉中似有物行動吐痰則痛更甚身上皮膚開裂有水流出目紅腫而又不痛足如斗腫而又可行真絕世不見之症此乃人食生菜有蜈蚣在葉上不知而食之乃生蜈蚣於胃口之上入胃則胃痛上喉則喉痛飢則痛更甚也方用雞一隻煮熟五香調治芬馥之氣逼人乘人睡熟將雞列在病人口邊則蜈蚣自然外走倘見蜈蚣走出或一條或數條立時拿住不可任其仍進口中蓋喉間走動惟蜈蚣非他物所能也自出盡後則皮膚之裂自愈而足腫如斗亦消矣華仙師乩方發症飲油有人胸喉間覺有癥蟲上下嘗聞蔥豉食香此乃發癥蟲也二日不食開口而臥以油煎蔥豉令香置口邊蟲當出以物引去之必愈王燾外臺秘要一方病發癥者欲得飲油用油一升入香澤煎之盛置病人頭邊令氣入口鼻勿與飲之疲極眠睡蟲當從口出急以石灰粉手捉取抽盡即是發也初出如不流水中濃菜形夏子益奇疾方毒生蛇形一人身上乃頭面肉上浮腫如蛇形用兩滴磚上苔痕水化開塗蛇頭立消危氏得效方脊縫出蝨有人背脊裂開一縫出蝨千餘此乃腎中有風得陽氣吹之不覺破裂而蝨現方用蓖麻子三粒研成如膏紅棗三枚去核搗成丸如彈子大火燒薰衣上則蝨死而縫自合張仲景外函蝨瘤怪病一人背發一塊心甚兀兀四肢倦怠飲食不進一醫曰此蝨瘤也剖開果有蝨合許用生甘草泡湯洗淨拭乾將多年油木梳煅灰為末菜油調搽立愈竇漢卿全書腋下瘤癭一老嫗右腋下生一瘤漸長至尺許其狀如長瓠子久而潰爛一方士以長柄茶壺蘆燒存性研末擦之水出消盡而愈李瀕湖集簡方蚓鳴怪病浙西張將軍病蚯蚓咬毒每夕蚓鳴於體一僧教以濃煎鹽水浸身數次而愈本草備要皮膚有聲有人皮膚手足之間如蚯蚓唱歌者此乃水濕生蟲也用蚯蚓糞水調搽患處厚一寸即止鳴石室秘菉掌高怪病人掌中忽高起一寸不痛不癢此乃陽明經之火不散而鬱於手也論理該痛癢而今不痛癢不特火鬱於腠理而且水壅於皮毛也用附子一個煎湯以手漬之至涼而止如是者十日必然作痛再漬必然作癢又漬而高者平矣蓋附子大熱之物無經不入雖用外漬無不內入者也或附子湯中再加輕粉一分引入骨髓更為奇效耳同上手現蛇形人手上皮上現蛇形一條痛不可忍此蛇乘人之睡而作交感於人身乃生此怪病用刀刺之出血如墨汁以白芷研末摻之稍愈明日又刺血如前又以白芷末摻之二次化去其形先刺頭後刺尾不可亂也同上臍長如蛇人有臍口忽長出二寸似蛇尾狀而又非蛇不痛不癢此乃祟也法當以兒茶二錢雄黃白芷各一錢麝香冰片硼砂各一分共為末將其尾刺出血必然昏暈欲死急以藥點之立刻化為黑水而愈如不愈則聽之不可再治蓋妖旺非藥能去之非前世之冤家即今生之造孽也同上臍蟲怪病腹中如鐵石臍口水出旋變作蟲行繞身匝癢難忍撥掃不盡濃煎蒼朮湯浴之再用藥調治瘡瘍全書身如蟲行風熱也用鹽一斗水一石煎湯浴之三四次亦療一切風氣外臺秘要一方用大豆水漬絞漿且且洗之或加少面沐發亦良千金翼腸頭挺出蟾蜍皮一片瓶內燒煙燻之並敷之同上一方秋冬搗胡荽子即原荽也醋煮熨之甚效孟詵本草腹內鱉癥陳醬茄兒燒存性入麝香輕粉少許脂調貼之壽域神方臥忽不寤若以火照之則殺人但唾其面而痛齧其踵及大趾甲際即活取韭搗汁吹入鼻中冬月則用韭根葛稚川方晝夜不眠以新布火炙熨目並蒸大豆更番囊盛枕之冷即易終夜常枕之即愈同上海水傷裂凡人為海水咸物所傷及風吹裂痛不可忍用防風當歸羌活荊芥各二兩為末和蜜半斤水酒三十斤煎湯浴之一夕即愈使琉球菉癩風怪病一云即大麻風也初起發在遍身麻木次生白屑紅斑蔓延如癜形若蛇皮鬚眉脫落內地少有此症惟煙瘴地面多有之用硫黃寒水石枯白礬貫眾各二兩蛇床子一兩朴硝五錢共研細末臘月豬脂搗爛調搽遍身兼用地骨皮荊芥苦參細辛各二兩河水煎湯浸浴熏洗須要清心寡慾戒口早治或有可生若口味不能清淡色欲不能斷絕即愈後仍不免再發終於不救陳氏經驗方屍痊鬼疰凡遇屍喪玩古廟入無人所居之室及造天地鬼神壇場歸來暴絕面赤無語者名曰屍痊亦曰鬼疰即俗言中祟之謂也宜移病人東首使主人焚香北面禮拜之更行火醋熏鼻法則可復甦否則七竅流血而死用醋一升炭火一盆不住以醋沃之令患者鼻受醋氣則蘇濟世奇方中諸鬼祟人為鬼附昏迷笑哭或作鬼語急將兩手大指縛作一排用艾圓嵌中間爪中盡頭連肉處灸七壯或十七壯鬼即去秘方集驗鬼擊卒死用烏雄雞血塗心下即蘇風俗通鬼擊諸病卒然著人如刀刺狀胸脅腹內切痛不可抑按或吐血鼻血下血一名鬼排以醇酒吹兩鼻內良肘後方鬼箭打用山梔炒面炒桃頭七個杵餅貼次日作七丸投炭火中燒響即愈單方全集神箭狗骨燒灰三錢山梔七個面飛糖各一兩醋調敷不可針刺錢青掄方女人病邪女人與邪交通獨言獨笑悲思恍惚者用雄黃一兩松脂二兩溶化以虎爪攪之丸如彈子大夜燒籠中令女坐上被蓋露頭在外不過三次自斷肘後方產後肉線產後有肉線垂出約長三四尺觸之痛引心腹欲絕者此係過於用力所致不可扯斷斷則難治矣老薑連皮搗爛三斤麻油二斤先用舊絹一塊疊作長方式將肉線輕輕盛起使之屈曲作三團納入產戶再將前藥拌勻炒乾乘熟盛於絹袋就近熏之稍溫即另換熱者熏一日可縮入大半再熏一日全愈南嶽仙方九竅出血因暴驚所致甚有四肢指岐皆出血以石榴花揉塞之取效無花葉亦可海上方一方用牆頭苔挼塞之簡易良方血箭發無定處血從毛孔射出白石灰半升用水潑成末與大黃一兩五錢切片同炒以灰變紅色為度去大黃將石灰篩細以涼水調敷或用金墨研末醋調涼塗其血即止金鑑血痣初起如痣色紅如豆觸破時流鮮血用花蕊石五錢火煅入童便淬之七次草烏南星白芷厚朴紫蘇羌活乳香沒藥龍骨煅輕粉細辛檀香蘇木當歸蛇含石火煅童便淬三次降真香各二錢麝香三分共為細末臨用時撒於患處同上血痣潰出一人向有一痣偶抓破血出如線七日不止欲死用五靈脂末摻上即止夏子益奇疾方發背欲死冬瓜截去頭合瘡上瓜爛截去更合之瓜未盡瘡已小斂矣乃用膏貼之王帶存奇方疾陰毒腹痛厥逆唇青卵縮六脈欲絕者用蔥一束去根及青留白二寸烘熱安臍上以熨斗火熨之蔥壞則易良久熱氣透入手足溫有汗即瘥若熨而手足不溫不可治南陽活人書毒癰紅腫有人腰間生一毒癰紅腫未破皮痛不可忍俯躬而行一人取新殺牡豬肝切片如毒大貼上外以布纏定一對晝其病良已肝色變黑臭不可近棄之地狗不食下有小指大一點尚硬乃肝小末貼滿所致竟亦無他張在五奇症方異疽似癰而小異濃如小豆汁今日去明日滿用蕓薹葉即今油菜也搗熟布袋盛於熱灰中煨熱更互熨之不過三二度無葉用乾者千金方骨疽不愈愈而復發骨從孔中出者蕪菁子搗敷之用帛裹定日一易之貞元廣利方惡肉毒瘡一女年十四腕軟處生物如黃豆大半在肉中紅紫色痛甚諸藥不效一方士以水銀四兩白紙二張揉熟蘸水銀搽之三日自落而愈李樓怪證方本草拾遺人患瘡疥多以水銀塗之性滑重直入肉宜謹之頭瘡更不可用恐入筋絡必緩筋骨百藥不能治也砒亦不可輕用附識於此使人知非萬不得已不可輕用指頭腫毒痛甚者烏梅肉和魚鮓搗之封患處妙同上瘡口生骨有人患腫毒潰後不時出一細骨用生桐油調密陀僧末如膏絹攤貼即愈洞天保生木癡成瘡南方多雨有物曰木癡大類鼻涕生於古木之上聞人氣則閃閃而動人過其下墮人體間即立成瘡久則遍體以硃砂麝香塗之即愈張杲醫說豌豆癍瘡比歲有病天行發癍瘡頭面及身須臾周匝狀如火燒瘡皆出白漿隨決隨生不治數日必死瘥後瘢點彌歲方滅此惡毒之氣所結云晉元帝時此瘡自西域東流於華內宜取好蜜通摩瘡上以蜜煎升麻數數拭之奇方類一方用蕓薹葉煎湯洗之秘菉一方用馬齒莧燒研敷之須臾根隨藥出不出更敷肘後方浸淫惡瘡有汁多發於心不早治周身則殺人熬秫米糯米也令黃黑杵末敷之同上天火熱瘡初起似疿漸如水泡似火燒瘡赤色急速能殺人蕓薹葉搗汁調大黃芒硝生鐵衣各等分搽之近效方蛇尾瘡有人瘡口出數寸狀如蛇尾用硫黃末塗之即消奇疾方反花惡瘡肉出如飯粒根深濃潰柳枝葉三斤水七升煎汁五升熬如湯日三塗之同壽菉一方用雞腸草研汁拂之或為末豬肝調搽極效醫林正宗一方用馬齒莧一斤燒研豬脂和敷綱目金絲瘡形如繩線鉅細不一上下至心即死治法於瘡頭截住刺之出血後嚼浮萍塗之愈秘方集驗火珠瘡其瘡如珠始於發中相染不已亦有傷命者用生蘿蔔搗爛將滴醋浸敷患處愈同上穀道生瘡荇葉搗爛綿裹納之下部日三次範汪方𤸔瘡如眼上高下深顆顆累垂如瞽眼其中帶青頭上各露一舌毒孔透里者是也用生井蛙皮燒存性為末蜜水調塗之直指方九瘻有孔苦瓠四枚大如盞者各穿一孔如指大湯煮十數沸取一竹筒長一尺一頭插瓠孔中一頭注瘡孔上冷則易之用遍乃止千金翼口中生蕈用醋漱口以茄母燒灰飛鹽等分米醋調稀時時擦之葉氏摘玄珠倒掛凡人胸間兩旁各生紅白瘰泡浸淫痛癢每處直長一條連生十餘個不等名曰簾珠倒掛久則殺人諸藥難效用端午日人家檐口所掛刀茅取下連根葉切碎煅末香油調搽五六次即愈屢試屢效濟世便易集交感脫精久曠縱欲之人交感樂極男女脫精當此之時仍須抱住切不可離爐即欲離爐亦須緩緩取出不可見其死去驚走下床也離爐抱住其身尚不至死男脫則女以口哺送其熱氣女脫則男以口哺送其熱氣並以指捻住尾間一連數口呵之則陽氣重回陰精不盡流出倘一出玉爐彼此不相交接必立時身死此等症富貴人多而貧賤人少夜死者日救之則活日死者夜救之則之也石室秘菉孫真人曰交感脫精用人抱起坐之以人之口氣呵其口又恐不能入喉以筆管通其兩頭入病人口內使女子呵之不必皆妻妾也凡婦人皆可盡力呵之雖死去者亦能生妙法也同上脫陽危症凡人大吐大泄之後四肢厥冷不省人事或與女子交後小腹腎痛外腎搐縮冷汗出厥須臾不救先以蔥白炒熱熨臍後以蔥白三七莖搗爛用酒煮灌之救急方烏鴉雞狗翻其形頭痛頭沉眼黑噁心胙心兩膊發虛急用竹箸分開口捲舌驗之如有紅青黑紫泡者即此病也用針刺破或雄黃末如無或泡藥點之用白滾湯和藥灌之即用綿被蓋身出汗而愈沈心齋異症方兔子翻其形直走不停用泡藥和水走直即灌灌過歪倒用濕土埋頭聞土氣即愈同上母豬翻其形拱地先以針挑其舌根惟二大指不挑餘八指指甲蓋兩旁邊各挑一針然後將白滾水入豬食盆內和水灌之即愈同上長蟲翻其形肚腹脹痛就地打滾急挑肚臍三針頂門一針足心二針即愈同上纏絲翻其形頭疼肚脹心翻前後心如有黑紫黃眼者用針挑以醋擦之周身麻木無此眼者即心生痧子治法將手腕足腕各挑一針炒鹽和滾湯灌之即愈同上啞叭翻其形不能言語用鞋底沾水打頂門女人有孕者將頂發分開使手沾涼水輕打頂門即愈同上蝦蟆翻其形在肚臍圍圓用針挑肚臍七針小肚七針即愈同上兒生如泡一小兒初生如魚泡又如水晶碎則流水用密陀僧羅極細摻之即愈名醫類案兒生赤爛無皮一小兒初生遍身俱是赤肉無皮乃因母自懷胎十月樓居不受土氣故也將兒放在泥地臥一宿其皮漸生神效同上一方嬰兒生下無皮或因父母素有楊梅結毒傳染胞胎故生下或上半身赤爛或下半身赤爛甚至色帶紫黑用未經水濕成塊石灰四兩用水泡之沒指半許露一宿面上有浮起如雲片者輕輕取之微帶清水視其多寡對小磨香油亦如之以順攪成膏為度用雞翎搽之自愈或用生黃柏煅石膏各等分共研為細末撲之濕則干撲干則用緒苦膽調搽效醫指結餘下部蟲䘌病人齒無色舌上白喜睡憒憒不知痛癢處或下痢乃下部生蟲食肛也梅葉桃葉一斤杵爛蒸極熱納小器中隔布坐蒸蟲盡死也余居士選奇方下部䘌蟲痛癢膿血旁生孔竅蜣螂七杭五月五日收者肥羊肉一兩新牛糞五錢炒黃同搗成膏丸蓮子大炙熱綿裹納肛中半日即大便中蟲出四度湧瘥董炳奇疾方飛絲纏陰腫痛欲斷以威靈仙搗汁浸洗一人病此得效李樓怪證方陰腫如斗取生諸葛菜根洗去泥舂爛封之即消如無鮮者以枯者水浸搗塗亦可此方治人所不能治集療方陰囊有孔一老人腎囊上有一針孔流血不止床蓆挖洞任流諸藥不效自謂必死用炒甲片研細粉罨之以帛扎住即止隨服補血湯三四劑漸愈楓山毛氏云予見油客過壩油簍滲溜滿地身邊取出末子摻入油簍內立止予見請問云是甲片嗣後凡遇漏血諸症意擬罨之皆效和育齋驗方陰球開花狗橘七隻煎湯入罐內將陰球掛罐口離湯一二寸俟熱氣熏上湯將溫時傾盆內洗球如此三日全愈單方全集獨靈寶丹治男子八角子及婦人陰毛中生異蝨作癢用銀杏不拘多少搗爛擦上即愈錢青掄奇疾方糞門暴腫腸胃流熱下注則糞門暴腫用帶殼蜒蚰數個搗研塗之即消經驗良方糞門蟲癢有人糞門內生蟲其癢萬狀似人之勢進出而後快者此乃幼時為人戲耍乘風而入之以有此怪症也以蜜煎成為勢一條用蛇床子楝樹根各三錢生甘草一錢共研為細末同煉在蜜內導入糞門聽其自化一條即止癢而愈神方也岐天師別傳脅腿硬痛凡男婦腋肋臂腿腰間等處忽如火熱腫硬如石痛不可忍傴僂跼蹐屢治不效用糯米炊飯少加食鹽蔥管共搗罨過宿即松此法用一二次全愈其渣有飯務傾魚池或河內毛氏梓送方中肥足潰凡農家糞澆地上為烈日之氣曬逼人跣足行於此地受熱氣之毒必足趾腫痛似潰非潰俗名惹肥用鴨毛煎湯洗之即瘥同上腳趾脫疽此症發於腳趾漸上至膝色黑肉陷痛不可忍逐節脫落亦有發於手者用土蜂房煅研末以醋調搽應手而愈真神方也同上足釘異疾兩足心凸腫上生黑豆瘡硬如釘脛骨生碎孔髓流出身發寒顫惟思飲酒此是肝腎冷熱相吞用炮川烏頭敷之夏子益奇疾方腳底木硬牛皮膠生薑汁化開調南星末塗上烘物熨之筆峰雜興甲疽延爛崔氏方治甲疽或因割甲傷肌或因甲長侵肉遂成瘡腫黃水浸淫相染五指俱爛漸上腳趺泡漿四邊起如火燒瘡日夜怪憎醫不能療綠礬石五兩燒至汁盡研末色如黃丹收之每以鹽湯洗拭用末厚敷之軟帛暖裹當口即汁斷瘡干每日一遍鹽湯洗濯有濃處使淨敷其痂干處不須近但有急痛處塗酥少許令潤五日即脫上痂起依前洗敷十日痂漸剝盡軟處或更生白膿泡即擦破敷之自然瘥也昔張侍郎病此臥經六十日京醫並處方無效得此法如神外臺秘要螢火丸主闢疾病惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刃盜賊凶害昔漢冠軍將軍武威太守劉子南從道士尹公受得此方永平十三年於北界與敵戰敗績士卒略盡子南被圍矢下如雨未至子南馬數尺矢輒墮地敵以為神乃解去子南以方教子弟為將皆未嘗被傷也漢末青牛道士得之以傳安定皇甫隆隆傳之魏武帝乃稍有人得之故一名冠將丸又名武威丸用螢火鬼箭羽蒺藜各一兩羚羊角煅存性鐵錘柄入鐵處燒焦各一兩五錢雄黃雌黃礬石火燒各二兩共為末以雞子黃丹雄雞冠一具和搗千下丸如杏仁作三角絳囊盛五丸帶於左臂上從軍繫腰中居家掛戶灶除一切災害神效神仙感應篇腹中鬼哭每日用黃連煎濃汁常呷之以愈為度熊氏補遺頭臂生鳥鵲人有生鳥鵲於頭上臂上外有皮一層包之或如瘤狀或不如瘤而皮膚高起一塊者內作鳥鵲之聲逢天明則啼逢陰雨則叫逢飢寒則疼痛百藥不效必須用刀割破其皮則鳥鵲難以藏形乃破孔而出宛似鳥鵲但無羽毛耳鳥鵲出孔之後以生肌散敷之外加神膏三日後依然生合乃人不敬信神道而戲弄之耳此症予見之數次矣扁鵲之治華陀之醫皆我教之也岐天師乩方
