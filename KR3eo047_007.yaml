body:
  text: 卷七瘍科腫毒一切無名腫毒及諸毒奇方獨核肥皂生芋頭各一個蔥白七個同搗爛敷之如干即換過一周時未成者即散已成者略出膿即愈同壽菉腫毒圍法大黃五錢木鱉子三錢土炒共為細末真米醋調勻圍敷患處留出頭同上腫毒灸法一切腫毒惡瘡初起有難辨頭者先以濕紙覆其上先於處即是疽頭取獨囊大蒜去皮切片如兩錢厚安疽頭上中通一孔用火艾柱放蒜上灸之三壯換一蒜片痛者灸至不痛不痛者灸至極痛痛者灸至癢癢者灸至痛方住若不依此法則反為大害切記切記毒生頭上及腎俞穴並元氣太虛之人斷不可灸灸時無蒜以生薑切片代之古方腫毒及指上癰腫獨囊大蒜一顆百合數葉臘糟敷上神效衛生備要面毒初起急尋負胸蜒蚰三條用醬少許共搗塗紙上留一孔出氣必效方癰疽初起乾薑一兩泡炒紫色研末醋調敷四圍留頭自愈申一齋方發背初起鹿角燒灰醋和塗之日五六易孫真人方背毒未成者活蟾一隻系放毒上半日必昏憒放水中救其命再易一隻必踉蹌再易其蟾如舊則毒散矣纍試極效勿輕視醫林集效發背潰爛陳蘆葉為末以蔥椒湯洗淨敷之神效乾坤祕韞發背欲死並一切腫毒芭蕉根搗爛塗之肘後方發背敷藥巴山虎草豨蘞草車前草金銀花各等分多年陳米粉為糊調敷之奇方類編腳發背初起鹽滷甘草煎湯洗即消天蓋樓方兩腳發背紅腫針法陽陵泉穴在膝下前側一寸五分骨罅虛處八邪入穴在足十指縫中刺灸心法一切癰疽瘡斂者鱉甲燒灰存性摻之神效同上對口毒用甘蔗渣白狗屎各焙燥研末和勻用竹管將稀絹扎一管頭入藥管中篩在膏藥上貼之膏藥不拘或松香炙瘡膏亦可即垂危亦愈陳氏方身上諸毒癧串久不收口者亦效獨囊大蒜一枚加雄黃不拘多少共搗成餅貼之將艾放餅上灸一壯即愈祕方纂要移毒方凡毒發於骨節間不便出毒之處移之或上或下使無傷命殘疾之患用白芨一兩六錢紫花蒂丁八錢五倍子焙黃大黃各二錢烏雞骨煅大雄黃硃砂輕粉各一錢牙皂八分共為末以醋調敷毒之上截即移至下半截矣屢試屢驗再仍照病人之虛實另服藥餌毛楓山梓送方隔皮取膿法凡患毒入深刀難直取並患人畏懼開刀者用驢蹄皮即腳底剔下者是用砂炒蕎麥麵各一兩草烏四錢刮去皮研共為末和勻加食鹽五錢以水糊作薄餅瓦上炙微黃色再研細以米醋調攤白紙上貼患處其膿水從毛孔而出上蓋草紙滲濕再換水盡紙燥腫即可消如膿不從毛孔出者另於貼藥旁邊綻出一洞自會出膿豫試數人屢效不虛同上八寶丹治腐肉已盡新肉未生用乳香沒藥俱去油血竭輕粉各二錢兒茶龍骨鉛粉各一錢冰片五分共為極細末用筆管繃細紗篩摻上立效種福堂方收口藥煨石膏五錢厚象皮白螺螄殼各二錢煅末龍骨一錢煅熟乳香沒藥俱去油琥珀輕粉兒茶各五分共為細末摻上即愈同上疔瘡消疔散鰟皮魚一個搗爛塗上疔毒自出説約一方用雄黃末一錢爛烏梅肉三枚蜒蚰二條共搗爛塗疔上疔即拔出救急方鼻疔取花盆中青螺二三個捶爛入鹽塗上即愈慈惠小編鎖口疔用頂大蚯蚓二條小者不拘條用面搗敷如干燥時加蜜塗之後用大黃汁掃上立消夏氏簡易方繭唇疔豬腦騷焙為末和糯米糰子刺患處圍上靈丹祕藥翻唇疔以蛔蟲搗爛塗之頃刻瘡口流出黃水腫消神清次日全愈如無蛔蟲用五穀蟲一錢熯末白礬蟾酥各三分以燒酒化洋共搗勻塗疔上少刻疔破流出毒水亦效濟世便易集毛楓山云余見一少年唇口患疔並連七個頭瘇如斗心悶神昏諸醫復絶有女丐曰此名七星趕月授以此方余因記之每用治唇疔多效同上唇上疔鳳支肉三錢銀硃二分蜒蚰一條共搗爛作三次敷上立刻見效同壽祕實蔡惠公云凡疔生唇口上即看大腿彎中有紫黑筋起者急用長針刺破血出即愈同上魚臍疔疔頭深黑破裂黃水四畔出浮漿用蛇殼燒存性細研雞子清調敷吳興揚氏傳方蟹殼疔用石蟹十數只搗爛敷上不日即愈同上老鼠疔以芝麻擦三次扯去即好同上爛頭疔白梅兩個白菊花根一把大蜒蚰二條共搗爛加透明雄黃同敷如干再另易一二次無不愈者屢驗方蛇頭疔用活水蛇透脫皮胃圍上立效止痛一日全愈簡集方指上疔豬苦膽入雄黃末蜈蚣末各五分套指上扎緊愈簡要濟衆一方用挖空白蘿蔔一段入雄黃末三分蒸半熟套指上即愈經驗單方一切惡疔須疔紅絲疔白麵疔即用病人耳垢齒垢又刮手足指甲屑和勻如豆大放茶匙內燈火上灸少許作丸將銀簪挑出疔頭抹入外用綿紙一層浸濕覆上痛立止蒼生司命疔瘡敷藥硼砂炒雄黃各一錢五分信一錢共為末撥開瘡口敷之不過二次瘥活法機要疔瘡圍藥用南瓜蒂燒存性為末菜油調塗露頂愈後腐爛處即以此未摻之仇氏神方瘰癧瘰癧初起治法活蠍一隻麻油一盞浸三日取起曬乾為末以鵝毛蘸油搽上初起者名瘡母每日多搽幾次大約三五日即可愈程氏即得方一方用雄黃小麥面地龍糞各等分研末調塗效壽域神方瘰癧結核黑鉛灰和醋塗之能內消為水本事方瘰癧不論已破未破萆麻子仁四十九粒苦仁十三粒去皮尖瀝青一兩共搗千下為膏攤貼患處愈奇方類編瘰癧已潰牛皮油鞾底燒灰麻油調敷之直指方瘰癧潰爛將先潰之處麵糊作餅貼上用小砂壺二把俱盛燒酒煎滾去酒以熱壺口覆於麵餅上熏一壺冷又易一壺如此數次將毒拔盡則愈熏後用豬膽熬成膏貼瘡上經驗良方瘰癧漏用蜂房燒和豬脂塗之本草絡目瘰癧針法宜針少海穴在內臁節後大骨外去肘端五分曲池穴在手腕橫紋盡處少溪穴要病人兩手叉腰四指在外大指在內肘骨傍一分刺灸心法瘰癧灸法用獨蒜片先從後發核上灸起至初發母核而止多灸自效同上癧一作蚰破經年膿水不絶用百年茅屋廚壁土為末入輕粉調敷半月即干愈永類鈐方項邊蚰子取桃核於刀上燒煙燻之陳氏拾遺治蚰簡易方活鯽魚一個生山藥一段二味一樣長短白糖三錢搗敷神驗無比錢青掄方癭瘤論癭瘤癭瘤不同癭者連肉而生根大而身亦大瘤者根小而身大也即瘤之中又名不同有骨瘤有脂瘤有肉瘤有膿瘤有血瘤有粉瘤有筋瘤有物瘤筋瘤不可治亦不必治終身十載不過大如桃核脂瘤破去其脂粉則愈亦不必治也肉瘤最易治用黃柏五錢兒茶血竭各三錢水銀硼砂各一錢麝香冰片各三分共為細末擦於瘤之根處隨擦隨落根小者無不落也物瘤則根大最難治不時而動無故而鳴或如蟲鳴或如鳥啼必須用刀破其中孔則物自難居必然突圍而出後用生肌神藥敷之則瘤化為水平復如故矣此乃不敬神鬼觸犯歲君而得病不可測非理可談故吾內經不言岐天師別傳附生肌神藥麒麟血竭三七根末千年石灰各三錢兒茶二錢人參象皮乳香去油沒藥廣木香末各一錢輕粉五分冰片三分共為極細末研至無聲為度修合時須用端五日不可使一人見並忌雞犬同上點癭桑炭灰棗木灰黃荊灰桐殼灰各二升半蕎麥灰炒共以沸湯淋汁五碗許入斑蝥四十個穿山甲五片乳香冰片不拘多少後入煎作二碗以瓷器盛之臨用時入新石灰調膏敷干則清水潤之神效赤水元珠贅癭焦法甘草煎膏筆搽瘤之四圍上三次乃用芫花大戟甘遂等分為末醋調別以筆搽其中勿近甘草次日縮小又以甘草搽小暈三次如前仍上此自然焦縮危氏得效方頭上生瘤大者如拳小者如栗或軟或硬不痛不疼用大南星一枚細研稠黏用米醋六七滴為膏如無生者即用乾者為末醋調如膏先將小針刺患處令氣透即以膏攤紙上如瘤大小貼之同壽菉眼皮生瘤櫻桃核磨水搽之蘭室祕藏喉瘤硼砂三錢冰片膽礬各三分共研細末用時以箸頭蘸藥點之即效醫學集成血瘤日久自破以發灰摻之外以膏藥護好自能斂口收功崔氏纂要粉瘤紫荊花梗灰豆梗灰茄梗灰爐灰各等分共和勻用熱酒調如泥塗瘤四圍中留小頂不塗數次漸軟即消愈簡要濟衆赤瘤一名丹瘤頦下如櫻桃突出色赤而光謂之赤瘤用綿羊腦子同朴硝研爛貼患處立效或以萆麻子同面研和敷之醫鏡一方用慈菰葉搗敷二三次即退本草發明番花瘤用馬齒莧一斤燒灰研細豬脂調敷集簡方箍瘤膏凡瘤初起者箍之可以消除已成者箍之不致再大用海藻昆布莞花各二錢以青炭灰水熬化成膏加入米醋一飯碗再將生南星生半夏五倍子各一兩共為細末加風化石灰二兩炒紅色大黃末二兩收為膏箍之百日為度箍過百日初起者如不消盡再箍俟消盡不箍已成者箍過百日自然不大不用再箍矣梓送經驗方項後疙疸不論大小及日月久近或赤硬腫痛生山藥一挺去皮萆麻仁十粒研勻攤布上貼之如神奇方類編疣痣疣瘤初起稻上花蜘蛛十餘個置桃枝上待絲垂下取東邊者捻為綿系之七日一換自消落也總微論一切疣痣兼點息肉雞眼風化石灰桑柴灰各一斤鮮威靈仙六兩煎濃汁淋二灰取汁熬成稀膏瓷器收貯臨點患處不必挑破應手而除種福堂方面上粉痣益母草燒灰嬰條石各等分和勻調敷自去傳家寶磨堅丹取雞真內黃皮不下水去其渣滓擦數次自消其皮即埋土內以物壓之瘍科選梓一法但聞老鷹即抓雞者叫即暗以手拂其疣三下數次自消同上點痣散糯米百粒石灰一塊大指大巴豆三粒去殼共為細末入瓷瓶同窨三日以竹籤挑粟大一些點上自然蝕落同上一方用茄梗灰淋汁點之本草綱目去痣捷便法用銀圭主少許點之自落祝由科汗斑汗斑用青布三尺再用瓦松不拘多少煎濃汁去渣入信石末少許於湯內將青布煮乾以布蘸涼水擦之數次除根夏氏簡易方一方用海鰾鮹三個硫黃焰硝白礬各三錢共為末以生薑醋擦患處立效方鈔白點汗斑夏枯草煎濃汁日日洗之袖珍方赤白汗斑白附子硫黃各等分共研末薑汁調稀茄蒂蘸擦蒼生司命癜風汗斑端午日收紫背浮萍曬乾每以四兩煎水浴並以萍擦之或入漢防己二錢亦可經驗良方夏月汗斑如疹密陀僧八錢雄黃四錢先以薑片擦熱仍以薑片蘸末擦之次日即焦活人心菉一方用小麥草燒灰入滾水中熱洗四五次即愈敬修齋方諸癬惡癬胡椒一錢白砒三分研為極細末外用杜大黃根搗爛加潔白糖二錢取用藥四釐入大黃根拌勻以麻布包將癬用穿山甲括破用藥包擦之不過數日愈南衡祝氏傳方頑癬練樹皮杜大黃根白薇各一兩蝸牛火焙乾有殼亦可用輕粉各三錢冰片生甘草各一錢研為細末先以荔枝殼抓碎其癬皮而後以此藥末用麻油調搽之三日即結靨而愈石室祕菉圈癬谷樹皮剪如癬樣大小以毛背一面用唾貼肉以手不時撲之即愈祕方集驗風癬即乾癬川椒小麥苦楝根皮各等分水煎三五沸熏洗其效如神治癬傳方吃髮癬煨石膏末糖調塗神效便易良方一方用白附子升藥初起加人言少許擦之同壽祕寶頸面花癬以臘梅花葉擦之即瘥梓送經驗方一方如老年人頭頸燥靨癢痛以熟地汁塗之即愈同上一方如兩腳陰面濕癬以荸臍蘸鐵線粉即火炮中刮下繡粉擦之立瘥同上臉癬其大如錢抓之有白屑者緑豆捶碎以紙蒙碗口針刺多孔以碎豆鋪紙上用炭一塊燒豆豆灼盡紙將焦去豆揭紙碗中有水取搽三五次即愈奇方類編眼癬生豬油三錢卷粗紙內燒之油滴杯內時時搽之立效思誠堂梓送方牙癬蒲黃青黛各等分研細末擦之效簡便方喉癬或紅或白作癢而有瘰者用大喎牛瓦上炙脆一錢曬乾灰莧頭五分冰片三分共研細末和勻吹患處不分虛實暫久俱效程氏續即得方乳癬煉白松香二錢川椒二十粒共研為末用槐枝煎湯淨洗片時將藥和豬油調搽之桂軒隨菉陰癬河魨魚皮放小罈內埋土中久化為水取搽癬上立愈端素齋驗方荷葉癬田螺一個開靨入信二分待肉化水抹上即愈古方楊梅癬枯礬硫黃各一兩八錢川椒三錢雄黃膽礬輕粉各一錢用生板油去皮入藥擦破數次其效如神濟生祕覽鵝掌癬川烏草烏何首烏花粉赤芍防風荊芥蒼朮地丁各一兩艾葉四兩煎先熏後洗層層起皮痛癢愈醫方祕菉一方用豆腐泔水洗手愈濟世便易集牛皮癬以桃樹根同膽礬搗爛敷之神效青浦徐氏方牛皮癬及年久頑癬用牛皮燒灰油調敷立愈赤水元珠牛皮血癬九硫一信三巴豆俱為細末菜油調古仙方馬癬獨囊蒜搗爛加明礬三兩入如醋一杯頓滾先以𥫝樹葉擦破用筆蘸搽瘍科選梓蛇皮癬苦參明礬白芨膽礬土槿皮各一兩白砒三錢共為末先以鬼揚柳煎水同豆腐泔水煎熱洗浴然後以滴醋調勻蒸熱敷之須敷四五次愈硤川沈氏梓方魚鱗癬鯉魚頭一個五倍子三粒俱燒灰杵細青油調鵝翎塗不拘遍數瘍科選粹狗癬疹柏油不拘多少鐵器內熬次下鵓鴿糞雞糞同和加香油少許擦之同壽菉狗疥癬黃柏白礬等分川椒樟腦此二味略減些共研為末先用礬湯洗患處然後油調藥末敷之數次即愈宜良李氏刊方疥癬黃柏白膠香輕粉各等分為末羊骨髓和敷之儒門事親諸風大麻風遍身麻木次生白屑皮兼起紅斑鬚眉脫落用桑皮大黃芒硝各一撮水煎無風處洗每日一次如有蟲加鴿屎同煎如爛用琥珀末搽患處此方神效廣利方癘風黑狗脊如無以杜仲代之硫黃寒水石枯白礬各二兩蛇床子一兩朴硝少許共為末用臘豬油或香油調敷不爛不必用大者遍身塗之方鈔紫白癜風遍身色紫暗斑者名紫癜風遍身粉紅斑中有白點者名白癜風用禿菜根同白礬五倍子無名異和醋搗碎先以苧麻刮熱以藥擦之三四次絶根靈苑方雲頭白癜用花紅擦之永不再發已經試驗和育齋方男子腎囊濕陽痿女人陰癢用蛇床子煎湯洗之立愈種福堂方腎囊風一名琇球風將雞蛋煮熟去白留黃炒出油再用老杉木燒灰存性調油塗之同上紫雲風遍身發紫血泡痛癢有蟲用蛇床子夏枯草煎湯洗數次瘋塊即退攝生衆妙方面遊風面生起白皮形似細魚鱗用羌活一兩麻黃五錢升麻防風各二錢白芨白檀香當歸身各一錢以香油五兩將藥浸五日文火炸黃即撈起渣加黃蠟五錢溶化盡用絹濾過攪冷塗抹於上醫宗金鑑赤白遊風形如雲片中起粟粒用細辛荊芥白芷川芎黃芩防風甘草地骨皮各三錢共搗為粗末水煎湯浴洗患處即愈同上白屑風生於頭面作癢抓起白屑皮脫去又起燥癢異常用香油四兩奶酥油二兩當歸五錢紫草一錢將當歸紫草入二油內浸二日文火炸焦去渣加黃蠟五錢溶化布濾傾碗內不時用柳枝攪冷成膏每用少許日擦二次效同上白駁風面及頸項生白癍點甚至延及遍身不覺癢痛以穿山甲片先刮患處至澡痛取鰻鱺魚脂日三塗之外科精義一方取樹孔中水溫洗之洗後搗桂心牡蠣等為末用麻油調塗日三夜一俱效壽世保元癧瘍風頸項胸腋起紫白點點點相連者用羊蹄草根共硫黃蘸醋於鏽鐵片上研濃汁日塗二三次效直指方鵝掌風先以桐油塗在手上將鴿糞熏之以一炷香為度三日立效證治匯補一方用瓦花頭髮搗爛用手上瘥之立愈醫宗説約鶴膝風三陰之氣不足風邪乘之兩膝作痛久則膝愈大而腿愈細名曰鶴膝風乃敗症也用肥皂一斤去子臘糟四兩芒硝五味子砂糖各一兩薑汁半碗研勻日日塗之加火酒更妙另用陳艾菊花作護膝縛久自除患丁氏驗方一方豆腐渣蒸熱捏作餅貼之千金博濟一切手足風用香樟木打碎煎湯每日早晚溫洗三四次半年必愈內府傳方諸瘡疥瘡疥有五種上體多者偏風熱盛下體多者偏風濕盛用硫黃四錢明礬花椒去目各二錢裝蘿蔔內煨枯為末入蔥白豬油搗爛以夏布包擦圖經家寶濕疥瘡油合桃肉生豬脂油各一兩硫黃末水銀各一錢搗如泥鼻聞擦患處簡要濟衆乾疥瘡水銀雄黃樟腦川椒輕粉枯白礬各二錢大風子肉一百枚另研共研細末同大風子肉碾勻加柏油一兩化開和藥作丸如圓眼大先以鼻臭次擦患處鎖口瘡用木耳焙黃為末香油調搽其瘡即紅奇方類編羊鬚瘡小紅棗燒灰存性清油調敷同上年久膿水瘡並血風瘡用如意草陰乾為末微炒雞子清調揸神效黃水瘡凡毒水流處即生泡瘡即為黃水瘡手少動即破乃熱毒鬱於皮毛用雄黃防風各五錢水十碗煎沸去渣取之洗之即愈岐天師傳痱瘡由暑氣傷熱而生有雪水洗之隨滅急不能得一方最妙用黃瓜切片擦之即愈同上抓瘡傷處出水腫痛用耳垢封之一日水出盡即愈鄭師甫方坐板瘡蘿蔔子種三錢杏仁去皮尖十四粒輕粉一錢冰片半分共研為末以手擦瘡口上即愈仲景外函熱毒瘡遍身痛而不癢或手足尤甚黏著衣被夜不得睡用菖蒲末多鋪席上使患者恣臥其上仍以衣被覆之五六日愈驢眼瘡患在腳脛骨如臁瘡樣者取田螺俟吐出水涎頻敷自效天泡瘡用荷花瓣貼之效以上同壽菉白疕瘡遍身形如疹疥色白而癢或搔起白皮用豬脂苦杏仁等分共搗絹包擦之甚效百一方水窠瘡石菖蒲研末擦之濟世集膿窠瘡白芷白芨硫黃各等分為末和鮮豬油搗丸如彈子大不時擦抹旬日可愈但須服忍冬酒或銀花湯以清毒氣為妙頭面諸瘡脂麻生嚼敷之普濟方鬢𧓿瘡一作臘梨川椒一兩麻油菜油各一鍾同煎濃搽之思誠堂梓方一方用雄黃豬膽汁和敷之聖濟菉頭禿瘡剝皮瘡牛皮破鞋各一兩白礬雄黃各五錢舊氈三錢共燒為細末豬油加面調和連擦三次須曬乾擦之海上方椒瘡生於眼皮里形如椒粒赤色粟瘡生上下眼皮形如黃米當歸尾石菖蒲赤芍藥各二錢生川連生杏仁地膚子各一錢羌活五分膽礬二分共研粗末以紅紬包之如櫻桃大甜滾水浸包乘熱洗勿見塵土若眼皮里有紅絲者乃血熱有瘀法以燈草擦瘡處令血出即愈醫宗金鑑小瘡一名針眼生於眼皮毛睫間致面浮腫目赤澀痛用枯礬末雞子清調敷腫處再用南星末生地黃同搗膏貼於太陽穴自消鼻中瘡用馬絆繩燒灰摻之本草綱目瘑瘡有於指掌之中形如茱萸兩手相對而生久不能愈癢必生蟲治以殺蟲為主用藜蘆苦參各一兩豬脂油八兩將二味炸枯濾去渣入松香一兩溶化開離火再加枯礬末雄黃末各一兩攪勻候溫塗之即痊忌風及雞鵝魚腥物勿食同上漆瘡蟹黃一兩神麯三錢共為末蜜調塗患處濕則干搽蔡室祕寶一方磨鐵槽中泥塗之同上一方嚼川椒塗鼻上不生漆瘡奇方纂要火氣入瘡用黃柏皮為末糝之或薄荷煎塗亦可丹方彙編下部濕瘡熱癢而痛乍寒乍熱大小便澀身面微腫飲食減少用馬齒莧四兩搗爛入青黛一兩再研勻敷上外臺祕要一方用開口紅椒七粒連根蔥白七個同煮洗之項氏傳方下疳瘡用真輕粉一兩珍珠一錢入豆腐煮研細末青靛花五分缸花更妙共研極細如飛灰收貯瓷罐搽患處即愈如腐爛疼痛用甘草水淨豬脊髓調塗方鈔一方白蜜調生甘草末塗之延生一術陰囊生瘡甘草湯溫洗用臘茶末敷同上外腎生瘡蚯蚓糞二分緑豆粉一分水研塗干後再敷乾坤祕韞腿上一切寒濕血風等瘡鴿子屎不拘多少燒灰存性如干瘡研細末加桐油調勻攤隔紙膏貼之有黃水出者加飛丹少許乾摻不過數次愈單方全集腳上生瘡孔如亂蜂窩者用如意草搗爛敷之或用干如草為末雞子清調塗亦效經驗良方腳面生瘡不收口松香枯礬杉木灰各一錢為末用真麻油調敷數次即愈祕方集驗腳脛骨上生瘡久爛黑或發孔或臭穢不可近用多年老杉木節燒灰真清油調用箬葉盛隔貼瘡上以絹帛扎定不數次愈同上遍身生瘡針法血海穴在膝臏上內臁白肉際二寸風市穴在膝上外臁兩筋中梁邱穴在膝蓋二寸三陰交穴在足大拇指本節後公孫穴在踝骨尖上以四指按骨尖盡處用食指點到是穴曲池穴在手脘橫紋盡處刺灸心法三十六種風結瘡馬齒莧五斤黃蠟三兩水一鍋煎成膏敷夏氏簡易方卒得惡瘡不識者用桃皮為末納瘡上曹氏驗方白蛇纏腰腰起紅泡一圈若不早治被其纏到不救縛腰如袴腰樣用蛇殼一條燒灰存性坑側板上浮泥刮下同研細用童便調敷數次即愈單方祕本一方用鍋臍灰將臭飯腳水調敷同上偷糞老鼠取𩽴魚尾貼之忌鐵器干則再易數次即散桂軒隨菉一方用貓屎井底泥和勻圍之立愈陳氏拾遺艾火帶雉雞毛及鵝毛燒灰敷之青囊纂要一方用白鱓泥炒研細香油調塗呂氏傳方瘡生蠅蛆懶於洗浴積膿汙穢蒼蠅叢聚生蛆用寒石細研末摻之或皂礬飛過為末撒之其蛆化水矣刪繁方瘡口生皮高山石上青苔衣取下焙乾研末摻上瘡口即生皮慈惠小編收口藥白螺螄殼煅末燈草灰舊黑傘紙灰輕粉各三分血竭二分冰片珍珠各半分共為細末摻之即愈世效單方諸癤諸癤孔內凸出弩肉者取烏梅肉搗爛量孔大小攤貼即消神效陶氏本草熱癤五月五日午時取獨部大蒜切片貼眉心入夏不發方鈔一切熱癤芙蓉葉菊花葉同煎水頻洗或搗爛敷之甚效種福堂方熱癤熱疔用白礬為細末熱水調塗即愈廣善編時行暑癤用桐油麻油各半斤同熬滴水成珠再入黃丹半斤收貯攤貼效同壽菉暑癤腫毒槿樹花連葉搗敷甚效簡易良方軟癤用哺退雞蛋殼燒灰清油調搽效同上頭上軟癤蝦蟆剝皮貼之收毒即愈活幼全書一方用大芋頭搗爛敷之即愈御醫院方癩頭軟癤五倍子七個研末香油四兩熬至一半布絞去渣搽三四遍即勿以水洗自愈普濟方鬢邊軟癤名髮鬢有數年不愈者用豬頸並貓頸上毛各剪一撮燒灰加鼠屎一粒為末以清油調敷同壽菉軟癤頻作露蜂房二枚燒存性以巴豆二十一粒煎清油二三沸去豆用油調敷甚效得效方軟癤不愈爛船底裡油石灰研末油調敷之胡氏方小石癤二蠶桑葉滴下滋水點上即愈古方癰癤惡肉生地黃三斤水一斗煮約及三升去滓煎稠塗紙上貼之日三易劉子涓方癰癤已潰芫花根皮搓作捻插入瘡口不合使膿流盡集簡方癤毒初起葛蔓燒灰水調敷之即消千金方如已破用益母草搗敷甚妙斗門方擔肩疽癤黃柏末一錢蜈蚣一條烘研末和勻豬膽汁調搽愈毛氏傳方眼堂成漏眼下空處生癤膿水不幹久而成漏諸藥不效用柿餅去皮取肉搗爛塗十日可愈屢效方瘡癤通治不拘頑瘡癤毒用生肥皂去核弦及筋搗爛釅醋和敷立愈不愈再敷奇驗彩珍集瘡癤久不收口白木槿花煅過存性為末摻上神效單方彙編魚口便毒萬靈膏左魚口右便毒生於兩跨合縫之間結腫是也用五倍子不拘多少盛以淨瓦器加陳醋熬成膏撒布上貼之如干即換三五次愈崔氏海上方魚口初起未成膿者南五倍子炒黃研末入百草霜等分以臘糟調塗患處一夜即消杏林摘要魚口瘡白枯礬研寒食麵糊調敷上即消延壽書便毒初起黃明水膠溶化塗之即散直指方一方用蔥白炒熱布包尉數次再用敷藥即消永類鈐方便毒腫大而軟者魚鰾膠用熱湯或醋煮軟乘熱研爛貼之赤水元珠胯上便毒鯽魚一尾山藥五錢同搗敷之即消醫林集要便毒癰疽皂角一條醋熬膏敷之屢驗存仁堂祕菉灸法肥皂一個火上炙軟剝開去子只用一邊加炒鹽鋪滿肥皂中間仰放於毒上極痛處用艾約如黃豆大炷多灸其人口中覺咸勿再灸痛立止經驗廣集痔漏痔瘡靠水楊柳下白鬚同無花果葉二味煎湯時常熏洗可以斷根新集良方漏疾土瓜根搗敷之干即易千金方痔瘡有核白鵝膽二三枚取汁入熊膽二分片腦半分研勻瓷器密封勿令泄氣用時以手指塗之保壽堂方痔瘡如瓜腫痛如火柳枝煎濃湯洗之艾灸三五壯即消許學士本事方縮痔方用大團魚頭一個火煅為末搽痔上即刻收進屢驗普濟方獨葉丹治蟲痔用桃葉二十片杵爛塞糞門即愈瘍科選粹椒子散治痛痔川椒為末摻少許於彈淨棉花肉上襯患處坐可止痛同上寸金散端午日取大蜈蚣一條竹籤陰乾用時剪一寸煅存性桐油調塗輕必不發重或對年又發剪一寸煅塗斷根同上五痔肛腫久不愈變成瘻瘡雞冠花鳳眼草各一兩水二碗煎湯頻洗衛生寶鑑肛門邊腫硬癢痛不可忍以白礬三分碎研用熱童便二盞化開洗痔上一日兩三次一方用魚腥草一握煎湯熏洗仍以草挹痔即愈以上同壽菉腸風痔漏熊膽五錢入片腦少許研和豬膽汁塗之壽域神方止痔下血蜓蚰一條用鹽泥裹煨通紅去泥用硼砂硃砂冰片雄黃各等分為極細末入龍骨少許趁大便時以細草紙盛藥少許托入大效祕方集驗內痔草烏薑汁炒刺蝟皮炙成性各一錢枯礬二錢食鹽炒三錢麝香五分冰片二分研細先用溫湯洗淨隨用津唾調藥末三錢填入肛門片時痔即出經驗集外痔木鱉子煎湯熏洗以青蔥涎對蜜調敷性涼如水甚效唐仲舉方番花痔以木瓜為末取鱔魚身上涎調貼之用紙護住醫林集要鼠乳痔以蜘蛛絲纏其上自然消落千金方雞冠痔黃連末敷之加赤小豆末尤良斗門方下部漏痔大露蜂房燒存性研摻之干則以真菜油調唐瑤經驗方痔漏出水蜣螂一枝陰乾入冰片少許為細末紙捻蘸末入孔內漸漸生肉捻退出即愈孟詵必效方痔漏腫痛無名異炭火煅紅末酸淬七次為細末以溫水洗瘡綿裹箸頭填末入瘡口數次愈簡便方痔漏疼痛鯉魚鱗二三片綿裹如棗形納入坐之痛即止儒門事親一方用田螺一個入片腦一分於內取水搽之仍先用冬瓜湯洗淨乾坤生意痔漏脫肛針法中脘穴在臍上四寸中極穴在臍下四寸會陽穴在長強穴骨下各開一寸五分會陰穴在大便前小便後承山穴在膝灣陷中委中穴在腿肚中刺灸心法痔漏插藥雄大蜣螂不拘多少陰乾研加冰片少許將綿紙捻作條用白芨水蘸濕曬乾待硬再蘸濕染藥末於紙條上量孔淺深插入漸漸生肉條自退出用剪刀剪去外一段即滿靨種福堂方痔漏退管白鴿糞一升置罐內以滾水衝入罐中乘熱氣病人坐於罐口上熏之管自落數日即收口忍痛久坐更妙同上油藥酥合油熊膽各五分頭窠雞蛋二個用清煎油共和勻敷之神效有一趙姓者患痔垂死用此立愈靈祕丹藥藥水片腦一分熊膽三分朴硝五分青果核燒灰五錢蝸牛螺肉各十個搗爛入藥浸一夜取水並藥敷上無不斷根同上臁瘡夾紙膏川椒松香黃臘各一錢四分研忌鐵器用連根蔥白十四段共搗爛做夾紙膏攤貼效凡臁瘡用夾膏須用舊傘紙以甘草湯煮密刺多孔比他紙效如用尋常油紙須用甘草白芷花椒荊芥湯煎煮曬乾攤膏不痛不生拐心岐傳方冷臁瘡鹿角灰乳香為末清油調敷曹氏經驗方血風臁瘡生腳股上是濕毒成風用黃臘一兩溶化入銀硃一兩攪攤紙上刺孔貼之宣明方蛀腳臁瘡干馬齒莧研末蜜調敷上一宿蟲自出神效海上方臁瘡不斂蔥鹽湯洗淨拭乾以馬屁勃末敷之愈稗史臁瘡成臼纍月未乾用上等好砂糖先用鹽湯淋洗取絹帛拭乾以唾津塗敷上三日愈同壽菉臁瘡潰瘡雄黃二錢陳艾五錢青布卷作大炷點火熏之熱水流五七次愈筆峰雜興臁瘡並婦人裙邊瘡水龍骨即船上陳石灰炒乾為末香油調搽神效經驗廣集臁瘡針法氣海穴在臍下一寸五分解膝穴在足面灣上絶骨穴以三陰交穴相對刺灸心法數年爛腿將白蘆甘石醋煅七次研極細麻油調敷日換自愈親試百驗單方摘要腿瘡年久不愈用罐口泥研末摻上立愈同上楊梅瘡鵝膽膏楊梅瘡發於肛門不便大解用杏仁七個去皮尖輕粉膽礬各五分共為極細末鵝膽調點瘡上立效陳文治方楊梅毒瘡銀硃官香等分為末捲入紙捻點燈置桶中以鼻吸煙一日一次七日愈奇方纂要一方用銀硃輕粉各一錢黃蠟清油各一兩化開和收以油紙攤貼瘡痂自脫袖珍方初熏辰砂末一錢綿紙分作七條香油浸透每次熏二條熏時板凳坐著暑天用單被寒天用夾被蓋之不可出氣要口含些水恐傷口皮熏完吐出不可吞下其效如神濟生祕覽擦法瘡初起時用晉礬四兩研為細末患者坐重幃中擦手足心以盡為度七日汗出瘡愈選梓洗法川椒三錢黃連黃柏黃芩黃占白芨各五錢食鹽少許煎湯洗之説約一方用土菖蒲一味煎湯洗瘡即得收口同上點藥兒茶杏仁霜各一錢輕粉五分冰片三分共研末用鵝膽調點一次過夜即脫靨種福堂方結毒敷藥真輕粉二錢杏仁霜二十粒去皮尖取霜番木鱉火煅存性兒茶火煅各三錢各膽礬三分片腦一分共研極細末用鵝膽或豬膽調敷一日一換數日愈同上爛久不痊癩蝦蟆萆麻子油煎成膏貼之桂軒隨菉
