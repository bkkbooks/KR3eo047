body:
  text: 卷十防病預訣紀時調攝春春三月乃萬物發生之時須要行動以和四肢不可鬱郁久坐也春時天氣頓暖不可驟減綿衣須一重重漸減庶不致暴寒夏夏之一季是人脫精神之時心旺腎衰液化為水不問老少之人皆宜食暖物獨宿調養夏月單衣不可坐冷石寒氣侵外腎多患疝氣偏墜女人寒氣入血室則經不如期或經行腹痛夏月衣服單薄宜系綿布兜肚日夜皆不可離夜間睡著恐被去體有兜肚則無腹痛瀉痢諸症夏月凡日曬熱衣服即穿著者輕則汗斑重則暴病至杌橙磚石之類尤不可以坐恐熱毒侵膚多患坐板瘡或主毒癤夏月伏熱不可飲冷水冷物迫之最易傷人夏月熱極不可以冷水浴身浴面及背令人得虛熱目病筋脈厥逆霍亂陰黃等疾夏月汗濕衣服不可久著令人發瘡瘍須要頻頻洗換為佳夏月有事動勞或飲食湯水身若有汗須任其出透不遽脫衣服不可以濕布拭遏亦不可以用扇搧風風入毛孔最易成病夏月出門行路一身熱汗切不可當風不可急扇不可即脫除衣帽不可飲冷茶水恐血氣不常生病夏月出外遇有日曬泉澗水有毒害人不可飲或入客館及久無人住之處地土沴濕或跋涉雨途衣裳被褥潮沴俱用蒼朮燒煙燻之以闢黴沴臭惡之氣又能驅逐邪疫山嵐瘴癘人到夏季日長夜短日間身體困倦未免晝寢但不可在午飯之後即睡恐飯食停滯多成疾病須在未食前睡俟睡醒少停吃飲食如吃過午飯或至困倦欲臥可起來走動或尋些事消閒自然不致困倦思睡至於大渴飲茶之後亦不可就睡夏月不可用簟席臥沴濕處及冷地上以圖涼快沴濕透入筋脈在上則面黃目浮在下則股膝腫厥入里則脹滿泄瀉留表則頭重身疼在陽不去則氣血壅滯在陰不去則化水成形或患筋麻痹痛足痿諸症夏月不可露臥又不可當風臥恐頭受風則痛背受風則嗽臂受風則疼非但是月每月宜慎夏夜帳不可密厚只要稀羅稀夏布令人身之熱氣外出極好如冬帳則厚密無妨夏至以後到秋分須慎肥膩餅臛油酥之物蓋此物與酒漿瓜果相妨病多由此而起秋秋初余暑尚在調攝宜同夏月秋三月天氣消鑠毛髮枯槁綿衣宜漸增添不可令背受寒寒即傷肺秋月凡在舟中旅邸中衣服單薄驟遇暴寒可將襪物裹於肚腹人身各處還可受冷惟肚冷即生病夏秋之月忽遇大風大雨震雷昏霧必是諸煞鬼神經過不論在家在外俱宜入室閉戶燒香恭默過後乃出否則恐招損護咎冬冬三月乃水藏水閉血氣凝澀之時最宜固守元陽以養真氣也冬月宜密室溫淨衾服輕軟仍要暖裹肚腹早眠晏起以避霜威朝宜少飲醇酒略少一時然後進粥其炙爆燥毒之物尤切戒之冬月大凍出門或坐騾馬或涉雨雪之途二足凍冷麻木或歸家或入店肆先用溫火烘熱以手揉擦令血脈回陽又以熱水洗之如不先烘即用滾湯泡洗麻木之足不知滾熱凍血滯結損筋傷絡而成廢疾終身大患凡冒寒歸來不可就飲熱湯須少停一刻則無患冬月天寒陽氣在內已自鬱熱若更加以炙衣重裘近火醉酒則陽氣太甚春夏之交恐發時行熱病老人骨肉疏冷風寒易中若窄衣貼身暖氣著體自然血氣流通四肢和暢冬月老人衰邁畏寒可用錫造湯壺式似小枕下長方上長圓正中小口有蓋注熱水用布囊緊包以避濕氣先時擁被圍簇臨睡甚暖又可溫足且遠火氣又無火毒奉養老人至妙之法以上多能集逐月宜忌正月宜是月天道南行作事出行俱宜西南是月建寅生氣在子子屬北方坐臥宜向之二月同是月宜食五辛以闢厲氣是月每朝梳頭一二百下搜通風氣是月濯足於沸水中加鹽一撮以泄風毒腳氣是月立春節清晨煮桃皮白芷青木香三物沐浴吉是月雨水節如天雨夫婦各飲水一杯還房夜即有孕是月初一日以青木香煮湯沐浴令人至老鬚髮黑初十日沐浴令人齒堅忌是月萬事不宜用寅日時犯月建不利是月勿食生蔥蓼子主面上起油風勿食鯽魚頭其中有蟲防毒勿食鼠殘之物令人生瘻二月宜是月上丙日沐浴愈百病上卯日沐浴洗髮去百病丁亥日收桃杏花陰乾為末戊子日和井水日三服療婦人無子兼美容顏是月春分節日未出時用遠志去心以水煎之飲二盞吐之不疫是月食韭大益人是月初二日沐浴光澤不病不老士女皆戴蓬蒿草以避頭風初六日沐浴齊戒可蒙天福黃昏時沐浴令人輕健初八日宜沐浴拔白髮忌是月萬事不宜用卯日時犯月建不利是月戒食生冷行途忌飲陰地流泉令人發瘧瘴又腳軟是月食大蒜令人氣壅關隔不通食小蒜傷人志食雞子滯氣是月初三日戒晝眠初九日勿食魚鱉三月宜是月建辰生氣在午午屬南方坐臥宜向之六月九月十二月同是月採何首烏赤白各半米泔水浸一宿同黑豆於飯鍋上蒸熟曬乾去豆為末或加茯苓三分之一煉蜜為丸每酒服一二錢百日後百病皆除延年益壽多子忌食豬肉魚鱉蘿蔔是月取羊糞燒灰存性和輕粉麻油可搽惡瘡是月穀雨節前採茶炒藏消痰嗽治百病是月寒食日水浸糯米一二升逐日換水至小滿日漉起曬乾炒黃為末跌打損傷惡瘡以水調塗甚效用紙袋盛面掛淨室當風處遇中暑者水調服愈是月初二日取桃葉曬乾搗末井花水服一錢治心痛初三日收桃花曬乾貯至七月七日和烏雞血塗面與身肌膚潤澤採桃花浸酒飲之除病注顏採夏枯草煎汁熬膏每日熱酒調服治遠年傷損手足凝血天陰作痛七日可痊兼治娩婦諸血病症男婦戴薺菜花入夏頭不暈初六日午時洗頭利益沐浴無厄二十七日沐浴令人神氣清爽忌是月萬事不宜用辰日時犯月建不利是月戒殺一切生命是月食韭神昏食陳俎發病食魚鱉不化食發宿疾遇辰寅日食小蒜及雞子令人昏亂是月初三日戒食諸鱗物初五日戒看一切生血物初八日食芹菜使面青黃腹大如孕犯之服糖水吐出愈四月宜是月建已生氣在卯卯屬東方坐臥宜向之五月同是月空心肚服蔥頭酒令人血氣通暢是月丁巳日祀灶吉是月初二日拔白髮初四日日未出時取枸杞煎湯沐浴令人耐老澤肌卻病初七初八初九同忌是月萬事不宜用巳日時犯月建不利死氣在酉亦宜避之是月純陽用事宜禁欲並戒暴怒傷心致秋瘧是月勿用宿水洗面漱口是月食雉令人氣逆食鱣防毒食抱雞肉令人作癰男女虛乏食生蒜損目勿食韭勿食諸物之心勿食隔宿肉菜勿大醉是月初四日切戒色欲犯者失音初五日戒看一切生血物勿食生菜初八日切戒房事犯者血死十六日犯色損壽五月宜是月戊辰日以豬首祀灶吉是月用貫衆浸食水缸中可避時疫解水毒是月收黴雨水貯瓶中洗癬疥滅瘢痕是月夏至節日佩五彩符闢兵厭鬼不染瘟疾吃百家飯則不痓夏是月初一日枸杞湯沐浴不病不老初五日採萱花作菹利胸膈採馬齒莧同莧菜等分為末與妊婦佩臨期易産收鯉魚枕骨燒灰治久痢搗爛獨囊蒜塗面手足身體一年不作惡瘡冬月不作凍瘡午時採雞腸草為末凡齒痛擦之立愈初七日沐浴長命初八初九同二十日採小蒜曝乾治心煩痛解諸毒二十七日服五味子湯甚益忌是月萬事不宜用午日時犯月建不利是月蓋屋令人頭禿並不可上屋令人魂魄不安是月五六七為九毒日忌夫婦事損壽是月天氣漸熱不可汗身貪風涼倚牆坐臥令毛孔閉塞血氣凝滯為害不小是月多食韭令人乏力昏目多食茄動氣多食鯉發風黃魚同蕎麥食令人失音桃與鱉同食成淋是月甲子日戒食一切獸肉並牛肺是月夏至節後丙丁日不可合陰陽大凶六月宜是月暑伏時搗大蒜為泥上年曾有凍瘡之處手指耳邊足跟俱以搗蒜敷上過一日一夜洗去遲三四日再敷一次本年冬雖極寒亦不再患凡小兒手足及各處雖不患凍瘡亦敷兩次則耐寒若不隔幾日連敷則肉上起泡甚至破皮此法可傳腳船伕是一德是月伏日曬乾茄子炒黑色為末凡發臟毒者連服十日愈如或不止再用數年陳槐花炒黑為末服之數日永不發俱空心酒下一錢是月三伏極熱時汗要多出則周身所染風寒濕氣由汗而出可保一年無病不拘魚肉菜湯只多入蔥白姜汗乘熱泡飯食之要令滿身汗淋如雨停歇方用熱水洗拭多出二三次極妙是月天熱出汗任其盡出不可止遏若汗未乾即在風內乘涼或搧扇或以冷水涼布抹逼皆致病不小是月途中中暑暴死者勿用冷水灌沃急就道上取熱土填於死者臍上成堆中間撥一孔令人溺之通臍孔次用生大蒜搗爛和熱湯灌之即活是月初一日沐浴去病初六日清晨汲井華水以白鹽淘於水中用新鍋復煎作鹽擦牙每日擦畢漱吐手心洗眼日日如此雖老年夜能細書十四日用糖果白雞黑豆祀灶神二十二日沐浴去病二十七日沐浴至老不病忌是月萬事不宜用未日時犯月建不利是月冷水浸手足引風氣狂發四肢是月食冷水殺人食韭昏目食羊肉傷神氣是月初六日沐浴令人體臭忌掘土蓋六六純陰犯之大凶七月宜是月搗芙蓉葉敷諸腫又可干為末醋調塗是月收黃葵用香油浸貯治湯火傷是月收蒺藜子陰乾搗末食後服二錢治失明半月效是月立秋節日未出時採楸葉敷膏其法搗汁熬煎滴水成珠為度收藏擦瘡瘍立愈用水吞赤小豆七粒或十四粒一秋可免痢疾是月初七日夜取熒火蟲二七枚捻發白可變黑十六日將一年所剪指甲燒灰服之滅九蟲三尸二十三日沐浴發不白二十五日沐浴益壽忌是月萬事不宜用申日時犯月建不利是月立秋節沐浴令人皮膚燥生白屑是月立秋後十日瓜宜少食是月食蓴上有蠍蟲害人食韭損目多食鳧類傷人多食菱動氣多食生蜜暴霍亂多食豬肉豬肺生薑茱萸傷神氣少食油鹽能無病是月初七日切戒色欲勿想惡事十五日犯色欲損壽八月宜是月採百合花曝乾蒸食之益氣力是月食韭菜露葵少疾是月社日清晨用瓷器收百草頭露磨濃墨治百病名曰天炎是月初三日灶神誕祀之吉初八日沐浴益人初十日以朱點小兒額謂之天災二十二日用枸杞湯沐浴卻病二十五日用枸杞湯沐浴卻病忌是月萬事不宜用酉日時犯月建不利是月勿飲陰池流泉令人發瘴腳軟是月秋谷初成食之發病是月食雉肉豬肚冬發喘病食生果令人多瘡勿多食新薑生蒜飴雞肉鴨豬肺是月秋分節忌殺生房事弔喪問疾大醉九月宜是月收菊花曬乾為末五兩用糯米一斗蒸熟以曲並菊花搜摟如常醞法酒熟每日溫服一小杯以治頭風明目是月預收葫蘆藤俟除夕煎湯浴小兒不出痘是月取枸杞子浸酒飲之令人不老是月宜食野鴨如多年小熱瘡不愈食多即瘥但不可合胡桃木耳豆豉食是月初九日採茱萸房插頭鬢辟惡氣而御初寒採菊花為末遇酒醉調服二錢即醒採黃菊茯苓以松柏枝合服之延年二十日宜齊戒於雞鳴時沐浴辟邪二十一日枸杞湯沐浴光澤不老二十三日採桑葉煎湯洗眼至老如童眼不昏花二十八日沐浴吉忌是月萬事不宜用戌日時犯月建不利是月食生薑成痼疾食小蒜傷神損壽多食雞魂魄不安多食生冷恐致痢疾勿食霜下瓜翻味勿食葵不消化是月初九日食姜損壽動床席招橫惡十月宜是月建亥生氣在酉酉屬西方坐臥宜向之十一月同是月食芋益人是月採槐子食之去病是月取大棗除皮核破開於文武火上反覆炙令香然後泡湯宜常服大益是月遇亥日食餅令人無病是月立冬節採桑葉一百二十爿遇閏月多采十爿每用十爿遇洗眼日期煎湯洗之除百病是月初一日沐浴吉初十日採決明子陰乾百日可服能治青盲等眼疾又治唇口青十四日枸杞湯沐浴十八日雞初鳴時沐浴忌是月萬事不宜用亥日時犯月建不利是月純陰用事慎房事是月勿戴暖帽使腦受凍則無眩暈之疾是月多食豬肉發宿氣食椒傷血脈食蔥損精食韭動宿疾多涕唾下二月皆同食霜打熟菜令面失色目澀心痛腰疼十一月宜是月天氣漸冷老年人夜用火爐烘被既有火毒又恐誤事惟錫制湯壺每晚用熱水滿貯安放被內可以放心溫暖小孩病人俱當用此或力不能制錫壺用磚一塊燒暖布包溫被亦勝火爐多矣是月冬至節夜宜於北牖下鋪草臥以受元氣是月初十日沐浴至老光澤三十日煮赤小豆粥祭門畢閣家食之闢瘟疫忌是月萬事不宜用子日時犯月建不利是月勿枕冷石鐵物昏人目勿傷水凍勿以炎火炙腹背勿以火炙肉食是月勿食龜鱉令人水病勿食螺蟹長尸蟲勿食蝦蚌著甲之物害人勿食生菜發客疾十二月宜是月多收雪水盛貯缶器埋土中高平處覆以草荐勿令風吹及雨水滋滲治一切熱疾痘疹瘢痱等瘡兼療六畜瘡疫諸病皆效是月取川烏炒黃絹袋盛裝如法浸酒聽服少許治頭風是月取烏鴉一二隻入瓶泥封固燒為末治一切癆嗽骨蒸米飲下二錢是月四九極凍日碾糯米不拘鬥石蒸透熟用蘆席鋪在板門上將蒸米攤放天井中空地冷透曬乾收貯大瓷罐或缸內放乾燥處下用木板墊高勿著潮濕經久不壞老年人虛弱人小孩子以及病後煮粥飯食最益臟腑夏月用滾水泡食能止瀉痢及治脾膈諸疾有餘家備些濟人大有功德是月初八日取豬油懸風處以備熬膏藥解毒收鱖魚燒存性研細用酒調服治小兒痘疹不出二十日沐浴去災二十四雞未鳴時取第一汲井華水於淨器浸乳香至元旦五更暖溫閣家從小飲起各吞乳香一豆大咽水二三口一年無時疾三十日五更抱小兒於獨槽豬窩內滾過則痘瘡稀用枸杞湯沐浴益人以閣家頭髮燒灰同鞋底泥上泥包投井水一年不害惡疾忌是月萬事不宜用丑日時犯月建不利是月勿食豬脾勿食帶甲之物勿食生椒薤霜爛果菜等物勿食生葵令人飲食不化發百病非但是月每月皆忌以上月令考謹口食米麥類粳米同馬肉食發痼疾和蒼耳食令人卒心痛食療凡新谷初成老人及脾弱人切不可食傳家寶糯米久食身軟筋緩發風動氣合酒食之醉難醒通元凡素有痰熱風病及脾病不能轉輸食之最能發病成積從新黍米共有五種久食生煩熱昏五臟發宿疾令人好睡不可與白酒葵菜牛肉同食圖經稷米食之發三十六種冷病不可與瓠子同食食鑑粟米北人謂之小米生者難化熟者滯氣隔食生蟲衍義與杏仁同食令人吐瀉日用大麥久食則心氣盛而內熱令人作疥要略虛者少食防消腎水傳心菉小麥南方少霜雪夜開花面有濕熱食之發病食鑑濕面炙面咯血吐血衄血人終身宜忌玄通藥性解附勸麵店勿用灰水以防喉症說近人食切面而不知面用灰水打成今大概燒煤者十居七八煤灰即與炭灰攙雜換灰者莫辨從而收之賣與麵店人食其面即暗受煤毒或十年一發或五年一發雖未必人人盡發惟視人受毒之淺深即病之遲速存亡判焉凡人受煤毒之氣於燒用之時尚可服蘿蔔菜滷及海帶菜等以解之煤毒之蠱於肺腸之內竟無醫藥所能救治近時之發為爛喉疹疾真九死一生也用特刊布是說並後附神效仙方奉勸仁人君子先於廚下分別煤炭灰不可稍有攙雜並祈勸知麵店一概盡用鹼水和麵不至誤用煤灰為功莫大伏冀廣行傳布使之家喻戶曉或者蠱毒稍輕喉症漸減也附治爛喉疹仙方紫石英四錢解煤蠱六神麯三錢消面積蒲公英四錢解喉消杏仁泥五錢消痰火水煎三服即愈嬰孩減半孕婦勿忌蕎麥一名烏麥久食發病或成風癩日用同石膏食立死類案與白礬食殺人和豬肉食令人患頭眩脫眉發壽世青編菽豆類黑大豆脾虛人食最瀉肚同豬肉食擁氣至危小兒勿食炒豆煮豆食療黃大豆多食擁氣生痰動嗽令人身重發麵黃瘡疥綱目赤小豆久食瘦人合魚鮓食成消渴症作醬同飯食成口瘡食鑑緑豆俗作録者非胃寒者不宜食必讀合鯉魚鮓食久則令人肝黃成渴病拾遺同棐子食殺人食忌節要蠶豆多食發脹忌同豬肉食豌豆即寒豆多食發氣病日用白扁豆多食壅氣患寒熱者不可食本草經冷氣人忌之食療刀豆多食損脾傳心菉藜豆一名貍豆多食令人悶從新葷辛菜類韭病人少食多食助陽損神昏目酒後尤忌衍義不可與蜜同食若共牛肉食成瘕病會編薤似蔥而細食之生痰涕動邪火反牛肉食鑑蔥多食令人神昏發落虛氣上衝從新同蜜食下痢腹痛同犬雉肉食九竅出血害人金匱玉函蒜多食生痰動火散氣耗血昏目損神伐性虛弱有熱之人切勿沾唇圖經食蒜行房令人面變顏色千金藝臺俗名油菜患腰腳者不可食食之加疾又損陽氣發瘡及口齒病胡臭人不可食又能生腹中諸蟲道家特忌以為五葷之一食療芥菜久食則積溫成熱辛散太甚耗人真元昏目發瘡從新同兔肉食成惡邪病同鯽魚食發水腫食治有癬瘡痔疾便血者忌之單方全集白菜本草名菘菜夏至前食發皮膚風癢動氣發病四聲氣虛胃冷人多食噁心吐沫氣綱目蘿蔔本草名萊蔔多食耗肺氣生食滲血嘈心如服地黃何首烏者食之須鬢髮易白傳家寶蔓菁子即蕪菁一名諸葛菜多食動氣衍義胡荽久食損神健忘病人食之腳軟從新根大損陽滑精發痼疾食鑑生薑八九月多食至春患眼疾損壽減精力孫真人方茴香古作蘹香食之能昏目發瘡若陽道數舉得熱則吐者均戒徵要蓬蒿菜古名同蒿多食動風發氣食鑑柔滑菜類菜多食滑大小腸久食腳軟腰痛動冷氣食性薺菜即野菜與面同食令人背悶服丹石人不可食食療莧菜有六種多食動氣生煩悶同鱉及蕨食成瘕日華馬齒莧不可與鱉同食又一種紫大者似是實非尤不宜食本草經萵苣有毒百蟲不敢近博物志久食昏人目患冷人不宜食廣筆記蕨食之令人多睡弱陽眼昏鼻塞發落氣冷人食之多腹脹食鑑芋俗名芋𡛂多食動宿冷難克化滯氣困脾唐本草山藥本草名薯蕷勿同麵食從新百合紅花者中寒下陷人忌之必讀吾鄉白花百合食之極清肺續桐溪記略竹荀俗作筍諸筍皆發冷血及氣拾遺滑利大腸無益於脾俗謂之刮腸篦筍譜同羊肝食令人目盲日華蓏菜類茄子多食動風發病秋後食多損目本草經大腸易動者忌之丹溪補遺冬瓜久病與陰虛者忌之未被霜者食之成反胃病同上甜瓜俗名熟瓜多食傷胃破腹發黃疸動冷氣生濕瘡發痞癖令人虛羸日用五月甜瓜沉水者一瓜兩蒂者皆能殺人食治南瓜多食髮腳氣黃疸綱目切不可與羊肉同食類案黃瓜本草名胡瓜多食損脾令人瀉痢傳心菉菜瓜本草多越瓜有青白二種多食致膨作瀉發諸瘡令臍下症痛不可同乳酪魚鮓食令脘痛又暗人耳目食鑑絲瓜多食滑腸令人泄瀉通元葫蘆本草名壺盧多食令人吐日用水菜類蓴一作淳菜逐水而性滑能發痔陸佃詩疏茭白滑利而冷甚不益人合蜜同食發痼疾損陽氣別菉紫菜多食令人腹痛發氣吐白沫拾遺中有小螺螄損人須揀出海菜亦然食鑑果類黑棗北産者與蔥同食令人臟腑不和與魚同食令人心腹痛有風疾痰熱蟲䘌人不宜吃小兒疳病亦禁日華白棗土産者多食令人熱渴膨脹動臟腑損脾元助濕熱千金凡羸瘦有疾者尤不可食日食方物胡桃性熱不可多食多則生痰動火令人咯血肺病尤忌油者有毒圖經有風病人食之即發唐本草栗子不宜多食生者難化生蟲熟者隔食滯氣患風氣病人尤忌之日用棐子多食引火入肺大腸受損藥對同鵝肉食生斷節風棐皮反緑豆能殺人食鑑荔枝多食發虛熱食治齦腫衄血病齒及火病人忌之備要橄欖即青果性熱多食能致上壅丹溪補遺銀杏即白果多食則收令太過令人壅氣臚脹小兒發驚動疳食千枚者死同上石榴多食損肺壞齒凡服餌人尤忌同上林檎即紅花多食發熱閉百脈從新梨子多食冷利脾虛泄瀉及乳婦血虛人忌之徵要橘子多食聚痰損氣綱目同螃蟹食令人患軟癰日用柑子多食令人脾冷發痼疾大腸泄傳家寶橙皮多食傷肝與檳榔同食頭旋噁心同上患惡核瘰癧痰症人食雖愈後復發定定子方山楂多食令人嘈煩易肌反伐脾胃生髮之氣同上櫻桃多食傷筋骨有暗風人不可食食之立發生生編枇杷多食發痰熱與炙肉面同食發黃病同上楊梅多食令人發熱衄血損齒及筋食療同生蔥食發瘡致痰日用同燒酒食致斃患疝病人忌食全生集柿子性頗寒肺經無火及風寒作嗽冷痢滑泄者忌之不宜與蟹同食令人腹痛作瀉徵要李子合蜜食損五臟不沉水者有大毒蜀本草久病人勿食李杏犯之加重不愈發明杏子多食傷筋骨令人目盲鬚眉落扁鵲酸熟有毒雙仁者殺人馬氏別本梅子多食損齒傷筋蝕脾胃衍義小兒孕婦忌食服地黃人更不可食食鑑桃子多食令人熱仍不得入水浴令人病寒熱淋瀝病金匱要略西瓜多食作吐利胃弱者不可復日用世人取一時之快忘傷胃之憂古人有天生白虎湯之號稔其寒也不明者妄云不傷脾胃誤矣通元桑椹不可多食多食致衄衛生雜興甘蔗多食發虛熱動衄血同酒食生痰會編胃寒嘔吐中滿滑瀉者忌之徵要荸薺一名地栗性極涼瀉有冷氣人不可食致腹脹氣滿孕婦尤為大忌食療芡實一名雞豆生食動風發氣甚難消化發明蓤一名菱角生食冷臟傷脾食鑑熟食發痼疾損陽事日用藕市中所賣熟藕俱用鹼水煮不宜食從新慈菰多食發腸風痔漏崩中帶下腳氣癱風又使人乾嘔損齒失顏色皮膚乾燥同上沙糖多食心痛鯽魚同食成疳筍同食成瘕身重不能行食鑑生胃火助濕熱損齒生蟲本草經飴糖多食動火生痰凡中滿吐逆酒病牙疳均忌藥鏡補有毒不可食諸果凡果生食生瘡腹脹作瀉張氏要略凡果落地經宿蟻緣過者食之令人患九漏同上凡果未成核者食之令人發癰癤及寒熱陳氏拾遺凡果忽有異常者根下必有毒蛇食之殺人同上禽類鵝多食令人霍亂發風動氣生瘡火熏者有毒蒙筌卵發痼疾玄通藥性解鴨六月忌食黑者毒目白者殺人滑中發冷腳氣人與腸風下血人俱不可食湯液卵忌與蒜鱉同食又勿與李子桑椹食食物本草野鴨不可合胡桃木耳豆豉食春夏有毒忌食同上雞五色六翮四距腳爪也烏雞白頭者俱不可食拾遺合胡蒜食滯氣合鯉魚食生癰疽同糯米食生疣蟲同生蔥食成蟲痔同魚汁食成心瘕四聲四月勿食抱雞卵多食滯悶有八字紋者害人食性野雞久食令人瘦同胡桃食發頭風眩運及心痛與菌木耳食發痔血卵同蔥食生寸白蟲圖經山雞不可合鳥獸肉食之本事方補有毒不可食諸禽凡禽肝青者食之殺人金匱要略凡禽自死口目不閉翅不合者不可食之同上凡禽自死不伸足白鳥烏首黑鳥白烏三足四翼死無傷處並有大毒殺人壽世青編獸類豬久食能生濕痰易招風熱傷風寒及病起初人尤為大忌別說同蕎麥食脫鬚眉合葵食少氣以生胡荽食爛臍和羊肝食心悶本經羊獨角者不可食黑頭白身食其腦作腸癰心有孔者殺人肝有竅者破臟蹄甲中有珠子白者名羊懸筋食之令人癲脯三日後有蟲如馬尾者有毒宜忌綱目牛為稼穡之資不輕屠殺市中所賣非老病即瘟死者極毒殺人非惟不可食吸聞其氣亦能害人食鑑馬鞍下肉有大毒白馬黑頭白馬青蹄及腳無夜眼者皆不可食要略馬汗氣及毛誤入食中害人凡有汗陰瘡者近之殺人韓氏醫通驢動風發痼疾合豬食成霍亂同上騾動風發瘡脂肥者尤甚若與酒同食致暴疾殺人食鑑鹿五月食之痿人陽合蒲白作羹食發惡瘡拾遺獐發風動氣合蝦及生菜梅李果食之傷人同上兔合雞食令人面發黃損陽事著乾薑食成霍亂同上死而眼合者殺人獨目者不可食別菉犬氣壯多火陽事易舉者忌之熱病後食之殺人徵要懸蹄肉中有星如米者白犬自死舌下不吐者皆有大毒並害人壽世青編補有毒不可食諸獸凡獸有並頭岐尾赤足及形色異常者不可食凡獸臨殺驚氣入心絶氣入肝並不可食凡獸北向自死及死不僵而伏地者不可食凡獸自死或瘟疫瘡疥死及被箭死者不可食凡獸肉中有如朱點者得咸酢不變色者落水浮者墮地不沾塵者經宿尚暖者曝炙不燥者久煮不熟者煮熟不斂水者熱血不斷者久藏米甕中者祭肉自動者皆有大毒並殺人以上俱本草拾遺魚類鯉魚發風熱凡一切風病及癰疽瘡疥瘧痢俱不可食食鑑患膈䓶翻胃者愈後食之復發難救楊氏梓送方青魚不可合生胡荽生葵菜豆霍麥醬同食本經鯇魚俗名草魚又名池魚能發諸瘡延壽書鰱魚多食令人熱中發渴又發瘡疥食療鯽魚多食動火同芥菜食成腫同豬肝雞肉食生癰張鼎本草患腳氣人食之久不愈同壽菉鰣魚多食染瘟疫小兒不宜食日食方物鱭魚助火生痰發疥不可食同上鮎魚赤目赤須者殺人白魚發膿有瘡癤人不可食經宿者令人腹冷石氏與棗同食患腰痛陶氏魴魚大者即鯿魚疳痢人勿食蜀本草鱸魚發痃癖瘡腫傳信肝不可食剝人面皮鱘魚多食心痛腰痛合筍食成癱瘓會編鱖魚有十二骨每月一骨有毒殺人壽世青編河魨毒之所在腹之子目之睛春之血有損無益浸血不盡有紫赤斑眼者及誤破傷子或修治不如法誤染屋塵者俱脹殺人凡服荊芥菊花附子烏頭之人食之必死同上鯧鯿腹中子毒令人下痢同上鰻鱺水行昂頭者背有白點者腹下有黑斑者無腮者重四五斤者俱不可食拾遺鱣即黃魚滑腸動火今所名黃魚者石首魚也食鑑患肺疽者終身戒食全生後集蝦俗作蝦無須及腹下通黑殼反白者不宜食四聲鱓俗名黃鱔大而黑者通身浮水上者項下有黑點者昂頭出水二三寸者皆有毒殺人同上補有毒不可食諸魚凡魚頭正白如連珠至脊上食之殺人凡魚頭中無腮者食之殺人凡魚頭似有角者不可食之凡魚目合者不可食之凡魚無腸膽者不可食之三年陰不起女子絶生凡魚投地塵土不汙者不可食之凡魚狗不食鳥不啄者不可食之凡魚鮓不可合小豆藿即小豆葉也食之凡魚子不可合豬肝食之以上俱金匱要略介類鱉冷而難消脾虛者大忌從新凡足赤三足頭足不縮獨目赤目目凹陷腹下紅或生王字形及有蛇紋者皆蛇化也不可食拾遺蟹未被霜者食之傷中敗胃動風大傷陰血廣利凡背有黑點生腳不全獨螯獨目兩目相向目赤足斑腹下有毛腹中有骨者並殺人拾遺蚌多食發風動冷氣衍義蜆多食發嗽生痰及冷氣消腎食治蛤蜊多食令人腹結痛別菉淡菜多食令人煩悶發丹石毒食鑑蟲類蜂蜜俗名蜂糖生岩石者名岩蜜亦名石蜜大腸虛滑者雖熟蜜亦在禁例酸者食之令人心煩同蔥食害人食蜜飽後不可食酢令人暴亡從新黃蠟誤雜於雞肉內者食之令人氣塞而死類鈔總補有毒不可食諸物凡酒及水照見人影動者不可飲之飲酒食生蒼耳令人心痛飲酒大醉炙腹背令人腸結穢飯餒肉臭魚食之皆傷人蜘蛛落食中不可食之蜂蠅蟲蟻等多集食上食之致瘻以上俱金匱要略雞魚諸肉經宿者不再煮勿食食之吐瀉作脹諸肉汁藏器中不泄氣者食之令人腹脹吐瀉以銅器蓋銅生汗滴下亦毒飲食放露天飛絲墮其內食之喉腫生泡烈日曬熱瓷器不可便放食物食之有損無益銅罐內貯茶水錫瓶內盛燒酒經宿看渴甚不可飲以上俱本草食鑑米飯麵粉之類如遺入水缸內致生毛衣者人若誤食多生癰毒久晴甫雨屋檐水不可供人飲食要知屋上每多蛛尿貓糞等穢壁虎蜈蚣蟲涎諸毒食之不獨不潔且生疽生病須遇大雨沖流之後方可無忌也有雷雨水不可供食雷有焰毒凡有雷之時其雨水飲之腹脹生病以上俱傳家寶小滿芒種白露三節內水並有毒人飲之易生脾胃病陶氏別菉屋漏水滴物上有大毒茅舍漏尤甚菜在檐下滴水處者亦不可食花瓶水有大毒不可食若浸蠟梅花者尤能殺人二說俱慈惠小編戒色欲一戒風雷聖人以迅雷風烈必變所以敬天之成怒也此時若犯色欲不但天奪其算神降之殃抑且生子醜貌怪相非邪僻下流即損身非命可不慎哉一戒寒暑天時炎熱寒凍無論老少須加保重度此危關已屬萬幸若加房事鮮不致病損壽豫友夏會宗老而康強自言無他術惟於少壯時五六兩月及冬至後兩月獨宿保養豫深敬服惟是夏熱赤體冬寒偎傍邪興易起當另具堅忍之心戒之一戒虛弱今人心思尖倒自十四五歲童心無所不知每每破身口而弱根悉由於此何況生來充實者甚少虛弱者頗多若留戀縱欲自然疾病叢生醫藥難效將有用之才一旦長往可不哀哉一戒衰老人年半百以後精神氣血漸次日衰譬如油少之燈若不添油再加燈草多耗欲燈之不滅何可得乎昔人云油盡燈滅髓竭人亡甚可畏也每見一等老人精氣已衰猶在此中講求甚有兒孫滿前多置妾媵以圖一時歡樂者所謂閻羅王未曾相喚何乃目求押到深可嘆也一戒醉飽古語云醉飽莫行房五臟皆反覆極言其大有損傷也但酒醉行房則血氣流溢滲入大小腸腑多成便血腸癖濁淋癰疽痔毒等病食飽行房則脾胃損傷多成中膈氣鼓臍痛偏枯等病不可不慎一戒憂怒男女交合乃歡樂事也人或有憂愁惱怒每借房事以消遣殊不知憂怒既傷於神色欲又傷於精精神兩傷極危道也明述之人何可以性命自陷於危乎以上傳家寶
