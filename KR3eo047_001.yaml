body:
  text: 卷一慎疾法語省身修德凡人平日飲食男女之間能自節愛便是省身修德若一味任性恣肆無忌俾過惡潛滋暗長甚則疾病應之雖因風寒外感或緣內傷七情以致魂魄相離精神失守肌體空疏百骸不遂風寒邪氣得以中入若修德者雖處幽暗不敢為非雖居榮祿不敢為惡量體而衣隨分而食雖富貴不敢恣欲雖貧賤不敢強求是以外無殘暴內無疾病也蓋心內怔則真神守其位氣內定則邪穢去其身行欺詐則神昏行爭競則神沮輕侮於人必減算殺害於物必傷年為一善則神魂歡作一惡則心氣亂人能寬泰自居恬澹自守則形神安靜災病不生福壽永昌由茲伊始壽世青編衛生總要衛生之法如執玉捧盈以保其身臨深履薄以養其氣凡酒不過量肉不勝食膾不厭細食不厭精淡滋味均飢飽此節飲食以衛生也春莫衣單夏莫衣汗秋冬漸添熱毋驟脫此慎衣服以衛生也寢不屍居不容行欲緩坐欲斂此行住坐臥以衛生也喜怒哀樂歸於中和貪嗔癡妄必須看破更要時時寬心知足隨緣諸事參透不憂不怒嘻嘻哈哈欣笑自如此調性情以衛生也寡色欲少言語哀喪墳墓不可率臨駭浪驚風須當早避不大醉不大飽起居動靜俱要怡然以上數端人人可行真延年之秘訣卻病之良方易而不難只要人肯信從留心保養則壽命延長準定無移矣傳家寶飲食宜忌脾胃二氣互相表裡胃為水穀之海主受水穀脾則磨消化為氣血以養周身是調食為要大抵食宜早餐不宜遲晚食宜充飢不宜過飽食宜和暖不宜生冷食宜熟爛不宜堅硬食宜乾燥不宜湯水食宜細緩不宜粗速食宜清淡不宜厚味食宜儉約不宜暴殄又五味不可勝穀味魚肉不可勝穀食先飢而食食不過飽先渴而飲飲不過多孔聖人以食饐而餲魚餒而肉敗不食凡此者胃損胃氣能致病傷生也同上養生銘清晨一碗粥晚飯莫飽足撞動景陽鍾叩齒三十六大寒與大熱切莫貪色欲醉飽勿行房五臟皆反覆欲火遍身燒怎如獨自宿坐臥莫當風宜於暖處浴食飽行百步數以手摩腹莫食無鱗魚自死禽獸肉少言少飲酒少怒少惡欲輪迴惜人身六白光如玉孫真人集保命箴人本無根蒂自損多夭折壽命欲延長身體貴調攝言語貴慎省飲食須樽節酒色勿貪多貪多體虛怯思量莫過度過度氣鬱結坐臥莫當風飢渴寧食熱痰唾莫頻吐漱齒戒掏舌勞力多損骨勞心致傷血爽口忌燒炙積氣成癰癤顏色要常好精神莫輕泄六脈但安和百病自然滅知此慎保養何必求仙訣蕉窗必讀寡欲說人生欲事寡則少病而多壽至老耳目聰明齒髮不落惟縱欲之人必多疾而早夭蓋百邪皆乘虛而入入輕則易愈入重則難痊極重則死矣郭開符曰三十以前不知愛惜精神我去尋疾病四十以後才知愛惜精神疾病又來尋我故寡欲者養身之要也全人矩矱延年六字訣噓屬肝神主其目赤翳昏昏淚如哭都緣肝熱氣上衝噓而理之最神速呵屬心王主其舌口中乾澀身頻熱量疾深淺以呵之上焦有病自消滅呬音戲法靈應切須秘外屬鼻根內關肺寒熱勞悶及膚瘡以斯吐納無不濟吹屬腎臟主其耳腰膝冷多陽道痿微微縱氣以吹之不用外邊求藥餌嘻屬三焦有疾起三焦所有不和氣不和之氣損三焦但使嘻嘻而自理呼屬脾神主其土煩熱氣脹腹如鼓四肢壅悶氣難通呼而理之復如故春噓明目木扶肝夏至呵心火自閒秋呬定收金氣潤冬吹惟要坎中安三焦嘻卻除煩熱四季長呼脾化餐切忌出聲聞口耳其功猶勝保神丹養生書惜三寶韓恆陽真君鸞諭曰天地所誕降者曰氣氣本浩然然其所以耗之者惟語吾身所運用者曰神神貫周身然其所以消之者惟思自幼而舍蓄者曰精精盈骨肉然其所以敗之者惟色誠能緘默少思戒淫更加節飲食以健脾胃避風寒以御感冒常運力以勞筋骨則非特可以卻病並亦可以延年也醒夢晨鐘益五臟𫢈𫢈艮止也君子以思不出其位治心心之官則思多思則傷心受之以止則隨事順應無所入而不自得焉其功效勝於天王補心丹𫢈𫢈損減也君子以懲忿窒欲治肝治腎多怒則傷肝多欲則傷腎知所減省而懲之窒之則肝火不得妄動而腎水亦漸以滋長矣其功效勝於疏肝益腎丸𫢈𫢈頤養也君子以慎言語節飲食治肺治脾多言則傷肺多食則傷脾慎焉節焉乃君子所資以養身者是可以保肺而健脾矣其功效勝於補中益氣湯端素齋雜綴先時加謹先春養陽法每日閉目冥心而坐心註定腎中咽津七口送下丹田起立雙手自抱兩脅微搖者三如打拱狀起立俟氣定再坐如前法咽津七口送下丹田永無風症之侵一月行六次可也多多更妙先夏養陰法每日閉目冥心而坐心註定於心咽津十四口送下心中永無暑氣之侵先秋養陰法每日閉目冥心而坐心注肺中咽津送下丹田者十二口以雙手攀足心者三次俟氣定再如前咽津送下丹田者七口而後止永無燥熱之病先冬養陽法每日五更坐起心中註定兩腎口中候有津水送下丹田者三口不必漱津以手擦足心火熱而後已再送津三口至丹田再睡永無傷寒之症而長生之法亦在其中矣長夏不必更有方法俱石室秘菉攝生要言一慎風寒沐浴臨風則病腦風痛風飲酒向風則病酒風漏風勞汗暑汗當風則病中風暑風夜露乘風則病寒熱臥起受風則病痹厥衣涼冒冷則寒外侵飲冷食寒則寒內傷人惟知有外傷寒而不知有內傷寒訛作陰症非也凡冷物不宜多食不獨房勞為然也周揚俊曰房勞未嘗不病陽症頭痛發熱是也但不可輕用涼藥耳若以曾犯房勞便用溫藥殺人多矣愚按諸書從未有發明及此者世醫皆罕知之周子此論可謂有功於世矣早起露首跣足則病身熱頭痛納涼陰室則病身熱惡寒多食涼水瓜果則病泄痢腹痛夏走炎途貪涼食冷則病瘧痢一戒受濕坐臥濕地則病痹厥癘風衝風冒雨則病身痛長著汗衣則病麻木發黃勉強涉水則病腳氣攣痹飢餓澡浴則病骨節煩痛汗出見濕則病痤痱痤癤也音坐平聲一節飲食經曰飲食自倍腸胃乃傷膏粱之變能生大疔即外癰亦皆由此亦膏粱之疾消癉痿厥飽食太甚筋脈橫解腸澼為痔飲食失節損傷腸胃始病熱中末傳寒中怒後勿食食後勿怒醉後勿飲冷引入腎經則有腰腳腫痛之病飽食勿便臥飲酒過度則臟腑受傷肺因之而痰嗽脾因之而倦怠胃因之而嘔吐心因之而昏狂肝因之而善怒膽因之而忘懼腎因之而爍精膀胱因之而溺赤二腸因之而泄瀉甚則勞嗽失血消渴黃疸痔漏瘡毒為害無窮鹹味能瀉腎水損真陰辛辣大熱之味皆損元氣不宜多食一禁淫欲男子二八而天癸至女子二七而天癸至交合太早斫喪天元乃夭之由男子八八而天癸絕女人七七而天癸絕精血不生入房不禁是自促其壽矣人身之血百骸貫通及欲事作撮一身之血至於命門化精以泄人工受胎皆稟此命火以有生故莊子曰火傳也不知其盡也夫精者神倚之如魚得水神必依物方有附麗故關尹子曰精無人也神無我也楞嚴經曰火性無我寄與諸緣氣依之如霧覆淵不知節嗇則百脈枯槁交接無度必損腎元外雖不泄精已離宮定有真精數點隨陽之痿而溢出如火之有煙焰豈能復返於薪哉一忌過傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋暴喜傷陽暴怒傷肝窮思傷脾極憂傷心過悲傷肺多恐傷腎善驚傷膽多食傷胃醉飽入房傷精竭力勞作傷中春傷於風夏為餐泄夏傷於暑秋為痰瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫夜寢勿言語大傷元氣修養雜菉勿藥須知正心凡欲身之無病必須先正其心使其心不亂求心不妄念不貪嗜欲不著迷惑則心先無病矣心主無病則五臟六腑即或有病不難治療獨此心一動諸患悉招雖仙醫如扁華在旁亦無所措手益州老人書靜坐閒暇無事靜坐片時大有益於身心蘇文應公曰無如此靜坐一日似兩日若活七十年便是百四十世間何物能有此效既無反惡又省藥錢人人做得來若無好湯便多咽不下醒世良方調息修真家教人或閉氣或運氣或數遍數或吐故納新依予愚見皆非正道要知人身氣脈原自流通何煩閉運數納耶但只斂神靜坐安舒四體緊閉口齒息從鼻出任其自然不粗不促不閉不抑是謂調息耳睡法凡睡必須曲足仰臥以斂其形形斂則神斂如仰臥則元神散蕩矣臥時手不可放心胸上則無夢魘臥時不可言語即如鐘磬不懸則不宜發聲蔡季通睡訣云臥側而曲覺正而伸早晚以時先睡心後睡眼晨起每日清晨睡醒欲起先拍心胸三四下然後披衣坐起恐暖身驟涼毛孔必閉而成傷風諸病洗面勿開眼洗面令人眼澀失明饒淚當摩搓兩掌令熱以摩額面拭二目又順手摩發如理櫛之狀發可不白漱口不可用太熱水亦不可用冷水其馬尾硬牙刷亦不可用俱主損齒惟溫茶軟牙刷最妙固齒齒不保固則經絡不通且生齒疾清早睡醒時則叩齒二三十下每晚及食後必漱令潔淨小便時閉口咬牙候畢方開永無齒疾受用多多轉肩凡人坐久常以兩手按䏶左右轉肩數十扭則氣血通暢不生諸病仙家以此法為轆轤雙關最有功效運手手不運動則筋骨不壯以一手握拳用力先微後緊伸縮十餘次再前後十餘次換手亦然則百病不生擺身身不擺則腹不能運腹不運則食不能消凡飽食後以兩手握拳交固胸中橫擺肩腰四五十次左右轉腹亦各十餘次則脾胃運動飲食消化伸腰或作事或讀書坐久則氣血下墜須二手伸上先輕後重連腰提起用力如舉千斤重物復又漸漸輕放如此三五次令血氣上升身不衰敗可卻周身諸病擦足每晚上床時用一手握指一手擦足心如多至千數少亦百數覺足心熱將足指微微轉動二足更番摩擦蓋湧泉穴血在兩足心內摩熱睡下最能固精融血康健延壽益人之功甚多洗浴浴時先以熱水撲胸則不致冷熱沖激浴完小便能去腹中寒溫氣但飢時不可浴浴須避風以上十四則俱多能集養氣一少言語養神氣二戒色欲養精氣三薄滋味養血氣四咽津液養肺氣五莫嗔怒養肝氣六潔飲食養胃氣七減思慮養心氣老子訓長生人生以百年為限節護乃至千歲如膏之小炷與大炷耳人大言我小語人多煩我少記人悸怖我不怒淡然無為神氣自滿此生之藥同上五叟言昔有行路者路上見五叟年各百歲余精神加倍有誠心向叟拜問何得長壽大叟向我言心寬不眉皺二叟向我言山妻容貌醜三叟向我言語言少開口四叟向我言飲食宜節受五叟向我言夜臥不復首妙哉五叟言所以壽長久抄錄勸世人願各遵所守增改應璩詩謹慮詩人世難逢思有常平居慎勿恃無傷爭先徑路機關惡近後語言滋味長爽口物多終作疾快心事過必為殃與其病後方求藥孰若病前能自防邵康節詩卻病詞縱欲本原致疾貪杯氣體多傷悲歡得失總尋常切莫胡思妄想當食調勻飢飽順時增減衣裳風寒暑濕要提防卻病全憑保養勸世西江月處世方謙味苦而甘能和諸脈益身心讓味淡而苦回甘卑味先苦辣而甘大補骨加隨俗子中心堅者有大毒必以金剛子濃汁制方可常服能和血脈而悅顏色大有益心印語菉獨宿丸治一切虛弱勞傷吐血痰喘諸疾久服令人精神康健卻病延年昔包恢年八十八以樞密登拜郊臺精神老健賈似道意其必有攝養奇術問之恢曰予有一服丸子藥乃不傳秘方似道堅叩之恢徐曰全靠吃了五十年獨宿丸滿座大笑愚謂獨宿之妙不但老年少壯亦當如此日間紛擾心神散亂全賴夜間休息以復元氣若日內心猿意馬狂妄馳驅至夜又醉飽而恣情縱欲不自愛惜其精神何能長生耐老勿藥真言十全大補湯吳神烈真君鸞諭曰世間疾疫皆人自取雖曰天行疫氣然不行於好善能修之士若彼大惡不良自有天條明斥惟遊移不謹之人乃以疫氣警之予今特施不藥之方一曰好善二曰修德三曰積功四曰孝友五曰敦宗六曰和眾七曰仁慈八曰濟困九曰直道十曰忠恕此十全大補湯普勸世人多服真延年卻病之良方也若前未曾服者今宜速備上料而時時服之亦未晚也省吾集十二段動功一叩齒齒為筋骨之餘常宜叩擊使筋骨活動心神清爽每次叩擊三十六數二咽津將舌舐上齶久則津生滿口便當咽之嚥下嘓然有聲使靈液灌溉五臟則火自降矣咽數以多為妙三浴面部將兩手自相摩熱覆面擦之自頸及髮際如浴面之狀則發不白而顏如童矣四鳴天鼓將兩手掌掩兩耳竅先以第二指壓中指彈腦後骨上左右各二十四次既能聰耳又能去頭眩五運膏肓穴此穴在肩上背心兩旁各三寸藥石針灸不到之處將兩肩扭轉七次能散一身諸病六托天將兩手握拳以鼻收氣運至泥丸即向天托起隨放左右膝上如前法每行三次能去胸腹中邪氣七左右開弓要閉氣將左手伸直右手作攀弓狀兩眼稍視右手左右各行三次能瀉三焦之火並去臂腋風邪積氣八摩丹田將左手托腎囊右手摩丹田三十六次然後左手轉換如前法能暖腎補精九擦內腎穴要閉氣將兩手搓熱向背後擦腎堂及近脊命門穴左右各三十六次十擦湧泉穴用左手抱住左腳以右手擦左腳心三十六次換轉右腳如前行十一摩夾脊穴此穴在背脊之下尾閭之上統會一身之氣血運之大有益並可療痔十二灑腿足不運則氣血不和行動不能爽快須將左足立定右足提起灑七次後換右足立定如前行右十二段乃運導按摩之法古聖相傳卻病延年明白顯易盡人可行莊子曰呼吸吐納熊經鳥伸為壽而已矣此導引之士養形之人彭祖壽考者之所好也由是傳之至今其法自修養家書及醫經所載種數頗多又節取要約切近者十六則合前十二段參之各法大概備矣行功凡行功每於子後寅前此時氣清腹虛行之有效先須兩目垂簾披衣端坐兩手握固趺坐當以左足後跟曲頂腎莖根下動處不令精竅漏泄耳兩手當屈兩大指抵食指根餘四指捻定大指是為兩手握固然後叩齒三十通即以兩手抱項左右宛轉二十四次此可去兩脅積聚之邪復以兩手相叉虛空托天反手按頂二十四此可除胸膈間病復以兩手心掩兩耳卻以第二指彈腦後枕骨二十四此可除風池邪氣復以兩手相促按左膝左捩音例身按右膝右捩身各二十四此可去肝家風邪復以兩手一向前一向後如挽五石弓狀二十四次此可去臂腋積邪復大坐展兩手扭項左右反顧肩膊隨二十四次此可去脾胃積邪復以兩手握固並拄兩肋擺撼兩肩二十四此可去腰肋間之風邪復以兩手交捶臂及膊反捶背上連腰股各十四此可去四肢胸臆之邪復大坐斜身偏倚兩手齊向上如排天狀二十四此可去肺家積聚之邪復大坐伸足以兩手向前低頭扳足十二次卻鉤所伸足屈在膝上按摩二十四此可去心包絡間邪氣復以兩手據地縮身曲脊向上十二舉此可去心肝二經積邪復以起立據床拔身向背後視左右各二十四此可去腎間風邪復起立徐行兩手握固左足前踏左手擺向前右手擺向後右足前踏右手擺向能左手擺向後二十四此可去兩肩俞之邪復以手向背上相促低身徐徐宛轉二十四此可去兩肋之邪復以足相紐而行前進十數步後退十數步復高坐伸足將兩足紐向內復紐向外各二十四此兩條可去兩膝兩足間風邪行此十六節訖復端座垂簾握固冥心以舌舐上齶攪取華池神水漱三十六次作嘓嘓聲嚥下復閉氣想丹田之火自下而上遍燒身體內外蒸熱乃止右諸法學者能日行一二遍久久體健身輕百邪皆除不復疲倦矣六字靜功六字出息治病之旨常道從正變道從權噓應肝春行之肝病行之呵應心夏行之心病行之呼應脾四季行之脾病行之呬應肺秋行之肺病行之吹應腎冬行之腎病行之嘻應三焦熱病行之右六字訣道藏玉軸經云言世人五臟六腑之氣因五味熏灼又被七情六慾所亂積久成患以致百骸受病故太上憫之以六字氣訣治五臟六腑之病其法行時宜靜室中暖帳厚褥盤足趺坐將前動功略行一次初學靜功恐血脈不利故先行動功後及靜功若七日後不必行動功行動功畢即閉固耳目口齒存想吾身要身似冰壺心如秋月良久待其呼吸和血脈定然後口中微放濁氣一二口然後照前節令行之假如春月須低聲念噓字不可令耳聞聞即氣粗粗恐氣泄耳放噓字氣盡即從鼻收清氣入於本經仍及丹田一收一放各二十四或三十六餘放此乃時令運行之常道也假如秋月患目疾應乎肝當行噓字又如春患虛黃當行呼字此乃權變病應之法也獨肺部之疾肺本主氣不得行此法宜專行咽津工夫降火甚捷凡修此道須擇子日子時起首二十七日為期如耳聾虛勞鼓膈之症頓然自愈行之既久腹中自聞漉漉有聲內視目有一種景象百病除而精神充矣解十二時病醜寅時精氣發生之候勿濃睡擁衾坐床呵氣一二口以出濁氣將兩手搓熱擦鼻兩旁及熨兩目五七遍更將兩耳操卷向前後五七遍以兩手抱腦手心恰掩兩耳用食指彈中指擊腦後各二十四左右聳身舒臂作開弓勢五七遍後以兩股伸縮五七遍叩齒七七數漱津滿口以意近下丹田作三口咽清五臟火小息卯見晨光量寒溫穿衣服起坐明窗下進百滾白湯一甌勿飲茶櫛發百下使疏風散火明目去腦熱盥漱畢早宜粥宜淡素飽摩腹徐行五六十步取酒一壺放案頭如出門先飲一二杯昔有三人皆冒重霧行一病一死一無恙或問故無恙者曰我飲酒病者食死者空腹以是知酒力辟邪最勝不出門或倦則浮白以助其氣辰巳二時或課兒業或理家務就事歡然勿以小故動氣無事則焚香獨坐閉目定神咽津約十數口蓋亥子以來真氣至巳午而微宜用調息以養之午餐量腹而入食宜美美非水陸畢具異品殊珍柳公度年八十九嘗語人曰我不以脾胃熱生物暖冷物軟硬物不生不冷不硬美也又勿強食當飢而食食勿過飽食畢起行百步摩腹又轉手摩腎堂令熱使水土運動及水煎茶飲適可勿過多未時就書案或讀快書怡悅神氣或吟古詩暢發幽情或知己偶聚談勿言閨閫勿語權勢勿臧否人物勿爭辯是非當持寡言養氣之法或共知己間行百餘步不衫不履頹然自放勿以勞苦徇禮節申時點心用粉面一二物或果品一二物弄筆臨古帖撫古琴倦即止酉時宜晚餐勿遲量飢飽勿過小飲勿醉陶然而已孫思邈云半醉酒獨自宿軟枕頭暖蓋足言最有味課子弟一日程如法即止勿苛戌時篝燈熱湯濯足降火除濕冷茶漱口滌一日飲食之毒默坐日間看書得意處復取閱之勿多閱多傷目亦勿多思鄭漢奉曰思慮之害甚於酒色思慮多則心火上炎火炎則腎水下涸心腎不交人理絕矣故少思以寧心更闌方就寢湧泉二穴精氣所生之處寢時宜擦千遍床前宜燒芸朮降香以闢穢氣及諸不祥亥子時安睡以培元氣身必欲側屈上一足先睡心後睡眼勿想過去未來人我等事惟以一善為念則怪夢不生如此御氣調神方為自愛其寶動功以下據修養集說為善去疾孝感監文思院趙應道病瘰癧幾委頓泣別親舊曰吾死矣夫閨閣中一物皆捨得獨鶴髮老親無托奈何語未竟俄有道人叩門語趙曰病不難愈也取紙二幅各掏其中為一方竅徑可二尺許以授趙曰俟夜燒一幅灰之調乳香湯塗患處留一幅以待後人言訖道人不復見始悟兩方竅乃一呂字也呂祖靈驗記信神康熙四年五月江北有五人南渡其舟子信奉關帝朝夕頂禮是夜夢帝云明晚五人渡江決不可依若彼必要南渡我書三個字於汝手心等彼下船付之一覽舟子如言將手中三字捻緊及晚果有五人趁船舟子將手放開一照五人即不見所留包裹行箱俱南方瘟疫冊籍之類舟子至東吳傳言三字人多不識疒真足疒𮌘疒孑足吳下人信者多黏於門上是年貼者竟不染瘟疫關聖全書誦經一人誦高王觀音經甚誠出行折一足哀叫菩薩垂救夢僧授一方用綠豆粉新銚炒紫色井水調厚敷紙貼杉木皮扎定其效如神四聲本草注惜字梁谿一人每月延僧給米三斗銀三錢令其日拾字紙晚交其家用竹簍貯之自身衣衿置二袋一見路溝牆角或垃圾積處有濕穢字紙拾盛之一備見皮紙包見人將字紙包物即出紙包易之晚歸併貯於簍俟本身誕日將一年拾積字紙焚化河濱灰送水中不為人所踐踏僧死後其惜如故越數年患膨病已殞其魂遇僧於橋上僧問近日行藏答以病危僧曰此處有一施藥道人能療此病引見之僧對道人備述其惜字如此道人付藥三丸令持歸將至家嗅丸香甚吞之比聞舉家號哭聲遂蘇索飲橄欖湯甚迫飲畢溺出如注盈桶漸愈復活二紀此事不特耳聞實且目擊奉勸世人欲延年卻病者當以惜字紙為靈丹秘方二惜編放生杭州周志學生八子六子俱殤餘二子亦孱弱多病時有不育之慮志學年逾五十心甚不快偶過西湖遇一童顏道貌異人謂曰子若重有憂者因告以故且求小兒延壽之方異人曰人物雖殊生理本一為父母者於小兒生日及每月本命日誠心為之放生則生機相感命自我造生兒自無夭扎之患志學謝之篤倍放生甫一年二子並強健無疾志學遍告同人百試百驗放生百福編按小兒生日及每月本命一年不過七日至期或一二百文或五六十文買魚蝦螺蛤之類虔心放之生意相關誠心術也敢以告世之為父母者建橋平湖青龍橋地接泖河水勢湍急向架以木時建時圯乾隆壬辰陸萬齡妻張氏指資易以石氏寡居老而盲建橋後目漸明年八十三猶康健善飯柘上叢說救溺陸某長洲農民也嘗染風疾發眉盡脫累藥無效自以為必死遂辭其家攜一孫操小舟往來江湖間丐食為活嘗晚泊酒家求酒遇一白衣老人告曰吾善治此疾即以針刺其兩股血流如注命以河水沃之須臾血止復以紅藥一丸與之曰服此至夜半出汗可急入水浴之問其姓曰姓鍾問其所居何地曰黃村陸服其藥至夜半果汗時暑天如其言入水浴之浴畢呼其孫曰吾疾去矣驚喜不勝明日操舟還見者皆驚訝陸具言其故往其地謝之則絕無所謂鍾先生者惟有一鍾離廟云或言陸嘗救一投水婦人亦陰德所致都公譚纂還金獻縣丐者王希聖足雙攣以股代足以肘撐之行一日於路得遺金二百錠移橐匿草間坐守以待覓者俄商家林人張際飛倉皇尋至叩之語相符舉以還之張請分取不受延至家議養膳終其身希聖曰吾形殘廢天所罰也違天坐食必有後咎毅然竟去後臥岳帝祠內忽有醉人曳其足痛不可忍醉人去後足已伸矣由是遂能行至乾隆已卯年卒國朝祥殃菉呂祖治百病符用黃紙朱書頭帶一道身佩一道房門貼一道
