body:
  text: 附九天神霄玉訣戊日禁忌昔漢武帝元封元年七月望日西池王母降臨帝問曰世間蟲蝗水旱之災緣何而至王母曰世間下民無知四時之內犁鋤田土冒犯陰陽之禁忌是故水澤不降百穀不收民遭饑饉帝曰如何禳解得免此災王母曰夫禁最重無法可禳不惟蟲蝗之災而四時所犯各有其應若動土尤當禁忌春犯六戊日令人壽夭無後動土則犯地靈夏犯六戊日令人損目非災動土則犯五嶽威靈秋犯六戊日令人時疫瘧痢動土則犯山川社會冬犯六戊日令人官非口舌動土則犯四瀆神祇世人若能畏忌不犯六戊日之禁即得時和歲稔衣食豐足又玄科天律凡法官道士僧俗等眾於六戊日建齋祀醮關申天曹者滅身知而過犯者殃及九祖風刀割裂不宥非受法籙者滅三等道家燒香玄科最重而無解釋之門也抱朴子曰蛇逢已日不出道燕逢社日不銜泥蟲鳥尚知陰陽忌何況人為萬物靈鬥母天尊肥親丸方世上只有肥兒丸並無肥親丸揆之烏鳥反哺之私可以人而不如鳥乎凡家有老親及年六十外氣血已衰者宜時時照方修合藥止用匕分兩准加現身譬喻之言不過深望人子之血心辦藥耳人參一錢多者更妙此味即在人子身上取用出內府帶心血者佳肉桂一兩少者二三錢此味即在人子貼肉上取用無心者不堪入藥歸身二兩酒炒此味即在人子及身體巳者取用無二心者真茯神二兩抱木此味即在人子服勞安靜上取用若味薄性躁者偽遠志三兩此味即在人子立身遠大顯親揚名上取用若能體親心堅若志者尤效棗仁三兩此味即在人子早發仁心貽親令名上取用產心田出肺腑者妙甘草二兩此味即在人子情性和平善攝親心上取用若甜言蜜語出之不真者服之無功此數藥肥親親有不肥者天翻地覆必無是理也依方取用斯為人子果能肥親不必用藥肥兒而兒自無不肥也佛偈曰堂上有佛二尊懊惱世人不識不用金彩粧成非是檀香雕刻只有在世爹孃便是釋家彌勒若能敬奉得他何用別求功德純陽祖師救世服藥用引節要寒病用淡薑湯作引熱用黃連或用石膏黃柏等味痰症用貝母筋絡有不快用鉤鉤暑症用青蒿藿香木香等味毒症用銀花肝氣用小茴或玫瑰花建蘭葉素蘭花邪病用真降香痢疾用青蒿藿香木香銀花鉤鉤此指紅痢五色痢也心神不寧不交用遠志棗仁丹參枸杞等藥其引不可盡述大抵如熱痛用熱藥為引之類如不識其症候但重用鉤鉤或五錢七錢此品是仙品醫者未洞知其妙其次莫如金銀花須用一半生一半熟虛證要藥神品乃鉤鉤枸杞丹參三味鉤鉤為君須重用餘二品等分或三錢五錢不等丹參醋製九次枸杞鹽制九次鉤鈞酒拌曬九次此皆時醫所罕論也用藥誡人中黃腸胃熱毒偶有用入丸散者今入煎藥則是以糞汁灌人而倒其胃矣人中白飛淨入末藥若煎服是以溺汁灌人矣鹿茸麋茸俱入丸藥外症痘症偶入煎藥又古方以治血寒久痢今人以治熱毒時痢腐腸而死河車臍帶補腎丸藥偶用今入煎劑腥穢不堪又臍帶必用數條肆中以羊腸龜腸代之蚌水大寒傷胃前人有用一二匙治陽明熱毒今人用一碗半碗以治小兒死者八九蚯蚓痘症用一二條酒沖已屬不典今用三四十條大毒大寒服者多死蜈蚣蠍子胡蜂皆極毒之物用者多死間有不死者幸耳石決明眼科磨光鹽水煮入末藥今亦以此法入一切煎劑何義白螺殼此收濕糝藥亦入煎劑其味何在雞子黃此少陰不寐引經之藥今無病不用燕窩海參淡菜鹿筋醜筋魚肚鹿尾此皆食品不入藥劑必須洗浸極淨加以姜椒蔥酒方可入口今與熟地麥冬附桂同煎則腥臭欲嘔醋炒半夏醋煅赭石麻油炒半夏皆能傷肺令人聲啞而死橘白橘內筋荷葉邊枇杷核查覈扁豆殼此皆方書所棄今偏取之以示異更有宜炒者反用生宜切者反用囫圇其類不勝枚舉各說並見慎疾芻言桑蟲取桑蠹蟲用以發痘不知創自何人予嚐遍考痘症諸書從未見有用之者及審其質性不過為陰寒濕毒之蟲耳惟其有毒所以亦能發痘惟其寒濕所以最能敗脾顧發痘不從氣血而從毒藥此與揠苗者何異矧其濕毒侵脾弱稚何堪故每見多服桑蟲者毒發則唇膚俱裂脾敗則泄瀉不止人但見痘症之死而不知其敗在蟲毒也前之既覆後可鑑矣其奈濛濛者率猶長夜之不醒何予欲呼之用斯代柝而並咎夫作俑者之可恨景岳全書牛蝨啖血例比虻蟲苦寒有毒尤非痘家所宜而世習用之其為害不知若干人矣本草從新製劑說徐靈胎古時權量甚輕古一兩今二錢零古一升今二合古一劑今之三服又古之醫者皆自採鮮藥如生地半夏之類其重比干者數倍故古方雖重其實無過今之一兩左右者惟千金孫思藐著千金方外臺王燾著外臺秘要間有重劑此乃治強實大症亦不輕用也若宋元以來每總制一劑方下必注云每服或三錢或五錢亦無過一兩外者此煎劑之法也末藥則用一錢匕丸藥則如桐子大者十丸加至二三十丸試將古方細細考之有如今日二三兩至七八兩之煎劑乎皆由醫者不明古制以為權量與今無異又自疑為太重為之說曰今人氣薄當略為減輕不知已重於古方數倍矣所以藥價日貴而受害愈速也又有方中熟地用三四兩余藥只用一二錢者亦從無此輕重懸殊之法要知藥氣入胃不過藉此調和氣血非藥入口即變為氣血所以不在多也又有病人粒米不入反用膩膈酸苦腥臭之藥大碗濃煎灌之即使中病尚難運化況與病相反之藥填塞胃中即不藥死亦必灌死小兒尤甚又不論人之貧富人參總為不挑之品人情無不貪生必竭蹶措處熟知反以此而喪身其貧者送終無具妻子飄零是殺其身而並破其家也吾少時見前輩老醫必審貧富而後用藥尤見居心長厚況是時參價猶賤於今日數十倍尚如此謹慎即此等存心今人已不逮昔人遠矣勸惜字紙三官大帝勅雷府劉天君撰惜字垂訓求祿求名求嗣功惟惜字為先昔巳職之文帝吾今復何贅焉但見世人擾擾貧窮困阨盈前大半非他過惡穢汙字紙藂愆雖有訓文廣勸終無一士心堅小子矜馳佻達老成狃習安閒敬奉未聞一二毀殘殆有萬千或以糊房襯裹或以裹物取便或以殘章委棄或以零字淪淹或以習書桌几或以帶上廁邊或以暫時拭穢或以糊襯蠶籩種種罪深辜積一一上奏帝前罰令此曹受報疾厄禁錮相牽農賈鄙俚無減士夫榮祿難延大則滅身滅嗣小則奪紀奪年吾今下哀蠢爾特為奉勅降駢普勸世間士子遵行須要虔虔毋論經書史子毋論野史稗官毋論緗函繭帙毋論斷簡殘編毋論長篇累牘毋論隻字片言務必盡加護惜勿因俗論避嫌始則焚諸火內繼則送去流泉不可因循苟免不可時日耽延急急奉行一月寸心復舊光鮮急急奉行一載本身科甲蟬聯急急奉行一世此生名列上仙實有如斯果報非吾虛語取妍倘有癡蠢狼子敢為誹謗憎嫌吾已奉旨專事立時雷火熬煎今特廣為傳示子其代我布宣檢拾字紙隨在燒化固屬敬惜但惜字戒內有曰勿於灶內燒灰勿燒灰仍棄於地未讀此戒而不犯者鮮矣因思物聚於所好一人檢取有限似不若勸人一法頗善凡親友許酬神願演戲者何不竟許焚字紙數百斤或數千斤隨力隨願此法可貼一字條於空鋪內收賣每斤給錢一二分彼市徒知其價無不檢來無論城鄉俱可行之蓋神戲原欲廣勸愚頑豈料近今演戲俱非正經反教不善定干陰譴何冀降福若能遵此了酬願心者有禱必應矣買到焚時恐飛灰棄地若無字爐處可於地下挖一坑旁留洞出煙上蓋破鍋將字由鍋破處入燒為妥燒過用淨水潑澆再用細蒲包或油紙盛灰每包內放石或磚一塊將繩捆好送大江大河急水中聽其流去包內有磚不致漂流岸邊店鋪招紙等項每多花字相間小兒性愛花紙頑耍扯碎拋棄豈不造孽須用者將花字分開或在上下左右庶大人見時可將字裁去不致糟塌廟宇許願上幡僧道每賣與人染作茶棚風礬並有改為被褥字跡褻瀆俱罹大罪今後施掛惟祈將剪字縫於幡上總屬心願倘有出資收買焚化者以杜後弊功德更難量矣道路拋棄字紙見宜收拾而牆壁披掛者及碗底並傘柄筆梗扇面有字破碎者俱宜收惜凡一切字簿勿與婦女為針線本勿令小兒頑耍𧑓字即古萬字考字彙云𧑓字古佛胸中吉祥之相人皆不知或繡或畫雜於穢處甚且織繡於綢綾上或為衫褲或為被褥豈非不敬人多不察特為廣布凡做佛事須備小缸兩隻一化元寶冥鏹一化文疏紙馬蓋字雖焚化其跡不滅紙灰沾地罪過實甚若遇僧道亦須勸導我等舉議施送字籠籠面簽上將要條刊一二則或另刻一張同送書館之處廣勸凡樂善君子亦可遵此辦理
