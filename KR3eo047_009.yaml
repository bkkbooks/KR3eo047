將種蘿蔔末沖服即生跌打損傷破血方用真降香四兩川五倍一兩為末敷患處圍疔消毒散蓖麻子肉二錢杏仁二錢乳香一錢末藥一錢冰片少許麝香少許兒茶一錢以上共為細末用麻油調敷千捶膏拔毒收口松香一斤杏仁一兩五錢蓖麻子一百粒乳香一兩五錢末藥二兩黃蠟一兩五錢白蠟一兩五錢輕粉二兩銅綠二兩麝香一錢石臼內捶千捶成膏施用甚效驗拔疔膏活磁石一錢醋煅銀硃三分雄黃三分巴豆一粒荔子肉一個蓖麻子七粒打成膏敷上立刻拔出疔瘡仙方百霜不拘紅糖和勻圍瘡上中留一孔如有紅絲者用綿紙作捻蘸桐油點瘡頭即回本處治諸毒瘡發背圍藥方用榆樹皮捶碎加海螵蛸共一處和好酒腳調敷一日三換若無鮮榆皮用香作內榆面亦可貼瘡膏藥方簡而效用甘草一味不拘多少煮油紙若干張用時隨瘡大小剪成將好黃蠟溶化塗勻於紙上貼之將收口時稍加輕粉末立效消毒疔發背諸毒名一筆消鬧楊花一籃搗汁用銅鍋煎熬薄糊樣以川烏草烏各等分為極細末攪入花汁內成膏復盛瓷盆內曬七日如干漆樣然後收貯瓷瓶封好臨用時將好陳酒米醋少許化開用新筆吃飽藥汁從患處外邊圍起至一百十圈漸漸圍入中間患處作癢毒自收住一點少頃出濃即愈治牛皮癬方用芝蘭葉擦之即愈驗極年久陰癬方用吳茱萸胡椒等分為末將蒜頭一枚搗勻抹上一方用大黃汁燒香加枯礬雄黃擦上愈癬瘡方枯礬皮硝熟石膏鮮大黃白鳳仙根打碎同前藥燒酒拌用絹包藥擦五次愈痔瘡止痛方用杏仁七粒燭上燒存性為末加兒茶冰片熊膽再用豬膽調敷上立效熏洗痔瘡方用木別三枚去皮切碎研如泥滾湯泡藥入盆內坐上熏可洗之如此五次愈痔漏擦藥方乳香一錢白蛤五錢治漏孔滑石一兩飛丹一錢共為末豬膽汁調塗愈痔瘡掛下方皮硝綠礬五倍子煎湯洗之自然縮上治坐板瘡及血風膿窠疥瘡黃丹二錢輕粉三錢枯礬七分大楓子肉二十粒共研末用桕油調搽每日再用皮硝一兩入熱水洗之專治坐板瘡硃砂一錢雄黃一錢輕粉五分黃柏五分枯礬五分共為細末先將花椒湯洗淨拭乾摻之即愈治血風瘡方硫黃錢半雄黃三分輕粉三分寒水石四分獐腦五分大楓子肉三分蛇床子二錢半以臘脂油捶搽擦立愈遍體生瘡用水中紫背浮萍煎湯浴浸半日大效如神漆瘡遍身用蟹津抹之或搗爛生蟹塗之遂愈湯火方寒水石牡蠣朴硝青黛各一兩輕粉一錢共為末油調搽塗濕則摻立止痛一方大黃五錢炒黃綠豆粉五錢麻油二兩將麻油煎滾打鴨蛋兩個煎黑去蛋用油搽上愈一方用蛤蜊燒灰麻油調塗即愈年久爛腿方用石膏火煅一日夜取出埋地內一日取起待用如用一兩石膏加輕粉一錢冰片五釐麻油調和用油紙針刺眼作夾紙膏貼仙傳急驚風方中風亦可服用生石膏十兩研末辰砂五錢研末和勻大者服三錢小兒服一錢此方不費極效通關散治驚搐搦熱痰壅塞牙關緊閉不開膽星二錢白礬錢半枯牙皂兩莢略燒存性殭蠶一錢共為細末以指點生薑汁蘸藥少許擦牙涎出口開以生薑湯調藥少許滴入立回驚症丸滑石水飛六兩粉草一兩即六一散一兩配加蛇含石三錢醋煅焠七次代赭石同制三錢麝香五分共研末以粽角搗為丸如綠豆大硃砂金箔為衣瓷器收貯遇症或燈草湯或金銀花或薄荷湯磨化一丸送下立效須死可回生驚風貼腳底治法用半夏一錢黑香附一錢麝香少許共末用雞子青調塗腳底心神效治風冷五虎膏蔥韭蒜姜蘿蔔共搗汁入銅器內熬成膏飛丹曬乾研細入膏以油紙攤貼鵝掌風白果肉八兩水銀五錢共搗爛將手掌先用火烘熱後用藥擦之一日三次數日愈治中風痰迷不省外治法白角明礬二味研極細末吹鼻立蘇治口眼歪斜風症天南星白附子上二味研為細末用鱔血調塗扯頭髮吊之即愈風濕灸餅方防風防己各一兩肉桂南星各一兩麝香一分上為末用大麥粉與藥對半水調成餅曬乾聽用此藥專治寒濕氣漏肩風頭風諸痛難忍將餅放在患處用艾放餅上灸之火盡泡起用膏藥貼之治盜汗法用川五倍子一兩炒黃色研末水調為餅貼臍上縛之即止汗或以乳調蒸熟入臍用核桃殼蓋縛更妙消瘤膏大黃朴硝二味等分麝香少許以蔥蒜搗成膏貼上一日一換四十日愈其膿從毛竅中出治蛇咬方用羊眼豆葉不拘多少搗汁酒調渣敷加烏桕樹葉更妙治瘋犬咬方斑蝥香白芷雄黃杏仁共為末調敷患處如好犬咬用金銀花湯洗口嚼杏仁敷貼遂愈人咬不爛方用龜板或鱉甲燒灰存性為末香油調入山七末調勻敷上立效小兒出尿方用雄雞軟肝一個去筋膜和桂搗為丸白滾湯下一方硫黃三錢蔥頭七個搗爛貼臍亦效小兒夜啼用硃砂少許研細末同燈煤調勻俟小兒熟睡用指從眉心至鼻輕輕抹上止夜不啼矣陰囊破爛用急性子甘草等分為末菜油調敷外用青荷葉貼上即愈腳縫爛方飛丹入花蕊石加冰片少許糝之一方用鵝腳黃皮燒灰存性敷之體氣方田螺七個麝香一分巴豆兩粒將田螺同藥搗爛丸如彈子大夾脅下覺痛即去一方用精豬肉兩大片以甘遂末一兩拌之五更時挾腋下至天明以生甘草一兩煎湯飲之良久瀉出穢物須棄野地中恐氣傳人故耳五次即愈虛弱者間日為之治大小腮腫名蝦蟆瘟用側柏葉汁調蚯蚓糞調敷治紫白癜風或汗斑白附子蜜陀僧雄黃各等分為末用帶皮生薑打汁調之以茄蒂蘸藥擦之即愈治火丹神效方大黃皮硝各五錢研末取柏枝葉打汁調搽即退治小兒火丹瘡用蚯蚓糞研細以雞子清調搽即愈觀音露治一切腫毒極效蝌蚪七十個沒藥乳香研各二錢蟾酥研二分麝香七釐芒硝七錢淨以上共研入小瓷瓶內用黃蠟封口埋土坑內七晝夜其藥俱化為清水連瓶收貯臨用時將筆蘸塗患處隨手立消竹木刺肉內方鹿角燒灰存性為末調敷即出久者不過一夜飛絲入眼用象牙一塊有白紋者佳取人乳放缽內將象牙磨濃如米泔水樣再加黃連末冰片研細各少許入汁內點眼角一方木梳垢為小丸放於眼角邊即出解燒酒毒用鍋蓋上氣水半鍾灌即醒又方服真綠豆粉冷水送下鬼箭打身痛有青痕以亂頭髮擦痛處髮捲成團若發不卷者非也金銀器煎湯服心氣痛生芝麻半升候痛時不必看隨手取來不拘多少銅鍋炒黑為末好酒送下一服除根一方桑蟲糞曬乾每服一二錢酒送下重者兩服立止瘄疹奇驗方治小兒瘄疹不發以至鼻府命在呼吸生芝麻一握蔥白一把先將芝麻搗爛為泥再同蔥搗令小兒坐床帳內不通風處將二味置銅盆中用滾水衝下使藥熏蒸雖極危立時發出可保萬全此方屢驗救活甚多小兒鵝白用金線草煎服即愈生天蛇頭用鴨蛋一個出一孔將雄黃末五分入內和勻浸患指在內不可轉動即愈
