body:
  text: 卷九外治補遺澡浴除病正月初一日二月初二日三月初三日四月初四日五月初五日六月初六日七月初七日八月初八日九月初九日十月初十日十一月十一日十二月十二日概用枸杞葉煎湯洗澡令人光澤百病不生洞天保生菉治腦風熱毒治腦風熱毒目中翳障鎮心明目用生油二斤舊鐵鏵五兩寒水石曾青各一兩打碎硝石馬牙硝各五錢綿裹油中浸七日每以一錢摩頂上滴鼻少許甚效大食國胡商方小兒客忤夜啼取本家廚下燒殘火柴頭一個削平焦灼處向上朱書云撥火杖撥火杖天上五雷公差來作神將捉住夜啼鬼打殺不要放急急如律令書畢勿令人知置兒床前腳下男左女右岣嶁神書脫陽虛證四肢厥冷不省人事或小腹緊痛冷汗氣促炒鹽熨臍下氣海取暖本草類方陰毒腹痛厥逆唇青腎縮六脈欲絕用蔥一束去兩頭留白莖二寸許烘熱堆臍上以熨斗火熨之蔥壞再易良久熱氣透入手足微溫有汗即瘥熨後手足不溫不治同壽菉妒精下疳莖爛一二寸者皆可取效大訶子燒灰入麝香少許先以米泔水洗後搽之或以荊芥黃柏甘草馬鞭草蔥白煎湯洗亦可夷堅志暴傷寒冷喘嗽失音取芫花連根一把切暴乾令病人自以薦裹春使灰飛揚入七孔內少頃淚出口鼻皆辣待芫根盡乃止病即愈古今錄驗結胸寒症結胸或覺吃飯氣塞心口飽滿用好燒酒頓熱取布二塊湛酒自胸下抹布令換熱數次滯下下大便即通利鬆快極驗傳家寶一切齒痛蓽茇細辛樟腦三味為末指湛擦牙頓覺滿口清涼而下流涎溫茶嗽口勿使余涎下咽三四遍愈同上腸痔有蟲蝟皮燒末生油和塗肘後方下部痔䘌掘地作挖小坑燒赤用酒潑沃納吳茱萸坑內患者坐上不過三度愈外臺秘要椒囊法闢一切瘴疾時氣風寒時氣紅川椒去閉口者以絳紗囊貯椒約兩許懸佩近裡衣處一切邪氣不敢侵犯景岳全書清心散治風痰不開薄荷青黛硼砂各二錢牛黃冰片各三分共為細末先以密水洗舌再以姜水擦舌後將藥末水調稀搽舌本上同上玉肌散治一切風濕雀斑酒刺白屑風皮膚作癢綠豆粉半斤白芷滑石各一兩白附子五錢共為末每日數匙早晚洗患處奇方類編玉容丸治男婦雀斑酒刺皮膚粗糙甘松山奈細辛白芷白芨白蘞防風荊芥殭蠶山梔藁本天麻羌活獨活陀僧枯礬檀香川椒菊花各一錢紅棗肉七個共為細末用肥皂去核約一斤許並藥末捶丸秋冬加生蜜五錢早晚洗之同上五汁膏治風痛不拘久近立時見效姜蔥韭白蘿蔔各五斤打汁菜子半斤打汁共煎為膏滴水成珠外加麻油東丹石灰收之汁多加多汁少加少做膏藥貼愈單方彙編摩腰膏治老人虛人婦人帶下兼腰痛清水不臭者虛寒者宜之附子川烏南星各二錢半川椒雄黃樟腦丁香各一錢半乾薑一錢麝香一分共為末蜜丸如彈子大用生薑自然汁化開作糜蘸手掌上烘熱摩腰痛處以暖帛扎之少頃熱如火每日飯後用一丸葛可久方摩風膏治風毒攻注筋骨疼痛蓖麻子淨肉研一兩川烏頭生去皮五錢乳香研一錢半以豬油調膏烘熱塗患處手心摩之覺熱如火效同上雷火針治風寒濕毒留住經絡痛癢不散蒼耳子肉去油乳香沒藥各三錢羌活川烏穿山甲土炒丁香麝香茯苓豬苓黑附子澤瀉大茴香白芷獨活廣木香肉桂各一錢共研細末和勻先將蘄艾揉綿用紙二層鋪上捍薄以藥末摻艾上要極密外用烏金紙卷緊黏固兩頭線紮緊用時以手捺患處墨點記明將針火上燒著用紅布二三層鋪於痛處針之方鈔白禿頭瘡百年屋下燕窠泥蠮螉窠研末剃頭後麻油調搽聖濟方頭風塞鼻方蓽茇細辛為末以豬膽汁拌紙條蘸末塞鼻內病機沙篆一方用生萊菔汁仰臥注鼻中左注右右注左同上洗眼方桑樹皮五錢入爐燒灰用水一鍾煎至八分涼冷澄清後用洗眼一年後瞽目可明但須按日期煎洗正月初八日二月初十日三月初七日四月初八日五月初五日六月初四日七月初八日八月初三日九月初九日十月初八日十一月初十日十二月十一日閏月照上月遇洗眼日期須齋戒虔念南無救苦救難觀世音菩薩百遍無不效驗仙方治目飛血赤目熱痛干藍葉切二升車前草半兩淡竹葉切三握水四升煎二升去滓溫溫洗之冷即換暖以瘥為度廣濟方睫毛倒入川石斛川芎藭各等分為末口內含水隨左右㗜鼻內日二次袖珍方明目枕苦蕎麥皮黑豆皮綠豆皮決明子野菊花同盛作枕至老明目鄭才雜興開瞽復明雞苦膽一個入蜜半匙以線扎口入豬膽內懸檐下通風不見日處二十一日去豬膽留雞膽先用人乳點患處使潤少刻用骨簪蘸雞膽點上遍身透涼流淚出汗二次即明禁茶百日以霜降後桑葉煎湯代茶眼科錄要開瞽眼藥龍砂二錢鳳翎一錢珍珠三分血珀二分冰片一分二釐虎液一分赤金三十張共研無聲瓷瓶收貯用點多年瞽目一切厚翳等症其效如神同上赤腫胡黃連浸人乳點之小兒塗足心同上偷針背上膏肓穴上有紅點用針挑破即愈同上昏花用童便煎菊花洗數次即好願濟堂刊施止眼淚鯽魚膽七個人乳一鍾和勻飯上蒸三次點眼角神效簡易良方暴聾用雞心檳榔一個將臍內剜一窩如錢眼大實以麝香平置患耳門內上以艾炷灸之不過二三次即效因陣方身面疣目七月七日以大豆著疣上三過使患者種豆於南向屋東頭第二溜中候豆生葉以熱湯沃即愈外臺秘要沃殺其豆身面白丹白瓷瓦末和豬脂塗之梅師方身面印文刺破以醋調赤土敷之干再易以黑滅為度千金方身面疳瘡出黃汁者葵根燒灰和豬脂搽之食療本草粉滓面䵟雲母粉杏仁各等分為末黃牛乳拌略蒸夜塗旦洗聖濟方自剄氣管未傷者杉木皮燒灰柿餅嚼爛同灰搗成一處先縫好皮將藥敷上用男人臭裹腳布緊縛扎勿令傷動即瘥屢驗夏氏簡易方黥刺雕青以白馬汗塗上再以汗調水蛭塗之子和方身臂雕青明礬硇砂龍骨各五分人蛆不拘多少共研末用香油一盞煎熱入藥再加黃丹熬膏入麝香少許用油紙攤貼黑跡自然隱入肉內不見食淡粥一月多能集厥逆吳茱萸一兩為末以面五錢用水調成厚糊一般取布如鐘口大攤成膏膏滋厚半分貼湧泉穴內即手足不逆石室秘方痰症酸梅草不拘多少陰乾為末臨用醋調和蘸筆塗舌根痰涎流出又塗又流三四次愈姚羅浮集驗方腰脊脹痛芥菜子末酒調貼之立效葉氏摘元腹中暴症腹有物如石刺痛啼呼不治至百日率死多取商陸根搗汁蒸之亦可以布藉腹上後置藥勿覆臥冷即易晝夜勿停邵真人方腫滿用水蓼花皮硝牙皂大黃梔子各五錢生薑十片蔥蒜各七枝萊菔子三錢搗爛作一大膏藥貼臍腹外用綿絮裹衛生簡易方一方以田螺大蒜車前草和研為膏作大餅覆臍上使水從小便出證治匯補癘風病浴方即古癩風桑枝槐枝桃枝蒼耳苗鮮地骨皮野薔薇根紫背萍七味不拘多少煎湯浸浴竟日須擇明亮無風處七日一浴滇南士司高松筠傳方擦藥治風症腫熱如雲頭如癬或成塊或癍疹不穿爛者用真桕油二兩煎滾黑色去渣大楓子淨肉一兩搗桃仁去皮杏仁去皮尖各五錢水銀一錢五分研三味內已上四味候油冷未凝調和輕粉錢半樟腦一錢牛黃冰片各一分麝香半分已上五味研細候油凝搗和合好埋土中一日夜出火氣用指蘸擦患處一日擦二次十日見效同上敷藥治風症遍身穿爛用桕油六兩煎法如前芝麻三合炒焦研大楓子肉六兩研桃仁去皮杏仁去皮尖各五錢水銀三錢研已上五味候油未凝調和乳香沒藥各一錢箞上炙樟腦面各二錢牛黃三分冰片二分麝香一分已上七味研細候油凝搗和合好埋土中一日夜出火氣敷患處即愈同上雞腳風手足及指拳攣如雞腳狀疼痛不時發者名鬼眼炙左右膝骨蓋下兩邊各有小窩共四穴謂之鬼眼各將蘄艾灸三壯即愈愚謂以驅寒濕雷火針針四穴亦效葉天士醫案紫白癜風蜜陀僧五錢白附子三錢硫黃一錢共為末陳醋調搽數次效月譚朱治方流注風初起草烏金銀花不拘多少共入罐煎水乘熱熏之即愈罐口做布圈以便按瘡姚羅浮集驗方流注不收口水膠不拘多少用水入碗熔化加百草霜為末調勻攤布上貼之即愈同上風瘙癮疹心下迷悶巴豆五十粒去皮水七鍾煮二鍾以帛染拭之隨手愈奇方類編涎潮急救方凡男婦卒然昏倒涎潮於心不省人事即扶室中坐正用好醋斤許焠入炭火中熏之令氣入口鼻涎自歸經人漸蘇切不可用薑湯一滴水入口水如一入逆痰涎永繫於心成痼疾矣病機沙篆預防中風灸風池百會曲池合谷肩顒風市足三里絕骨環跳等穴大妙同上忽然中風不知人事者宜以十宣穴乃十指頭端穴出血即醒同上中風中風筋骨不隨冷痹骨節疼手足拘急風掣痛扁枯死肌多收鼠壤土曝乾蒸熱袋盛更互熨之本草拾遺一切中風中痰中寒中惡將兩手中指對合以繩縛定用艾圓灸兩指三五灸即愈凡灸取寸法量男左女右手中指中一節橫紋處為一寸程氏即得方鼻血不止用蒜一枝去皮研泥作餅如銅錢大左鼻出貼左足心右鼻出貼右足心左右俱出貼兩足心立瘥倉猝未便以熱湯浸兩足亦驗簡要濟眾方鼻衄不止如湧泉者用草紙摺十餘層井花水濕透分開發貼頂心以熱熨斗熨之微熱不妨久之即止景岳全書河白梔子黃同雞子白飛面搗成餅貼臍上種福堂方劄黃疸雄鯽魚一個去頭骨上用背上肉兩塊胡椒每歲一粒至十粒止研細同椿爛另加麝香三分不可同舂恐盡貼臼上一併填滿蛤蜊殼內合病人臍上用絹縛緊一日夜即愈同上黃腫病有病黃腫不可誤為黃疸黃疸遍身如金眼目皆黃面無腫狀黃腫則其色帶白而眼目如故雖同出脾胃而病形不同醫當審而治之黃疸之起由於濕熱蒸染而黃腫之症則濕熱未甚而多蟲與食積之為害也或硬食過多脾家失運化之權濁氣上騰面部黃而且浮手足皆無血色有蟲者必吐黃水毛髮直指皮膚不澤好食生米茶葉之類如腫及四肢難治腫及腹者不治飲食減甚不治以無胃氣故也醫鏡虛勞非傳屍傳屍癆沉沉默默若無可然積月累月漸就羸憊卒至不治延及眷口幾於闔門又傳他姓慘毒之禍聞者駭心辨驗之法焚乳香薰病者之手令仰掌以帛覆之熏良久手背生毛長寸許白而黃者可治紅者難救青黑者死如熏良久而手背無毛非傳屍癆乃尋常虛勞之症李士材方一方燒安息香病人吞吸菸氣嗽不止者傳屍也不嗽非傳屍癆嗽不甚者亦非同上令婦不妬取本婦信水布裹一蝦蟆離廁前一尺許入地五寸埋之張華博物志山行闢蛭山野草木枝上有石蛭著人足穿肌入肉害人以臘豬油熬膏和鹽塗足脛趾著人不害千金方五色丹遊多致殺人蒲席燒灰和雞子白塗之同上五色丹毒蜜和乾薑末敷之肘後方一方用甑帶燒灰雞子白塗之衛生易簡方生肌肉水紅花根煎湯淋洗取葉曬乾研末撒瘡上每月一次談野翁試驗方男婦陰蝕肥豬肉煮汁洗約二十斤可瘥孫真人方女子陰蝕桃杏仁炒至煙氣盡研如泥以綿裹納陰中宜良李氏刊方女陰挺出茄根燒存性為末以油調紙上捲筒納陰戶內一日一換乾坤生意婦人陰中瘇痛艾葉五兩防風三兩大戟一兩水煎熱洗避風與冷再以鯽魚膽搽入奇方纂要婦人陰瘡蛇床子一兩艾葉五倍子明礬杏仁各五錢川連三錢煎水洗之即愈同上一方用杏仁炒研白礬各五錢蛇床子三錢煎水洗之同上婦人茄病海螵蛸二錢硫黃五分共為末鴨蛋清調搽同上婦人陰突物如蛇如雞冠菌樣雄黃鱉頭研黃輕粉各一錢蔥管藜蘆各二錢研細加面冰片二分共研為末和勻再研瓷罐收貯用時先將川芎當歸白芷甘草膽草每取五錢煎湯洗之隨後搽藥早晚二次其患漸收入廣嗣全書轉女為男覺動有娠以雄黃囫圇成塊重兩許以外者用絳囊盛入懸佩褲襠取陽精全於地產也同上一法以斧一柄系妊婦床下斧口向下勿令人知試子雞抱卵時依此置窠下一窠盡雄可驗求嗣秘書一法初覺有娠擇成定二日以舊弓弦繫縛腰間不解滿百日解去紫宮玉女秘法同上妊婦癍疹用井底泥塗臍以下二寸余以綿護之良久再易證治匯補產門閉合不開用銅錢磨利割開陳石灰敷之即愈通變方產門外生瘡不愈黃柏白薇各三錢炒為末乳香出油朝腦鉛粉炒蚯蚓糞炒兒茶各三錢輕粉冰片各五分麝香三分共為末糝瘡口二日全愈神效兼治各種瘡無不神效華仙師方取胞衣要訣胞衣不下將嬰孩抱定不可遽斷臍帶用一伶俐老嫗將右手二指緊跟臍帶面上於帶盡處將指向上半寸摸覺有血便是胞衣因逆轉盛血在內不得下即以指連胞衣向下一捺其血下覆衣自隨下法甚簡明每因胞衣不下多服藥濟或用吐法更有以足抵腹大則殞命小亦成病不知衣之不下由嬰孩出產門臍帶一斷衣必逆轉而向上汙血下淋盡入衣中衣內血滿而不能下豈藥力所能湊效用為世箴免罹此患錄竹堂集驗方婦人月內患眼黃連為末水調揸足心廣利方一方以薑汁調白礬末搽足心深師方月內眼痛大黃六分天南星四分共為末以醋調和左眼痛塗右足心右眼痛塗左足心覺口中有藥氣為妙衛生備要蟻漏有婦人項下忽腫起一塊漸延及頸偶刺破出水一碗瘡久不合有道人見曰此蟻漏也緣飯中有蟻食之用穿山甲燒存性為末敷之立愈多能鄙事血崩用草雞一隻破開去肚雜乘熱縛於臍上立止桂軒隨菉小兒拗哭不止令三姓婦人抱兒臥驢槽移時即止勿令人知本草拾遺火丹遍身紅腫形如水泡用小兒胎衣瓶內水將雞毛拭上隨手而愈錢青掄方一方用新生荷葉搗爛入鹽塗之摘元方一方冬青樹葉搗爛和雞蛋清敷患處用絹縛一周時即愈生火丹切不可吃豬肉恐發腫不消精選良方野火丹毒自兩足起者用乳香末羊脂調塗和濟局方蛇丹刺善魚尾血同蜓蚰搗爛塗單方集要赤遊丹流行不止一處是也此症至急不可救遲即用馬蘭頭不拘多少以水洗去泥搗爛絞汁以汁搽患處燥再搽屢試屢效冬月無葉用根亦可濟世便易集又用風菱殼煅炭為末麻油調搽同上赤遊丹毒十種三日不治毒入胃腸將不可治務宜仔細辨認依方治之萬不失一一從頂頭起腫用蔥白取汁塗之二從頭上起紅腫痛用赤小豆末雞子清調搽三從面起赤腫用灶心土雞子清調搽四從背起赤點用桑白皮為末羊脂調塗五從兩臂起赤腫黃色用柳木燒灰水調塗六從兩肋起虛腫用生鐵屑和豬糞調塗七從臍上起黃腫用檳榔末米醋調塗八從兩足赤腫用乳香末羊脂調塗九從兩腳赤白點用豬槽下土麻油調塗十從陰上起黃腫用屋漏處土羊脂調塗王肯堂方闢鬼法中惡天吊者為惡鬼之氣所中兩目上突吊起而不能下因胎氣不足精神失守虛之所在鬼邪得以犯之其症面白帶青或如土色目睛上視口吐白沫手足拘攣身冷如冰似乎驚風而實非驚風用蒼朮檀香沉香麝香安息香之類近兒旁周圍燒之香菸如霧鬼不能存俟兒稍蘇以桃葉湯浴之同上肚大筋青堅如鐵石用獨囊蒜切片置於臍之上下左右離五分地將艾灸二壯即消幼科鐵鏡鬾病以紅紗袋盛夜明砂佩之直指方缺唇小兒缺唇及幼女扯環耳斷用針將缺處兩邊輕輕劃破以黃丹白礬各等分為末摻上即能生肌神效古香堂抄本瘄疹生芝麻一撮蔥頭一握各搗爛置銅盆內令兒坐上被圍住滾水衝入盆內熱氣熏蒸雖危篤者立時發出可保萬全百試百效同上痘毒用扁藤焙燥研末菜油調塗效同上一方用經霜黃豆根同蠶豆莢殼為末油調敷亦效同上痘毒已破百草霜鉛粉和勻油調搽之同上凍瘡尿出蟲煅末敷上立愈同上口中百病鵝口口瘡重齶不能吮乳及咽喉腫塞一切熱毒用黃連黃柏各末八分雄黃青黛火硝各二分牛黃冰片硼砂硃砂各一分共研極細末每用少許吹入口內即愈說約龜胸小兒心胸高如覆掌由肺熱脹滿之故宜灸兩乳離乳寸半之上兩行三骨間六處各灸三壯春夏從下灸起秋冬從上灸起同上龜背風入督脈背脊受傷背高如龜宜用灸肺腧穴在三椎下兩旁各一寸半心腧穴在五椎下兩旁各一寸半膈腧穴在七椎下兩旁各一寸半六處穴各灸三壯以小兒中指節為一寸艾柱如小棗大聖惠方一方用龜尿點骨節上亦可取效筆峰方腹脹用胡粉鹽熬至色變摩兒腹上子母秘菉痞塊用攢盒內小瓷碟將皮硝裝滿雄黃末蓋面綿紙餬口以針刺孔合定痞上將袱捆緊三日即消保赤編痰喘巴豆一粒杵爛綿包塞鼻孔男左女右痰即自下龔氏醫鑑閃癖頭髮豎黃瘰瘰瘦弱干林檎即紅花脯研末醋和敷之趙氏幼科兒發不生楸葉中心搗汁頻塗千金方失音不語蝦蟆膽點舌尖上立效單方經驗四五歲不語赤小豆末酒和敷舌下崔氏纂要麩瞖未堅不可亂投藥宜以珊瑚研如粉日些少點之三日愈錢相公筐中方畫眉方治小兒思乳小兒斷乳後往往日夜啼哭俗有思奶疳之說用黑山梔三個燒存性辰砂輕粉各少許共為研細末取生芝麻油調和待兒睡著四眼不見時以藥濃敷兩眉間醒來即不思食不可說破不效再加黃丹一錢須揀伏斷及卯日屢驗方陰腫疝氣用蔥園內蚯蚓糞以甘草汁調搽腫處或薄荷汁調亦可保赤良方一方先用蔥花椒煎湯洗之再用蚯蚓糞連土為末津調敷之沈敬遠兒科抄本陰被蚯蚓呵腫如球令兒母以吹火筒吹腫處即消圖經一方取鴨涎抹並吸鴨口氣自消宜良李氏刊方陰㿉腫大不消硼砂一分水研塗之甚效幼科