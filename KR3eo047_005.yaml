body:
  text: 卷五婦科求嗣陰寒十年無子吳茱萸川椒各一升為末煉蜜丸如彈子大綿裹納陰中日再易之但子宮開即有子也經心菉陰冷白淫無子蛇床子研末加枯礬少許敷陰中女科良方兜肚方專治婦人赤白帶下及經脈不調久不受孕者用羚羊角一兩木鱉子八錢丁香七錢白檀香零陵香馬蹄香香白芷馬兜苓甘松升麻血竭各五錢麝香九分共十二味配齊分作三分做夾兜肚三個用蘄艾揉軟如綿須厚同藥裝入兜肚內系肚上三日一解至第五日復系三個兜肚更相替換系至一月後則常系之若已受孕者忌系同壽菉煨臍種子膏當歸川芎白芍川牛膝川巴戟杜仲肉蓯蓉熟地菟絲子蛇床子虎脛骨細辛破故紙各五錢真麻油一斤四兩桑柴熬兩滾下甘草四兩再熬兩滾方下各藥文武火熬槐枝不住手攪藥枯濾去渣再熬滴水不散入倭硫三錢離火再入乳香沒藥兒茶血竭各末三錢後入真麝二錢共攪勻瓷器收蠟封埋地七日每用一塊倍入麝為丸雄黃為衣填臍內外用紬攤一膏藥貼之半月後行房一交即孕胎生男貼久多飲食壯筋骨又漏肩風及女子赤白帶下神效傳家寶灸男婦無子凡貧苦艱嗣之家無力服藥者宜擇壬癸日或益後續世天喜並臨之日將男婦審看有何病患以致不嗣之由各依法灸之無有不效者謹攄屢驗穴法於後一丹田穴在臍下三寸乃是二陰任脈之會灸之能益精血除百病扶陽助陰令人有子案內經明堂記針灸經云此穴補虛羸強陽道壯筋骨除寒熱治男子勞傷遺精白濁婦人赤白帶下經血枯閉崩中漏下等病以致無子灸之甚效丹經云宜灸七壯或十四壯須頻頻屢灸多多益善一中極穴在臍下四寸治男子下元寒冷虛損婦人月事不調赤白帶下生產斷續等病以致無子灸之即便有孕丹經云宜灸三壯一膏肓穴在脊骨四柱下近五柱兩旁各開三寸治五勞七傷身形羸瘦男子失精女子失血骨蒸咳逆怔仲健忘等症以致無嗣灸之百病俱愈交接即孕丹經云宜灸七七壯一三里穴在膝眼下三寸胻骨外廉大筋內宜舉足取之治五勞七傷脾胃冷積食氣水氣蠱毒痃癖浮腫膝䯒骨痠痛眼目昏暗腰背疼痛精髓枯竭等病以致無妊灸之血調經順即便有子丹經云宜灸三壯醫宗金鑑此穴三十外方可灸不爾反生疾一臍下二寸名石門穴不宜針灸令人不孕忌之忌之求嗣秘書會合妙訣凡陰陽會合必擇壬子日與益後嗣世天喜諸吉星並臨之日者蓋謂趨吉避凶重其事而不敢忽也或謂有雙日有單日夜半前後分男女之說亦妄但擇旺相日如春甲乙寅卯夏丙丁巳午秋庚辛申酉冬壬癸亥子四季戌己辰戌丑未之日務必要夜半子醜寅生氣之時使陽精衝開陰血則必生男且能腎明而福壽又月望以前受男孕者吉月望以後受女孕者吉反此所生子女必脆弱不壽至疾風暴雨雪霧雷電日月無光虹霓顫動切不可交合受胎亦有凶無吉詩坎離交媾結成胎精血無虧寡欲來曰生旺四時須選擇陰陽孕育自無災行房禁忌正月忌日初一初五初九十三十四十五二十三二十八晦弦立春立春前一日二月忌日初一初三初五十一十四十五二十三二十八晦弦社驚蟄春分春分前一日子醜酉子午卯酉乙未庚申四沖不收日三月忌日初一初三初五初九十四十五二十三二十八醜戌晦弦清明穀雨辰未申酉四沖不收日四月忌日初一初三初五初八十四十五二十三二十八未晦弦立夏立夏前一日小滿寅申巳亥未酉辰並壬子丙戌四沖不收日五月忌日初一初三初五初六初七初九十四十五十六十七十九二十三二十五二十六二十七二十八二十九晦弦芒種夏至夏至前一日卯申六月忌日初一初三初五十四十五二十三二十四二十八子戌晦弦小暑大暑伏子辰戌丑未並壬子癸亥四沖不收日七月忌日初一初三初五初七初十十四十五二十三二十八二十九晦弦伏立秋立秋前一日處暑酉卯亥寅申己亥並乙卯四沖不收日八月忌日初一初三初五初十十四十五二十三二十七二十八晦弦社白露秋分秋分前一日午未子午卯酉並辛丑甲寅四沖不收日九月忌日初一初三初五初九十四十五二十三二十五二十八晦弦寒露霜降亥寅未辰戌醜未並乙卯四沖不收日十月忌日初一初三初五初六初十十五二十二二十三二十八晦弦立冬立冬前一日小雪寅亥寅申己亥並壬申丙午四沖不收日十一月忌日初一初三初五初六十一十五二十三二十五二十八晦弦大雪冬至冬至前一日酉申戌子午卯酉並壬辰丁己四沖不收日十二月忌日初一初三初五初八十五十六二十三二十五二十八晦弦小寒大寒辰巳午辰戌丑未並丁巳丙午四沖不收日案道經云男女交媾最有避忌若犯所忌天奪其算神降之殃生子醜貌怪相性行不良殘疾夭札實有明驗奉勸求嗣者用小紙將日期錄出貼於壁上每逢禁忌當謹遵之種子心法參祈嗣真詮又忌枯焦日正月辰二月醜三月戌四月未五月卯六月子七月酉八月午九月寅十月亥十一月申十二巳詩九空焦坎日枯焦嫁娶求男忌此宵曰普勸世人知禁避何愁玉樹不抽條又忌非時非地犯者晝合不詳星月下燈光下削祿奪紀烈風雷雨損壽產惡胎酷暑嚴寒得重病廟寺之中井灶圊廁靈柩塚墓之旁惡人降胎有害身命祖先父母誕日諱日減壽一年夫婦生日本命日受禍得病鬱怒大怒傷肝必病遠行行房百里者病百里行房者死醉後醉後行房五臟反覆空腹傷元神胎前傷胎難產產後百日內致婦多病天癸來時男女俱損病後變病不痊種種非犯報禍最烈若能慎於居處而清心寡慾謹守待時何患嗣之不得耶敢為不知禁忌者告焉保命集針灸婦人病不懷孕經閉溺血腰俞穴針二分留七呼灸五壯經血過多崩中漏下通里穴針三分灸五壯漏下不止陰谷穴針四分留七呼灸三壯崩漏月信不調帶下血海穴針五分灸五壯乳癰月信不調臨泣穴針二分灸三壯腳氣月信不調久不成孕難產赤白帶下淋瀝三陰交穴針三分灸三壯赤白帶下帶脈穴針六分炙五壯勞疸赤白帶下兼治男子下元諸虛精冷無子腎俞穴針禁灸三壯食蠱行經頭暈少腹痛內庭穴針三灸留十呼灸三壯血蠱癥瘕渾身腫單腹脹行間穴針三分留十呼灸三壯水蠱胸脅脹滿太谿穴針三分留七呼灸三壯以上諸病穴法治之各有奇效若已有孕者切忌不可針灸至囑至囑針灸經並廣嗣全書受孕戒交媾婦一有孕之後切戒交媾所以昔人有孕即不與夫共寢恐動欲念也大抵三個月以前犯之則欲起而子宮復開多有漏下胎動諸患如三個月以後犯之則胞衣厚而難產要知欲火爍胎必致汙濁凝積且兒身白滯多瘡毒出痘細密難起以致夭亡戒暴怒口不可出惡言手不可用鞭撻蓋怒最傷血氣血氣既傷自不能養胎多有因此動胎者即幸而不動其怒氣入胎生兒多疾矣戒安逸婦人懷孕原賴血以養之氣以護之宜時常行動令血氣周流胞胎活動則氣強而胎壯如久坐久臥久動女工織紡之類不得行走散蕩以致氣不運行血不流潤胎必凝滯不活致多難產且兒軟弱多病戒暖熱凡有胎孕宜微涼而忌太暖北方火炕南方火廂皆不宜睡凡胎動不安者虛僅二三熱有八九慎之哉戒猛藥有孕十日半月脈微難辨未曾過月自亦不知或遇身體不快醫士不知誤投破胎之藥傷害甚多前賢云人知二三月墜胎豈知月內傷胎者眾也戒驚怖受孕後不宜受驚嚇如涉險儺神以及入廟見異奇鬼怪形像俱宜謹戒則肝能育魄不致種胎毒胎驚戒放縱受孕至三四月後宜用布一幅緊束其身勿令胎放以致難產戒小產受孕三五月忽因胎臟損傷胎系腐爛以致胎墮名為小產比大產更重蓋大產如瓜熟蒂落小產如生採破其皮殼斷其根蒂也視為輕忽而殞命者多矣一切調養須要如產後法調理脾胃常人身體健康氣血充足皆由脾胃調和飲食有節若懷孕婦人脾胃尤為緊要蓋胎元全賴氣血以養氣血又藉脾胃飲食而生若飲食不節脾胃必然受虧更或七情內傷氣血因而漸耗則痰火發熾惡阻癇症等病起矣所以明醫一見孕婦脾胃不和急先調理雖有他症以未治之但懷孕至二三月六七月飲食多不甘美不妨少進香美扶助胃氣凡新米新面黏硬難消之物極傷胎元切宜謹戒至於食不可頓飽應吃得十分者止食六七分頻頻多頓乃調理脾胃之要法胎產摘要孕婦食忌受孕之後切宜忌不可食之物非惟有感動胎氣之戒然於物理亦有厭忌者因備採諸說於下食馬肉令子過月附乳母食之令子疳瘦四聲本草食驢騾肉延月難產日用本草食麋肉令子目病食療本草食犬肉令子無聲音本草綱目食羊肉令子多熱仁壽集食羊肝令子生多厄孫真人食忌食兔肉令子缺唇本草拾遺食雀腦令子雀目生生編食雀肉令子無恥多淫廣嗣全書食雀肉合豆醬食之令子面生䵟黑子同上食雞肉與糯米同食令子生寸白蟲同上食雞肉同雞子食令子多疳瘡幼科指南食鴨子與桑椹同食令子倒生心寒求嗣秘書食鮑魚令子多疾同上食鯉魚鱠魚及雞子令子多癤成疳同上食鰻鱺魚令胎有疾夷堅志食鱔魚合蝦蟆一云田雞同食令子瘖瘂三元延壽書食鱉令子頸短及損胎張鼎食療食蛙即田雞也令子壽夭千金食療食螃蟹損胎難產令子橫生孟氏幼科食慈菇消胎氣日華本草食胡椒蔥蒜吳茱萸毒胎同壽菉食黏膩煎煿傷胎同上食茄子傷子宮食鑑本草食生薑令子手足指尖生瘡本草通元食紅莧菜馬齒莧薏苡藿香及臍魚墮胎同上食菌子令子驚風而夭丹溪補遺食燒酒三白酒令子多生瘡癤發痘毒增訂求子錄食漿水粥令子骨瘦不成人陶氏別錄食冰醬絕產同上凡此之類無不驗者蓋母食熱則乳熱母食寒則乳寒母食辛燥之物則乳毒有是數者子受其害矣可不慎哉可不戒哉孕婦藥忌歌曰蚖斑水蛭地膽蟲烏頭附子配天雄躑躅野葛螻蛄類烏喙側子及虻蟲牛黃水銀並巴豆大戟蛇蛻及蜈蚣牛膝藜蘆並薏苡金石錫粉及雌雄牙硝芒硝牡丹桂蜥蜴飛生及䗪蟲代赭蚱蟬胡粉麝芫花薇蓹草三稜槐子牽牛同皂角桃仁蠐螬和茅根欓根硇砂與乾漆亭長波流菵草中瞿麥䕡茹蟹爪甲蝟皮赤箭赤頭紅馬刀石蠶衣魚等半夏南星通草同椒姜蒜韭合紫葳一切草藥不須供切戒婦人有孕忌俚歌牢記在心胸產前忌大醉大忌藥酒燒酒恐產心神昏亂即好酒亦宜少飲數杯活血而已忌大怒正俗方云懷孕婦人性宜寬慈神全氣和不惟胎安生子必溫厚古所謂胎教也忌洗浴不可洗頭不可浴身不可濯足臨月更宜嚴戒關係非小可也忌久睡久坐醫方妙選云嬰兒所以少病者其母懷妊時時小心運動骨血則氣強胎盛不然則胎氣微弱生子必軟而多病忌負重登高負重則氣滯血凝登高則氣搖血動傷胎最易不必有傾跌之患也至舟在跨涉尤宜慎防忌藥餌孕婦無病不必服藥即或胎動亦當質諸博識者延醫照古方斟酌加減用之若亂投安胎破氣開膈之藥為害不小忌師巫往往急於求子者聽信師巫謂可轉女為男吞服符水供奉邪神祈禳魘魅以致孕婦心神驚惑搖動忌之忌之忌針灸孕婦針灸最易墮胎即有大病亦宜戒之切勿聽信人言以致子母俱傷孕婦腹內胎啼是臍帶上疙瘩兒含口中因妊婦伸手高處取物脫出兒口以此作聲令妊婦曲腰就地如拾物狀使兒復得含入口中即止同上各忌並同壽菉一方用多年空屋中鼠穴土一撮令妊婦含之即止產寶孕婦轉胞小便不通腹脹如鼓用豬胞吹脹以翎管安上插入尿孔捻胞氣吹入即大尿而愈衛生寶鑑孕婦胎墜壓胞不得小便脹極危困者將橙一條搭板門一扇令孕婦仰面倒臥其上頭低腳高其胎自上小便即出婦人良方孕婦病欲去胎苦實把豆兒即番木鱉研膏納入牝戶中三四寸集簡方孕婦胎痛欲產日月未足者以全蛇蛻一條絹袋盛達腰繫之千金方妊娠熱病青羊屎研爛塗臍以安胎氣外臺秘要妊娠一切熱病內外諸症護胎法用灶中心土為末用井底泥調敷心下令胎不傷醫鑑妊娠傷寒熱極用嫩荷葉卷者同蜂殼末搗塗其腹宜良李氏刊方妊娠傷寒護胎法井底泥青黛伏龍肝為末攪勻塗臍中二寸許如干再塗上以保胎孕也保產良方妊娠多嗽川貝母心去淨拌麩炒黃研末入砂糖和丸如雞豆大含化一丸立止經驗單方妊娠風寒卒中不省人事狀如中風者熟艾三兩米醋炒極熱以絹包熨臍下良久即蘇濟陰纂要妊娠傷寒令子不落犬尿泥塗腹上干即易本草綱目臨產臨產至妙法凡孕婦將足月腹覺微痛不可便聲揚每人家不知事婦人入房不查時候即多人操扶苦令著力不知時候未到用力無濟甚至橫生逆產次則將產時母無力送下為害不小須要識候產門腫滿方是的時一用力即生矣如產門未腫縱肚痛須勉強行走使氣血流動倘體弱倦怠痛不能忍即臥床無妨但用一大枕放在兩腿之中令其開而弗閉或坐在便桶上尤妙姚羅浮集驗方濟生方凡兒已露頂而不生此因兒轉身臍帶絆其肩也急令產婦仰臥輕輕推兒向上徐徐以手指輕按兒肩去其臍帶候兒順正產婦用力一逼兒即生下敬修齋方硫黃湯專治產婦為收生婆不謹損破尿脬致淋瀝不禁等症用硫黃四兩制吳茱萸菟絲子各一兩五錢蛇床子一兩每用四錢水煎湯頻洗之自愈同上胎動上逼弩弦繫帶之立下醫林集要胎動欲產日月未足者取槐樹向東引枝令孕婦手把之即易生子母秘菉催生方蓖麻子十四粒去殼硃砂雄黃各一錢五分蛇蛻一尺煅共為細末粥糊為丸如彈子大臨產先用川芎湯淋洗臍下納藥一丸於臍中仍以蠟紙數重覆藥上輕帛拴緊產後急速洗去遲則有誤一丸可用三次此方催生最妙但素無痰火精神健旺者方可用保產良方一方用蓖麻子研敷產婦手足心產畢速拭去或以兩手各執一枚立下慈惠小編催生去胎芫花根剝皮以綿裹點麝香套入陰穴中三寸即下攝生妙用方催生下胎不拘生胎死胎蓖麻子巴豆各二粒麝香一分研貼臍中並足心集簡方交骨不開臨產有交骨不開二三日生不下者即用鳳仙花子穿山甲牙皂麝香各等分為末和蜜捏作餅子如指頭大者一塊塞入陰戶近骨之處又將蔥二三斤濃煎湯令產婦坐浸於中以手運之交骨自開兒即生矣醫學正傳開骨膏炙龜板一錢大麻子七粒麝香一分搗為膏貼臍下一寸三分丹田穴交骨即開屢試屢驗達生全編臨產暈絕臨產兒未生下忽然暈絕者此氣悶亂不清所致以生半夏搗篩飯丸如大豆納鼻中即醒此扁鵲法也求嗣秘書難產實因產母氣衰以致兒身不能迴轉於是手先出而足先墮矣一見此等生法切勿驚惶口中念無上至聖化生佛百遍兒之手足即便縮入石室秘菉一方用蛇蛻泡水浴產門自易衛生寶鑑難產危急寒水石四兩二兩生用二兩煅赤入硃砂五錢同研如深桃花色每用三分井花水調如薄糊以紙花剪如杏葉大攤上貼臍心候乾再易不過三上即產橫生倒生死胎皆驗世效單方倒產逆生凡有倒產兒足先下者因兒在腹中不能得轉故腳先出來謂之逆生須臾不救母子俱亡若令產母仰臥令收生婆推足入去一恐產母驚二恐收生婆非老手反致傷人性命不若用小絹針於兒腳心刺三五刺用鹽少許塗刺處即時順生古今錄驗一方以手中指取釜下墨交畫兒足心即順千金方一方以鹽塗兒足以指甲搔之並以鹽摩母腹上即順存仁堂秘菉盤腸生產母平日氣虛及臨產時用力努掙周身氣血下注以致腸隨兒下一次如此二次路熟又復如此治法以潔淨不破損漆器盛之待兒胞衣俱下產母仰臥自己吸氣上升收生婆以香油洗手徐徐送入大生要旨一方用蓖麻子四十九粒去殼搗爛塗產婦頭頂心並臍上三寸腸收入即洗去同上一方用大紙捻麻油潤之點燈吹熄以煙燻產母鼻中腸即上便易良方盤腸生腸幹不上枳殼煎湯洗之良久自入袖珍方一方用生薑半夏末搐鼻即上宜良李氏刊方兒袋拖出蘄艾一兩煎湯數湯熏之熱氣上衝即收入同上產至數日子死腹中母氣欲絕以牛屎炒令大熱入醋半盞用青布包裹於產婦臍上下熨之立生同上一方用黃牯牛屎不拘多少塗產婦臍上立出同上胎死腹中川芎六錢歸身四錢肉桂三錢五分歸尾蘇木紅花益母草各三錢桃仁十四粒研好酒三鍾和藥同煎一杯加水銀一兩吐津唾將水銀揉碎星入滑石末三錢麝香二分共和入藥酒內用滾水一桶將藥酒投入水內扶產婦坐桶上熏之少刻須下血過半時如不下再用水銀二錢煎藥渣一杯半煎八分去滓將水銀撒投桶內坐上熏之少刻自下恐血下多發暈急用舊漆器燒煙熏口鼻立醒同壽菉一方用濕牛糞塗腹上良產寶附驗死胎法胎死腹中產母舌必青黑為驗如面舌青黑口中沫出子母皆死故面以候母舌以候子濟陰綱目胞衣不下瓦油盞烘熱仰放產婦臍上令一人以腳抵住油盞其胞即下醫鏡一方用石灰一升置淨盆中以滾水潑之扶產婦蹲其上熏之立下奇方類編一方取其夫之褲倒轉將褲腰向下褲腳向上束於腹上其胞自下瑞竹堂方胞落子生大腸墮下此虛極下陷法當用人參加升麻柴胡提之而產婦初生未便用升麻柴胡以發散其正氣恐氣散而腸愈難收不若用蓖麻子一錢搗爛塗婦頂心少頃腸自收入急用溫湯將頂上蓖麻洗淨不使少留些須倘若時辰太久則腸且上懸又成危症而不可救矣岐天師別傳產後莫就上床才產畢不可就上床急將淨桶蓋好或在桶蓋上或在軟椅上且閉目淨坐片刻背後須要倚緊不可動搖免致眩暈一面令人將粗紙鋪床揉軟紙以鋪浮上鋪完方可緩扶產母上床倚被褥而坐莫就說話才產畢只宜安靜少思不可言語固養神氣也尤不可問答男女恐愛憎氣惱致病不小但人情喜兒者頗多若果男胎即明白答應令母喜悅常有久練穩婆雖生女胎必虛答是男或夫假作喜女以安母心莫就睡臥才產畢須用綿軟被褥堆疊床頭上加軟枕扶產母上床坐一日一夜方可臥下切不可早臥防瘀血停滯也上床後須令人以手從胸腹順抹至臍下令汙血盡出自無諸病日須七八次三日乃止腿膝又須放開不可伸足夾腿以致敗血不出也莫就食葷才產畢脾胃虛弱只宜炒米粥和紅糖頻頻少與三日內切不可食魚肉雞鴨其糍硬蛋物尤不可食遲吃葷腥油膩不獨產母安穩且小兒食乳腹亦充實莫就飲酒才產畢不可飲酒因產母臟腑方虛熱酒入腹必至昏暈六七日後可與些淡酒以闢風邪養氣血下惡滯行乳脈也莫就食鹹乳汁乃血氣所成產後不可食鹹味因咸能止血少乳且發嗽若惡路未淨早食鹹酸之物不獨少乳而且腹痛發寒熱六七日後方可少進鹹味如白鯗火腿之類莫要勞心產後切不可勞心焦思十日內更宜緊要莫動針線產後若未滿月強起離床行動當時未覺太損日後必成蓐勞且產母節勞人人盡知至動針線則不覺其勞以為無妨殊不知未老眼目昏花或流酸淚往往坐此不可不戒莫嫌血汙產後十餘日切不可嫌血汙遽起洗拭見風犯者多至血崩為害不小況產時去血已多筋脈空疏風寒易襲少有不謹便成攣痹為終身之患矣慎之慎之莫思梳洗產後梳頭濯足恐血氣攻下脫衣洗浴易受風寒又不可刮舌刷牙及就下低頭皆成血逆血暈即欲洗下身亦不可用生水宜用益母草湯能祛寒濕風熱最妙至洗澡雖益母草湯亦萬萬不可俱石氏保產心法產後子腸不收新鮮鯽魚煮焙研細一半搽腸一半酒服即時收上胎產良方一方搗蓖麻仁貼丹田穴一夜即收亦有塗頂心亦有塗百會穴者乾坤生意產後子宮不收陰門突出荊芥穗藿香葉臭椿皮三味煎湯熏洗子宮即收或用蓖麻子塗頂之法亦妙濟陰纂要產後玉門不閉吳茱萸菟絲子各一兩五錢蛇床子一兩硫黃四兩每用四錢水二碗煎湯頻洗自效保產良方一方用石灰一升炒極熱以滾水二碗投灰於中候溫坐浸斯須平復肘後方產後身熱如火皮如粟粒者桃仁研泥同臘豬脂敷之日日易之千金方產後心悶而死者用紅花數十斤入大鍋內煮之候湯沸以杉木桶盛湯於內取牕格臥產婦於其上湯氣漸冷換熱湯熏之少頃必蘇姚羅浮集驗方產後鼻中流血不止口鼻漸起黑氣紅絨線本婦頂心發各三五根合扎右手中指節上令極緊即止達生全編產後舌不收以硃砂末敷之擲盆盎作墮地聲驚之即收經驗秘方產後腸癢針線袋安於所臥褥下勿令人知即愈同壽菉產後咳逆作喘三日不止欲死者桂心五錢薑汁三合煎取二合先以火灸背摩令熱搽藥盡為妙同上產後生門硬如石撞青魚膽七個無青魚鯽魚亦可絲綿二三錢燒存性為末同膽調鴨毛楂上即止奇方類編產後生門出黃臭水甚痛綿繭二三錢燒存性為末酒調鴨毛搽上其毒自出同上產後陰腫蛇床子一升炒極熱布裹熨患處萬病回春產後陰脫鐵爐中紫塵羊脂二味和勻布裹炙熱熨推納上本草綱目產後陰翻澤蘭葉煎湯先熏後洗二三次再入枯礬煎洗即安集簡方產後陰癱硬如卵狀蛇床子煎湯熏洗即愈宜良李氏刊方產後感寒腹痛艾葉炒熱熨臍上同上產後中寒吳茱萸紫蘇蔥頭煎湯於密室中放桶內熱時熏既而洗之甚效醫宗說約產後小水不通腹滿用鹽熨臍中蔥白一把縛定切去兩頭留一寸厚置鹽上以艾炙之熱氣入腹即通利也明醫指掌產後痢加嘔逆田螺一個搗碎入吳茱萸二分麝香一釐為細末掩在臍上即不嘔吐而痢亦漸除石寶秘菉產後血脫血脫是虛症補正為主此因平素虛弱臨產復用力勞傷去血過多以致昏暈不醒微虛者少頃即醒大虛者脫竭立死但察其面白口開自汗手足厥冷是虛脫症也生死判於頃刻切勿放倒令一人挽住頭髮急用綢絹舊衣謹閉產戶諄囑知事婦女曲膝抵住勿使下面泄氣俟其稍轉方用醫治若認作血暈而以行血藥治之益速其斃胎產神效方產後血暈血暈是實症逐瘀為主此因惡露不行心下滿急神昏口噤不省人事切勿放倒急用韭菜一二斤搗爛盛於茶壺中沸醋頃入壺內蓋壺頭以壺嘴向產婦鼻孔令醋氣透入即醒如不醒或用乾漆燒煙令聞煙或急掐人中提頂心頭髮灌以薑汁童便自醒同上產後忌哭泣恚怒笑語驚憂產後五臟六腑皆虛哭泣傷肺恚怒傷肝笑語傷神驚憂傷心皆所切戒總之產中易病亦易祛病若能小心調攝雖有宿疴可以全愈後來受用不盡濟陰纂要產後忌早交合百日之後氣盈血足方可交合否則亦要在四十九日之外常見愚人未滿月而交合者不惟婦成大病即夫亦有損慎之哉婦人良方乳瘡乳頭裂開秋後冷露茄裂開者陰乾燒存性為末水煎敷之未秋而裂開者亦可宜良李氏刊方產後䁾乳成癰用益母草為末塗乳上一宿自瘥或生搗爛敷上亦可同上乳上生癰脂麻炒焦搗爛以燈盞內油腳調敷即散摘玄方乳癰初起三日立消活鯽魚一尾連頭骨生搗極爛香臘糟一小團再研勻敷上一日待消小即取下不消再貼百試百驗單方全集吹乳吹乳結核不散者當早消之久則成癰用南星半夏殭蠶白芷皂角刺草烏為末以蔥汁合蜜調敷秘方集驗吹乳乳癰巴豆一粒去淨油冰片三釐用飯黏以手捏爛為丸雄黃少許為衣將丸捏扁貼眉心外用清涼膏如錢大蓋之夏貼三個時辰春秋冬貼一日用之如神山右李氏刊方乳癰吹乳登時立消蔥白連根搗爛鋪乳患處上用平底瓦𧍎盛灰火熨蔥上一時蔥莖熟熱蒸乳上汗出即愈或以蔥搗爛炒熱敷上冷即換再炒亦可極效同上妬乳乳頭生瘡謂之妬乳鹿角甘草各等分為末雞子黃調銅器內炙敷子醫宗金鑑吹乳妬乳結腫腫痛欲成腫者以鹿角磨水敷之千金方一方用蕓薹菜搗爛敷之並消乳癰破血瘕下產後瘀血兼治小兒火丹野人間話吹妳音療乳也乳癰南星半夏皂角去皮弦子炒黃五倍子去蟲窠炒黃各等分研極細末米醋調敷一宿立效種福堂方乳癰乳痛活鯽魚一個鮮山藥一段如魚長同搗爛敷上以紙蓋之同上乳癰癖癧痃用野花椒葉曬乾為末雞子清調敷立愈同上一切乳癰初發以黃蜀葵花用鹽糝放瓷器內密封經年不壞每用敷患處無花根葉亦可同壽菉乳癖用蝦膜一隻去皮令淨入半夏三錢麝香五釐共搗爛為一大餅貼患處用絹縛之約三時許解去其效如神應驗良方乳岩先因乳中一核如豆漸漸大如雞子七八年後方破破則不治矣先乘其未破用蛤蜊殼研極細加皂角末少許米醋煎滾調敷百一方一方用芭蕉葉搗爛搽患處簡易良方一方用五倍子焙乾為末醋調搽若穿爛者另用貝母知母研末加麝少許雞子清調敷經驗廣集乳癬白松香二錢川椒二十粒研末豬油調搽先用槐枝湯洗同上乳頭破裂丁香一味為末干敷患處如燥用津唾調敷瘍科選粹一方用燕脂蛤粉為末敷之危氏得效方一切乳毒初起生半夏一個研為末蔥白半寸搗和為丸綿裹塞鼻左乳瘡塞右鼻右乳瘡塞左鼻一夜即愈神效海上方陰症𤵄痃婦人子戶腫脹墜痛及兩拗疼痛謂之𤵄痃乃肝心二經火盛濕熱下流所致用防風三錢大戟一錢蘄艾一團熬湯熏洗更以枳實廣皮各等分為末炒熱騰之其腫自消而痛自定也醫宗金鑑小戶嫁痛婦人陰中作痛名小戶嫁痛痛極往往手足不能伸舒由鬱熱傷損肝脾濕熱下注所致用四物湯全料合乳香一錢搗餅納陰中其痛即定同上陰癢婦人陰癢多因濕熱生蟲甚則肢體倦怠小便淋漓用桃仁五錢研膏合雄黃三錢末雞肫肝切片蘸藥納戶中其蟲一聞肝腥皆鑽肝內吮食將肝提出其癢即止同上陰挺婦人陰挺或因胞絡傷損或因分娩用力太過或因氣虛下陷濕熱下注陰中突出一物如蛇或如菌如雞冠者用蛇床子五錢烏梅九枚熬湯乘熱熏洗之更以豬脂油調藜蘆末敷之無不愈者同上陰痔婦人陰中有肉突出者名曰陰痔俗稱茄子疾也流黃水者易治流白水者難治用烏頭燒存性釅醋熬熏自消同上陰冷婦人陰冷皆由風寒乘虛客於子臟久之血凝氣滯多變他證且艱於受孕用遠志乾薑吳茱萸蛇床子各等分共為末綿裹納陰中一日二次換同上一方用五味子四兩為末以口中玉泉和丸兔矢大頻納陰中取效近效方玉門寬冷硫黃煎水頻洗心傳方陰汗濕癢枯礬撲之御院藥方一方用牆上爛草同荊芥芽煎洗再以陽起石末敷之便宜良方洗溻散婦人陰戶生瘡腫痛出膿水用龜甲五兩甘草乾漆地黃當歸黃芩白芍各一兩共切片水煎洗瘡如人行十里許一日二次拭乾即上甘濕散半日又洗曾有一女人用此七日愈一方有川芎二兩瘍科選粹甘濕散蚺蛇膽青木香石硫黃鐵精麝香各四分共為末麝香臨用方研入蓋麝能消蛇毒若麝先入則蛇膽力詘矣同上枳橘散婦人陰毒如石痛不可忍二便不利欲死者用陳皮枳實各四兩炒熱以絹袋盛之遍身從上至下及陰瘇處頻頻熨之冷則又換直至喉中覺有枳實氣則痛止瘇消而大小便利矣程氏續即得方陰瘇堅硬用小青橘切碎炒熱包絹內熨之宜良李氏刊方陰門魚口鯽魚膽數枚取汁擦之立愈濟生方陰戶生疽蝸牛滑石各等分研末敷瘡頭上已成則排膿未成則散腫陸氏積德堂方陰癢三蟲作祟豬肝切成條以花椒蔥拌豬油煎肝待冷納入陰中少頃取出再換一條其蟲附肝俱出奇方類編陰戶生癬桃仁七個桃葉七片共搗爛綿裹夾戶內換數次即愈秘方集驗陰戶蝕瘡疥癬滅火丹及諸惡瘡蛇床子苦參蕪荑牛皮膠枯礬各一兩雄黃黃柏黃丹川椒大楓肉各五錢硫黃樟腦輕粉各二錢共為細末生豬油調搽神效同上陰蝕四邊腫爛疼痛蛇床子苦參吳茱萸煎水洗立愈同上陰戶生蝨水銀一錢綠豆粉四分紅棗七個去粒白果七粒去殼共搗如泥抹腰上余者絹袋盛系臍下自效同上一方用生白果肉搗塗三次即絕同上陰戶生蟲糯米煮熟和香油少許搗成團填入戶內蟲即鑽入團上每日夜換五六次不數日蟲盡矣普濟方陰戶蟲蛆痛癢不可忍杏仁去皮燒存性杵爛綿裹納入陰中取效乾坤生意一方用生搗桃葉綿裹納之一日三四易孟洗方婦人下疳黃丹四錢兒茶三錢輕粉二錢雞內金一錢燈草灰二分珍珠一分共研極細末米泔水洗淨擦之婦人良方
