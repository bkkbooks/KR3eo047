body:
  text: 卷六幼科保護回氣法小兒初主氣欲絕不能啼者必是臨產艱難勞傷胎氣或天時寒冷冒寒所致未可斷臍急以綿裹抱杯中離胞寸許用苧皮紮緊將大紙條蘸麻油點著於臍帶上往來遠遠熏之使火氣入臍則臍中溫暖更用熱醋湯蕩洗臍帶須臾氣回啼哭方可洗浴斷臍切記活幼心書浴兒法兒出胎浴洗宜取桑槐榆柳桃五種嫩細枝各二三十節煎湯名五枝湯看冷熱太冷大熱俱不相宜必欲煮收貯俟溫取浴勿入生水洗畢拭乾以膩粉錢許研極細摩其遍身及兩脅然後䙀裹既不受濕又無諸氣今執三朝古禮將䙀裹之兒解開復浴若兒之體怯多致感冒驚風變通在人只依此出胎便洗甚為穩當產家要訣斷臍法兒出胎浴洗後方斷臍帶則不傷水生病斷臍須用口咬不犯平刀剪自無冷氣內侵可免腹中吊痛之虞如或天時寒冷難產母子勞傷者先扎臍帶以油紙捻點火燒斷令暖氣入兒腹中此又為回生起死之妙法近有用蘄艾灸臍亦妙所留臍帶不可太長太長則難乾而傷肌且恐引外風為臍風亦不可太短太短則逼內而傷臟或致成腹痛而夜啼只以兒之足掌長短為度同上裹臍法裹臍須用白練柔軟方四寸新綿厚半寸與帛等合之緩急得中急則令兒吐哯音衍乃嘔乳也不可輕解至十二朝方解視之解時須閉戶下帳若冬月房中多置炭火令有暖氣乃佳倘如臍不幹燒繹帛敷之或甩綿繭亂髮燒灰糝之一云黃柏末敷妙千金方埋藏法藏胎衣盛新瓶內以青帛裹瓶口擇向陽高燥之地天德月空處掘地三尺埋之兒自長壽無疾若埋藏不謹為犬豬蟲蟻所食於兒不利天德如正月在丁二月在坤三月在壬四月在辛五月在乾六月在申七月在癸八月在艮九月在丙十月在乙十一月在巽十二月在庚是也月空如正月在丙壬二月在甲庚三月在丙壬四月在甲庚五月在丙壬六月在甲庚七月在丙壬八月在甲庚九月在丙壬十月在甲庚十一月在丙壬十二月在甲庚是也此天德圖內如單月逢丙壬雙月逢甲庚又為月空之方位也天德方向俱依此圖為準其月空方向單月在丙壬方雙月在甲庚方四處如值天德方向不便即按圖尋丙壬甲庚所在用之如值月空方向不便亦按圖尋天德用之醫宗金鑑剃頭法兒初剃頭俱不擇日皆於滿月剃之以便出房惟丁日不宜剃頭蓋胎髮穢惡有觸神灶令兒不安故必於滿月之日剃頭而出凡剃時須擇密室溫暖處剃之剃後以茶葉嚼爛敷遍頭皮或以杏仁三枚研細入鮮薄荷三葉再同研將麻油滿三四點合膩粉拌勻擦頭上能避風邪免生瘡癤保生碎事防禁法小兒莫抱於檐下澡浴當風解衣及近神佛座前驢馬犬羊畔燈檠後並各房異戶之處諸色不正之器物並防禁其不觸犯自然易養少疾病嬰童寶鑑小兒須防外客生人穢氣所觸周歲之內能忌之者並無客忤之患幼科指掌小兒略識人物不宜抱至神廟觀望神像威嚴閃爍恐致驚怖及非時鑼鼓爆竹雞犬之聲同上小兒將入夏時用色帛絳紗縫囊盛去皮尖杏仁七粒與兒隨身佩帶聞雷不驚林泉備用曬衣法小兒衣裳日曬晚收不可露天過夜若在露天過夜次日與兒穿著令兒日漸黃瘦身熱腹痛世俗謂之無辜疾皆因衣露過夜染著無辜鳥屎以致有此入邪之疾者濕熱風寒吐瀉驚積是也幼幼集小兒一歲至十二歲凡衣鞋裙褲及包裹尿布片切忌不可夜露有鳥名天地女又名陷飛鳥最喜陰雨夜過飛鳴徘徊其鳥純雌無雄善落毛羽於嬰孩近身物上令兒作癇必死化為其兒亦古書傳之一證也馮氏錦囊慎乳法夜間乳兒須母起坐抱兒乳之母有娠乳兒必患胎黃母大醉乳兒必患驚熱母傷飽乳兒必患喘急母新房乳兒必患疳瘦母大怒乳兒必患顛狂母新吐乳兒必患虛羸以上並小兒精要母食熱面乳兒多成龜胸鱉背母食酸鹼炙煿乳兒多成渴熱瘡疥母悲喜未定便乳成涎漱兒啼未定便乳生瘰癧癭瘤以上並幼科指掌兒睡忌乳母鼻風吹兒囟門成風疾瑣碎菉夏中盛熱時母浴後便與兒乳使兒成胃毒赤白痢定息良久熟揉乳之可也顱囟經又有一種為父母者意欲兒女壯大令食二三人乳但不知乳雜即有毒因各稟氣血不合小兒遇病反重孟介石方忌食法糯米性黏滯難化小兒最宜忌之本草綱目黍米即小米小兒食之不能行食鑑麵筋性冷難消化小兒不宜食纂要黑豆十歲以下小兒不宜食恐擁氣食治蕨小兒食之腳軟不能行傳家寶筍俗作筍最難化小兒不宜食干筍尤甚從新王瓜小兒多食生蟲積傳心菉雞豆小兒多食令不長別菉烏芋即地粟小兒食多臍下結痛拾遺核桃俗傳能消食殊不知此物氣溫能興陽助腎火動生風痰小兒有病當切戒之幼科直言棗小兒多食生蟲損齒貽害多矣保生碎事慄小兒食之齒生遲腎氣弱生則難化熟則滯氣日華銀杏即白果小兒未滿十五歲食者多發驚搐蜀本草雞肉小兒食之生蛔蟲五歲之內尤宜忌衍義雞肫皮乃磨堅之物能刮腸胃小兒食之成軟病傷臟腑則無可救治孟氏幼科雞鴨卵小兒食之長而多忘蔡氏秘寶鱘魚小兒食之成咳嗽及癥瘕食療鰕俗作蝦小兒食之腳弱四聲初生生下無皮嬰兒生下紅白無皮速以白米粉干撲候生皮乃止凡脅下或腳縫或肩彎各處看有紅爛無皮者兒必頻哭只用牛屎燒灰存性研極細末糝之即愈傳家寶生下不動嬰兒生下不動者急看口內齶上有泡名曰懸癰急以手指摘破以絹裹指捏干拭血令淨拭淨即生若血入腹則不能活同上不發聲嬰兒生下不發聲者名曰夢生此必困難產或寒冷所致急用綿絮包裹抱兒杯中切不可斷臍帶須將胞衣連帶急燃火紙浸油點火於臍帶上往來遍熏炙待暖氣由臍內入腹須臾氣回兒身暖自啼哭如常矣兒身暖後再不出聲者即拿一貓以布裹其頭足令一女人將貓拿近兒耳即將貓耳猛咬一口貓忽大叫兒即醒而聲出回生矣同上不開眼小兒初生眼不開者因孕婦飲食不節恣情厚味熱毒熏蒸以致熱蘊兒脾眼胞屬脾其脈絡緊束故不能開也用熊膽黃連各少許以滾湯淬洗其目自開全幼心鑑瞎眼小兒初生兩目紅赤腫爛不開以蛐蟮泥搗塗囟門干則再換不過三次即愈邵氏傳方一方用生南星生大黃各等分為末醋調塗兒兩足心亦愈不拘月內或月外皆可用同上不乳小兒初生或剪刀股裹緊吃乳不下用獨囊大蒜切薄片放在兩腮以艾灸之如哭即好不哭無效保幼摘要吐乳砂仁白豆蔻各十四粒生炙甘草各二錢共為末常摻入兒口中即止危氏得效方吐乳咳嗽久不愈石燕子為末以蜜調少許塗唇上日三五次衛生寶鑑妬乳小兒有痰火者吃乳數日必有一二日頤腫厭食名曰妬乳用薄荷朴硝為末搽一二次即愈慎疾芻言吐涎四肢冰冷是症牙根必有水泡子如米粒大以軟綿裹指浸湯擦之即開口而安保嬰集要痄腮小兒初生兩腮腫硬有核或在一處名曰痄腮必面黃鼻端起細瘰啼哭不乳用蜒蚰一條小者數條銀硃錢許同研爛搽腫硬外面勿令擦去即消同上一法用桑柴灰少許入雄雞冠血二三滴再加鹽滷一匙和勻頻擦患處亦消或有用刀割開取出白塊及膜隨將綿拭口令淨者但不善割反有誤事慎之增訂達生編重齶重齦口中上齶皮腫起如囊盛水名曰重齶牙床腫起名曰重齦俱以大針刺破出血用蒲黃敷之幼科鐵鏡馬牙初生小兒口屋並牙根生白點名曰馬牙不能食乳少緩則不能救急用熟針薄筋上挑去白點有血出為妙用血綿拭去血以薄荷煎湯磨金磨塗之勿即與乳食待一時方可與乳再乳之即愈全嬰心法重舌初生小兒開口後看舌下重舌有膜如石椙子者若啼不出速以指爪或針微刺舌線有血出即活取桑枝調蒲黃塗之若血出多者燒發灰用豬脂塗之同上重舌腫木伏龍肝末牛蒡汁調塗之聖惠方重舌欲死以亂髮灰五分調敷舌下不住用之簡要濟眾木舌此症因心脾積熱而成蓋脾之脈絡在舌下又舌為心苗遇火上衝令兒舌腫滿木硬不能轉動故名木舌用朴硝五分真紫雪二分鹽一分共為細末以竹瀝調敷舌上若不急治必致難救保赤正宗一方用黃蜀葵花一錢黃丹五分共為末敷之直指方木舌腫強白礬桂心等分為末安舌下普濟方白膜裹舌初生小兒有白膜皮裹舌或遍舌根可用指甲刮破令血出以燒礬末半綠豆許敷之若不刮破其兒必啞至寶方噤口初生七日內噤口失治多致不救其症舌上生瘡如黍米狀吮乳不得啼聲漸小因胎熱所致也牛黃為末以淡竹瀝化一字灌之更以豬乳滴之外臺秘要鵝口滿口皆白有似鵝之口中俗謂之雪口是也由在胎中受母飲食熱毒之氣蘊於心脾二經故生但自內生出可治自外生入不可治用食草白鵝下清糞濾汁入沙糖少許搽之或用雄鵝糞眠倒者燒灰入麝香少許搽之其效如神永類鈐方撮口臍風初生七日內面赤喘急啼聲不出即名撮口臍風看齒齦上有小泡如粟米狀急以溫水蘸青軟帛裹指擦破即愈保生碎事一方用槐樹皮如錢大置臍上外以麵條蜜圍四弦以艾火灸之啼聲一出即愈傳心菉一方用獨囊蒜切片安臍上以艾灸之宜良李氏刊方臍腫將荊芥湯洗過用蔥葉一片炙熱出火氣以指甲刮薄貼腫處次日即消同上臍腫汁出白石脂末熬溫撲之日三度勿揭動韋宙獨行方一方用白礬燒灰敷之聖濟方臍汁不幹車前子炒焦為細末敷之即干神效石室秘菉臍帶久不瘥伏龍肝或當歸末摻之敬修齋方臍突赤小豆淡豆豉天南星去皮臍白蘞各一錢共為細末用五分以芭蕉葉搗爛絞汁調敷臍四旁日二次如臍小白色即愈抱乙子方一方用原斷臍帶並艾葉同燒灰以油胭脂調搽即愈乾坤生意臍內潰爛出水不止垂危者赤石脂研末敷上立愈張絅如屢驗方臍爛不瘥白羯子即羊莫子燒灰敷上即愈或用枯礬龍骨煅過為末敷上葉天士方紫遊風大黃朴硝青黛各三錢研末水調敷患處思誠堂刊方赤遊丹毒月內小兒身上忽見紅紫塊如雲頭或平或略高起速者一日之內遍處纏到緩者逐漸蔓延自外纏入心口者死此危症也古方用糞金汁塗如不得金汁急尋糞內蛔蟲四五條揩乾糞穢將竹片削刀破蟲取汁盛碗內先於丹毒上用碗鋒裹筋頭輕輕刺破將蟲汁塗上自愈此方屢試屢效勿嫌臭穢不用亦不可既用以其臭穢而用水洗須待數日後肉色不紅全愈方可洗之端素齋驗方日啼不止牛黃辰砂飛各五釐末塗兒舌上立止保赤須知夜啼初生夜啼由於心虛有熱宜用壓鬼之法或以井中四旁草暗置兒席下或寫父名倒貼床腳裡面不令人知或以桃木杖擊兒四旁如趕逐狀咒曰天蒼蒼地皇皇小兒夜啼疏客堂多誦幾遍則啼自止醫鏡一方用雞糞塗兒臍中極佳男雌女雄廣嗣全書夜啼內吊先煎蔥湯淋洗其腹又用艾絨烘熱包熨臍腹十餘次其痛漸愈幼科鐵鏡不小便初生不小便者乃胎熱流於下也用淡豆豉一勺田螺十九個蔥一大束共搗爛以芭蕉汁調貼臍上則小便自通保幼良方不大便由胎下熱毒結於肛門大便遂致閉塞急令婦人以溫水嗽口吸咂兒前後心手足心並臍下共七處以皮見紅赤為度須臾自通同上大小便不通初生二三日不大小便用蔥汁人乳各半調勻抹兒口中即通醫宗說約脫肛蔥湯洗芭蕉葉託上單方全集卵腫新生小兒其卵甚大日後長成恐變木疝如過滿月外侯端午日午時用腳盆盛熱水安於中堂隨抱嬰兒放於水內一浸再將嬰兒在於中門檻上中間一擱其卵上之水印痕於檻將艾圓在檻上濕印處灸三壯其卵遂漸收小如故此法其應如響經驗良方一方用桃仁研碎以唾涎調敷薛氏方百日傷寒小兒百日內患壯熱用鐵鏵一斤燒赤水二斗淬三七次煎一半入柳葉七片浴之聖濟總菉驚風初生兒驚初生驚風欲死硃砂磨新汲水塗手足心即愈斗門方月內胎驚母豬乳同硃砂牛乳少許抹口甚效本草發明月內驚似中風硃砂研末水調塗心口兩手心兩足心五處即愈傳家寶卒驚似有痛處而不知用燕窠中糞煎湯洗浴譚氏幼科急驚痰迷心竅不省人事藜蘆根豬牙皂角各三錢麝香五分共為末用少許吹入鼻中取噴嚏以通其氣即蘇幼幼集一方於小兒食指上男左女右近虎口第一節有青紫筋用針挑斷夾擠出血即愈小品方急驚似有通處用雄雞冠血滴入其口中即愈宜良李氏刊方截驚以芭蕉汁薄荷汁煎勻塗頭頂留囟門塗四肢留手足心勿塗甚效筆峰雜興老鴉驚大叫一聲就死者名老鴉驚用散麻纏住脅下及手心足心以燈火爆之用老鴉蒜曬乾車前子各等分為末水調貼手心仍以燈心焠手足心及肩膊眉心鼻心即蘇也王日新小兒方天吊驚風目久不下眼見白睛及角弓反張聲不出者用大蜈蚣一條去頭足酥炙用竹刀劈開記定左右又以麝香一錢亦分左右各記明研末包定每用左邊者吹左鼻右邊者吹右鼻各少許不可過多若眼未下再吹些眼下即止直指方烏紗驚風小兒驚風遍身都烏者急推向下將黃泥一碗搗末入久醋一杯炒熱包定熨之引下至足刺破為妙便易良方驚風定搐螳螂一個蜥蠍赤足蜈蚣各一條俱中分之隨左右研末記定男用左女用右每以一字吹鼻內搐之吹左即左定吹右即右定也普濟方驚邪安息香一豆許燒之自除奇效秘菉驚竄兩眼看地不上者皂角燒灰以童尿浸刮屎柴竹用火烘乾為末貼其囟門即蘇王氏小兒方驚癇燕屎煎湯浴之或用蜂窠大者煮浴亦妙必效編驚癇發熱乾藍凝水石各等分為末水調敷頭上聖惠方驚啼白玉二錢五分寒水石五錢共為末水調塗心下同上一切諸驚仰向後者燈火焠其囟門兩眉臍之上下眼翻不下者焠其臍之上下不省人事者焠其手足心心之上下手拳不開口往上者焠其頂心兩手心撮口出白沫者焠其口上下手足心驚風集驗探生散小兒急慢驚風諸藥不治吹此以探其生死雄黃沒藥各一錢乳香五分麝香二分半共為末吹少許入鼻內如眼淚鼻涕皆出者可治古今醫鑑艾灸法治急慢驚風神效頭頂心中百會穴灸五壯最效眉心中灸五七壯須令出喉有聲即愈尾尻骨下一指之間灸一壯即出喉有聲灸三壯立愈鼻梁兩旁哭笑有窩處用筆點記灸兩旁三五壯即愈艾柱俱如綠豆大經驗廣集疳積腦疳因兒素受風熱又兼乳哺失調以致頭皮光急髮結如穗鼻癢黃瘦腮囟腫硬用龍腦黃連蝸牛殼炒黃蝦蟆灰瓜蒂細辛桔梗各等分麝香少許共為細末入瓷盒內貯之每取少許吹入鼻中日二次醫宗金鑑耳疳生於耳後腎疳也用地骨皮一味煎湯洗之仍於香油調末搽之蓼州閒菉耳疳出汁青黛黃柏末干搽談野翁方鼻疳因疳熱攻肺而成用青黛一錢熊膽五分麝香少許共為細末乾者用豬骨髓調貼濕者幹上古今錄驗吹鼻蟬殼散蟬殼微炒青黛研蛇蛻皮灰滑石各等分麝香少許研共為極細末每用綠豆大吹入鼻中日三用之同上鼻疳蝕爛膽礬燒煙盡研末摻之集簡方一方用芝麻搗敷之備急方鼻疳久不愈蛇床子一兩輕粉三錢研末香油調搽壽域神方口鼻急疳數日欲死以藍敷敷之令遍日十度夜四度千金方口疳黃柏末人中白各一兩紫甘蔗皮灰五錢炒過文蛤枯礬各三錢青黛一錢冰片少許共為細末吹之立愈種福堂方鵝口疳用谷樹滋抹之立愈傳心菉牙疳黃連一兩硼砂膽礬各一錢冰片五釐共為細末搽之夏氏單方三仙散治牙疳如神枯礬五分冰片二分麝香五釐研細末吹患處二次即愈經驗廣集喉痹牙疳盆砂即囪砂也末吹並擦之集簡方風蟲牙疳膿血有蟲黃連一兩輕粉一錢為末摻之普濟方走馬牙疳牙床腐爛因濕熱毒氣蘊積既久一時齊發勢莫可遏患此病者九死一生須於初發之時用針挑破其白點出血將薄荷湯磨金墨塗敷勿與乳吃俟睡片時醒來再與乳食乳後仍照前敷之宜良李氏刊方一方用天南星末醋調塗足底心抱乙子方一方用雄黃巴豆霜共研細和丸如綠豆大貼兩眉中間一宿將膏藥蓋之同上齒疳鴨嘴膽礬一錢匙上煅紅麝香少許研勻敷齦上立效活幼口議猴子疳是症從肛門或陰囊邊紅暈爛起漸至皮膚不結靨或眼稍口旁亦紅若不早治必至爛死凡見此症時切忌洗浴只用軟綿帛蘸甘草湯揩淨用綠豆粉一兩輕粉一錢五分標朱一錢冰片一分或二三分亦可共為極細末將金汁調鵝毛醮敷上如無金汁雪水亦可或用甘草燈心湯亦可雖蔓延遍身可保立愈種福堂方珠薈散治小兒五疳積發熱牙疳並花後牙疳真蘆薈龍腦薄荷葉兒茶各五分珍珠四分研至無聲真青黛三分官硼砂二分大冰片五釐共為極細末瓷瓶貯好以臘塞口勿令泄氣臨用吹患處同上疳後虛熱小便處腫用韭菜地中蚯蚓火煅以碗合地上出火氣為末油調塗敬修齋方天柱骨倒小兒疳疾及諸病後天柱骨倒乃體虛所致宜用木鱉子六個去殼蓖麻子六十粒去殼共研勻先包頭擦頂上令熱以津調藥貼之鄭氏小兒方痘疹簡便應急凡居窮鄉村落值嬰兒痘不能迎醫者須於微發熱時用手蘸真芝麻油摩其背脊間直至尻骨如此數遍其熱自退求嗣秘書浴兒免痘除夕黃昏時用大黑魚一尾小者二三尾煮湯密室烘暖浴兒遍身七竅俱到不可嫌腥以水洗去若不信只留一手足不洗遇出痘時則未洗處偏多也此異人所傳方也醫方摘要保嬰祛痘凡嬰孩無論男女用肥大光潔川楝子一歲至三歲者七個臼內搗爛忌鐵器水一碗新砂鍋煎濃傾入盆內避風處將新稀白布一方醮水自頭至足遍身洗擦不留余空仍將布拭乾避風一刻四五歲者用川楝子九個水五碗六七歲者用川楝子十五個水七碗八九十歲者用川楝子二十個水九碗十一歲至十五歲者用川楝子三十個水十五碗照前煎湯洗非但不出痘兼能免瘡癤凡洗須擇七個除日洗七次如五月至八月更妙汪氏傳方痘初起難透芫荽子三兩濃煎湯噴兒床帳數次聞氣即透思誠堂刊方痘七八日不發垂危取水中浮萍不拘多少用青細包裹絞汁灌兒口內立見其效夏念祖簡易方痘滿身無皮膿水流出茶葉要多揀去粗梗入水一煮即取起再揀去梗濕鋪於床上用粗紙隔一層令兒臥上則膿水自干秘方也同上痘皮薄發癢茅山蒼朮研末捲紙內遍處熏之桂軒隨菉神燈照治痘癢塌之極火到癢除川椒艾葉紅棗芫荽茵陳乳香白芷稍陳香圓安息香共為末作紙燃熏照葉天士方白螺散治痘抓破白螺螄不拘多少片腦少許香油調搽患處即愈同上痘出眼睛內新象牙磨水滴入眼內痘即退同上一方用兒生母中指上刺血一點滴入眼內痘即移出端素齋驗方一方用胭脂雞清調塗眼四圍痘不入目集效方痘頂陷漿滯不起用水楊枝葉無葉用嫩枝五斤流水一釜煎湯溫浴如冷添湯良久照見累起有暈絲者漿行也如不滿再浴之虛人則洗頭面手足屢浴不起者死初出及癢塌者皆不可浴本草從新痘疹濕爛不結痂綠豆赤豆好醋浸爛搗汁鵝翎常刷患處或用綠豆乾粉敷之亦妙經驗廣集一方用黑豆炒為細末香油調搽百一方痘潰難靨多年牆上爛茅草洗焙為末摻之取其性寒解毒又多受霜雪能燥濕也水痘變瘡摻之亦效陳文中方痘靨渾身破爛膿水淋瀝用牆上干綠苔研為極細末敷之必效方痘爛生蛆嫩柳葉鋪於席上臥之蛆盡出而愈程氏續即得方痘瘡已愈復發坑中磚洗淨研末香油調塗即退宜良李氏刊方痘出不紅活及頂平而色淡或不甚起發者用胡荽煎酒令氣熏蒸更以酒敷周身即能明潤髮長矣但不可敷頭面再以酒灑房室又能闢穢惡同壽菉痘中有黑色者用針刺破以蒲公英根上白汁點之熬膏點之更妙廣利方痘落痂後洗浴方當歸苦參甘草各五錢煎湯溫溫浴之浴後不可見風如鄉僻市遠一時無藥以豆殼煎浴亦可不拘何豆殼皆可用痘疹心法痘後餘毒馬齒莧搗汁一碗綠豆末赤小豆末石膏各五錢豬脂三錢共和勻淨鍋熬成膏搽之簡要濟眾痘後有余瘡塞鼻中不能睡起木筆花研為末加麝香少許蔥白蘸藥入鼻中數次通單方金集痘毒用鮮鮮楝樹根皮同綠豆搗爛厚敷患處立愈種福堂方痘疔桕樹根皮為細末以青油調搽新集良方痘後牙疳牙落不生者新人初進房做富貴後默令小兒坐新人所坐之處片時此後自然長出方鈔一方令新人手指摸落牙處即出曹氏經驗方痘後翻疤膿水漬蔓延赤石脂寒水石各一兩大貝母七錢共為末乾摻同上珠象散治痘後翻疤珍珠腐制新象牙各三錢殭蠶二錢炒斷絲兒茶一錢五分共為極細末用油胭脂調塗毒水如注漸漸收口同上拔毒散治痘後手足肩背痘毒癰腫五倍子炒白芨白蘞俱炙白芷焙韶粉各一兩黃柏七錢炒乳香末藥俱令研大黃炒黃丹各五錢雄黃三錢另研共為細末蜜水調搽同上凡痘毒生在要處恐致帶疾令其母嚼爛生黃豆厚敷之即消圖經滅瘢散小兒痘瘡才愈毒氣尚未全散瘡痂難落其瘢猶黯或凹或凸當用韶粉一兩輕粉一字和勻研煉豬脂油調膏塗之求嗣秘書疹隱不出觀音柳五錢煎湯去渣候半溫用芫荽醮擦即出神效無比洗時忌塗頭面又忌夜間洗蓋疹晝發而夜斂也痘疹約言疹發不出頭臉腫脹氣喘命在須臾者大蔥頭連須搗爛放在大銅盆內上用木架架之再用大被單罩蓋停留大人抱定小兒睡在上面然後將滾水衝入蔥盆內熱氣蒸熏俟稍溫即抱出切不可露一絲之風直待汗乾即全愈矣奇方類編十種隱疹石灰研極細末和醋漿水塗疹上痘科選粹一切風疹水煮芒硝湯拭之梅師方風疹百治不效白礬末五兩酒三盒童溺一升煎如稀糊以綿蘸於上輕輕揩之蔡氏秘寶痧疹咽喉腫痛不拘初起回後苦參三錢白僵二錢共研細末吹入孟氏幼科疹痧瘄麻不出酒煎胡荽數沸勿令泄氣候冷去滓微微從項以下噴身令遍除頭面勿噴蓋覆令暖即出陶氏別菉悶痧分開頂門有紅筋紅瘰挑破即出保赤良方痧後鼻中出血不止韭菜煎湯乘熱熏鼻即止袖珍方痧後口瘡牙疳人中白五錢煅寒水石三錢井水飛細殭蠶一錢飛青黛二分冰片一分共為細末先以苦茶拭口隨搽此藥富貴之家加牛黃二分研入其效更速孟氏直言凡出痧痘服藥者引子戒用筍尖荔枝殼櫻桃核等物記之慎之本草綱目風癍痧子鹽蒲包燒灰泡湯洗擦患處三四次愈新集良方癍痘入目雞蛋殼燒研入片腦少許點之鴻飛集癍疹生翳硃砂一錢粉霜八分為末少許傾入耳內同上一方用黃丹輕粉各等分為末吹少許入耳內左患吹右耳內右患吹左耳內翳自退衛生備要赤癍如瘡瘙癢甚則殺人羚羊角磨水摩之數百遍為妙肘後方癍爛黃連黃柏五倍子地骨皮甘草各等分共研為末乾摻之傳心菉消癍化毒凡面目身體生癍或癢或𧏿子起腫不治能害人羚羊角燒灰研細以雞子清或水和塗極效濟生方一方用蠶沙煎湯洗亦妙楊氏家藏方痘疹禁忌一忌外來生人僧道尼姑不潔婦人孝服人疾病人俱不可令其輒入房內一忌食冷水瓜果梅桃魚蜆諸鮮物炙爆物酸辣毒物作燥之物一忌食豬羊雞兔野味異味鹽醋五辛等物四十九日之後無忌一忌糍餅糯粽黏膩堅韌難化諸物俱不可與食一忌不可過飽過暖亦不可受寒受客熱一忌臥處切忌幽暗切忌有壁風一忌掃房屋致塵灰飛撲一忌不可動溝渠啟溷廁出糞澆糞俱傳家寶痘疹防觸臭氣十四房中淫液氣婦女經血氣孤臭漏腋氣酒醉葷腥氣微爛蒸濕氣潑糞淋尿氣烹煎油膩氣一切臊穢氣蚊煙毒藥氣蔥蒜韭薤五辛氣硫黃火炮火藥氣誤燒油發鳥獸皮毛氣炒制一切藥味氣遠行染帶一切汗雜氣焚燒腦麝諸香氣凡此臭氣有觸犯者立見變異慎之慎之出痘之家必須預防其患多用胡荽搗汁和酒各處噴之門戶牆壁幃帳床榻皆令噴過甚能闢臭氣保幼者不可不留心也醫鏡參痘疹全書孩瘡胎瘡滿頭用水邊烏桕樹根曬研入雄黃末少許生油調搽嬰孩寶鑑胎癬小兒頭生瘡手爬處即延生謂之胎癬先以蔥鹽湯洗淨用桑木蛀屑燒存性入輕粉等分油和敷之廣利方胎癩瘡先用豬膽汁浴淨再用宮粉調塗碗內曬乾用艾熏至老黃色取下為末絹袋撲之種福堂方白禿癩瘡雄黃百草霜各一兩膽礬六錢榆樹皮三錢輕粉一錢用石灰窯內燒紅流結土渣四兩共為細末豬膽汁調剃頭後搽擦並用神方也同上黃水瘡不論小兒頭面遍身俱有水流濕處即生用鉛粉不拘多少研細並華水濃調糊干大碗內將艾水熏煙覆碗內鉛粉熏至綠色為度取下研細瘡濕者干搽乾者用麻油調搽同上頭上黃水瘡及禿痂黃丹一兩水飛無名異宮粉各一錢俱炒輕粉三分炒片松香二兩為末入蔥管內用線扎定水煮融化去蔥候乾共為細末香油調搽神效同上𤺪疒貢頭一作蟺拱又作鱔考取多年桕油入銅杓內熬滾去渣再入銅綠生礬燕窠泥調勻搽同上一方用屋內倒掛煙塵豬膽汁調敷便易良方一方用皮底舊鞋一隻去泥淨燒存性研末菜油調敷其膿自出屢試有效單方全集頭瘡晝開出膿夜即復合用鯽魚長四寸一尾去腸大附子一杭去皮研末填入炙焦研敷搗蒜封之效聖惠方禿瘡大鯽魚一尾去腸入亂髮填滿燒研入雄黃末二錢先以齏水洗拭生油調搽危氏得效方熱癤釜下土生椒末各等分醋和塗之千金翼一方用井底泥敷其四周談野翁方頭上熱癤發麵一塊調稀貼癤上中留一孔神效奇方類編熱丹寒水石五錢白土一分共為末新水調塗錢乙小兒方燥瘡燒鐵淬水中二七遍浴之二三起作漿子母秘菉面瘡焮赤腫痛地榆八兩水一斗煎五升溫洗之衛生備要眉瘡豬頸骨髓六七枚白膠香二錢同入銅器熬稠待冷為末麻油調塗小品方眉癬小兒眉毛眼睫因癬退不生用旋覆花天麻苗防風各等分為末洗淨以油調塗之總微方眉練癬瘡蛇床子杵末和豬脂塗之千金翼眉練疥癬松香二兩蛤粉五錢青黛二錢燭油調塗經驗廣集吻瘡經年欲腐者葵根燒研敷之聖濟方蓐瘡小兒百日內生瘡名日蓐瘡用葵根燒末敷之秘方摘要蜘蛛瘡生頸上蛇丹瘡生腰上多生於夏秋之間雄黃末調熟豬油多敷瘡上以愈為度孟氏幼科天泡瘡井底泥調滑石末敷之即愈同上一方用蓮蓬殼燒存性研末井底泥調塗神效海上方骨瘡小兒骨痛不堪言出血流膿實可憐尋取水蛇皮一個燒灰油抹敷疼邊同上蟲瘡用舊絹作衣化桕油塗之與兒穿著次日蟲皆出油上取下焚之有聲是也別以油衣與穿蟲盡為度瀕湖集簡方濕瘡地榆煮濃汁日洗三次蘇沈良方肥瘡琵琶鯽魚七個放瓦上焙乾為末菜油調敷數次愈十藥神書甜瘡大棗去核填入綠礬燒存性研貼之拔萃方惡瘡皂莢水洗拭乾以麻油少許搗爛塗之本事方爛瘡成孔小兒頭面遍身形似楊梅瘡者用糯米甑上氣水滴下以瓷器盛取搽之數日可以即愈毛氏傳方一二三歲遍身生瘡真麻油浸紫菜一錢搽之搽好一處再搽一處起先勿便周身搽之活幼心書身起白泡小兒背上起白泡累如珠綴一二日即破膿水外流癢甚一處方好一處又起用如意草搗爛敷之以長手巾縛定一夜而安奇方類編附敗草散蓋牆爛稻草多經雨露霜雪受天地陰陽之氣善解瘡毒神效莫測不拘多少取來曬乾焙為細末擇淨篩摻之若渾身瘡破膿水不絕黏黏衣裳難以坐臥可用二三升攤於席上令兒坐臥其功效不能盡述蓋屋者亦可經驗秘方
