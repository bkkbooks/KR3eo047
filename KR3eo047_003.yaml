body:
  text: 卷三急症五絶通治神丹五絶者縊死溺死凍死魘死壓死也皆用半夏研細末冷水和丸如小豆大塞鼻中並燥末吹耳內心溫者死一日猶可活此扁鵲法奈人不曉因氣絶多不救惜哉又急幹人中穴及兩足大指甲離甲一韭菜葉各灸三五壯即活採感應篇後縊死救法凡縊死從早至夜雖冷猶可救從夜至早稍難若心下溫一日以上亦可救切勿將繩割斷解下之後上下安被臥之先刺雞冠血滴入口中男雌女雄再用生半夏末或皂角末吹入鼻內以通其氣令一人揉其項捻正喉嚨按摩胸腹一人對坐於前用腳裹衣抵住糞門勿令泄氣泄氣即死一人摩擦臂足屈伸之若已僵但漸漸強屈之又按其腹如此一飯久即氣從口出得呼吸眼開蘇醒後更用蘆管四個每個取梁上塵灰如豆大放筒內即將四蘆管對死人耳鼻用四人各執一個著力吹入無不活者節録各醫書所載又法用老鵝一隻將香油抹鵝嘴插入糞門內一二時自活若過十三時則不救矣洗冤菉自縊垂死蔥心刺耳鼻中有血出即蘇本草綱目附杜絶後患法急於懸縊之地用大石鎮壓於所鎮四面深為挖掘將所鎮土中層層拔視或三五寸或二三尺定有如雞骨等類之物取出焚化可絶將來之患稍遲則入地日深此處常有縊死人矣屢試屢驗實非幻妄甘肅劉撫軍刊以救世者也溺死救法凡溺水惟冬寒難救余月心頭暖者俱易救撈起時切不可倒控急將口撬開橫銜箸一隻使可出水再將溺人橫伏牛背牽引徐行腹中水從口中並大小便流出即活若居城市無牛可用闊橙一條橙上加綿被疊起被下安綿枕中高旁低如牛背式樣抬溺人橫伏於上橙不可放穩墊虛一橙腳令一人常常將橙搖動水控去亦活春夏秋俱用此法冬寒溺水切不可就用火烘火逼寒氣入內則不能救矣急將濕衣解去為之更換一面炒鹽用布尉臍一面厚鋪被褥取灶內熱灰多多鋪在被上中安綿枕將溺人伏臥枕上仍以灰從頭至足厚堆只留口鼻在外出水灰上再加被褥不可令灰冷蓋灰性暖而能拔水凡蠅溺水以灰埋之少頃即活此明驗也同上節録各醫書又法炒白沙覆死人面上下惟露七孔冷濕即易千金方水溺卒死一宿者尚可救用紙裹皂莢末納下部須臾出水即活外臺祕要縊溺並救人死而心頭尚暖者用艾灸臍中數十壯即活如未蘇連灸至百餘壯無不活也切不可中止極驗同壽菉凍死救法凡凍將死者急用大鍋炒暖灰盛囊中尉心上冷即換之若不先溫其心便以火烘則冷氣與火爭必死至落水凍死之人四肢直口噤有微氣者急脫去濕衣解生人現穿身上熱綿衣裹之再用氈單或蒿薦將凍死人卷在內以索系定放在平穩處令二人對面輕輕滾轉往來如氈捍法候四肢溫即活同上節録各醫書又冬月溺水及被凍極之人雖纖毫人事不知但胸前有微溫皆可救倘或微笑必為急掩其口鼻如不掩致笑而不止不可救矣切不可驟令近火恐一見火則必大笑不可救藥洗冤菉魘死救法魘死不可用燈火照並不宜近前急喚但痛咬其足跟及足大拇趾頻頻呼其名唾其面不蘇略移動臥處徐徐喚之少蘇以皂角末吹入鼻中取嚏夜間魘者原有燈即存燈無燈切不可點照救急方又法取烏骨雞血滴口中即活日華本草好魘多夢燒尸場上灰置枕中履中自止本草拾遺惡夢常魘臥時以鞋一仰一覆則無魘及惡夢起居雜忌闢禳魘魔以雄黃戴頭上或以棗許系左腋下終身不魘本草類方壓死救法猝壓傷重之人口耳出血一時昏暈但視面色尚有生氣身體尚為綿軟則皆可救切不可多人環繞嘈雜驚慌致令驚魂不復急令親人呼而扶之坐於地上先拳其兩手兩足緊為抱定少頃再輕移於相呼之人杯中以膝抵其穀道不令泄氣若稍有知覺即移於素所寢處將室內窗櫺遮閉令暗仍拳手足緊抱不可令臥急用淨土五升蒸熱以舊布重裹作二包輪流不住尉燙胸前及傷處無不活者洗冤菉壓倒打死心頭溫暖者雖經日亦可救先將死人盤屈在地上如僧打坐狀令一人將其頭髮仰後放低再以膝頂其屁眼使不泄氣用半夏末吹入鼻中如活即以生薑汁真麻油攪勻灌之或急解去衣用艾灸臍中如出血不止取頂好降香刮末摻上血沖欲死切忌吃冷水急救良方壓傷垂斃杭城項姓因修屋倒塌被壓垂死者十二人用金瘡鐵扇散末藥敷傷處一扇搧之一日而愈海昌沈氏醫案附金瘡鐵扇散方象皮五錢切薄片用小鍋焙黃色以干為度勿令焦龍骨五錢用上白者生研老材香一兩山陝等省無漆民間棺殮俱用松香黃蠟塗於棺內數十年後有遷葬者棺朽另易新棺其朽棺內之香蠟即謂之老材香東南各省無老材香即以數百年陳石灰一兩代之其效與老材香同寸柏香一兩即松香中之黑色者松香一兩與寸柏香一同熔化攪勻傾入冷水取出晾乾飛礬一兩將白礬入鍋內熬透便是以上六味共為細末貯瓷瓶中遇有跌壓刀石一切破傷者用藥敷傷口以扇向傷處搧之立愈忌臥熱處如傷處發腫煎黃連水用翎毛蘸塗之即消夏氏山右傳來自刎自刎救法自刎者迅速之症須救在早遲則額冷氣絶必難救矣初刎時氣未絶身未冷急用活雞一二隻扯下熱雞皮冷則無用將線縫刀口周圍纏護用軟絹帛並棉花扎之外將女人舊布裹腳周圍再纏五六轉勿使泄氣其中自然合一令刎者仰臥以高枕枕腦後使頭鬱而不直刀口不開三日後解去前藥用桃花散摻刀口或玉紅丹敷患處外用生肌長肉大膏藥貼之仍以絹帛圍裹針線縫緊候其肉長收功江蘇胡臬臺刊傳方附桃花散方石灰二升大黃四兩切片同炒候石灰變紅色檢去大黃篩極細末收貯瓶內過月餘去火氣然後應用玉紅丹方黃丹二錢炒白龍骨二錢煅石膏三錢煅共研細末貯瓶聽用生肌長肉膏藥當歸黃耆山慈菰白芷甘草血餘天麻獨活穿山甲露蜂房五倍子天花粉荊芥金銀花白蘞肉桂牛蒡子白芍各一兩淨麻油三斤如法熬去渣入飛過黃丹一斤半收之再入白占黃占血竭銅緑各二兩待冷再入輕粉乳香沒藥各去油龍骨煅象皮炒樟腦兒茶赤白脂各一兩麝香五釐冰片二錢各製為末和入攪勻瓷瓶收貯待用用刀自刎一人因角口用刀自刎傷長二寸余食嗓半斷傷口冒血痛甚在地滾跌不能敷藥因縛其手足令臥涼地用枕墊其首使傷口漸合即敷鐵扇散搧之少頃血凝半日後湯飲如常三日而愈金瘡鐵扇散醫案剃刀自刎一人因角口忿激用剃刀自刎食喉半斷喘氣傷口俱有血泡蓋喉間之氣已傷於傷口也用散藥敷之搧少頃血即凝兩日全愈同上一切暴死暴死燒炭一爐以陳醋頻澆火上令鼻聞之即活或韭菜汁灌鼻亦可奇方類編卒死用雄雞冠血塗面上干則再塗仍吹入鼻中並以灰營死人一周時魏夫人內傳無故忽死凡人無病或坐臥或酒後無故忽死者名旺痧將本人口撬音轎開以銀簪刺舌下小青筋血出即活不可刺正中宜良李氏刊方一方用悶醋灌下少許即活同上卒死脈動無氣用菖蒲屑末納耳鼻孔中吹之及著舌底簡易良方卒死心頭尚熱用井底泥塗目畢令人垂頭於井呼其姓名便起集效方卒死口張反折灸兩手足大指甲後各十四壯曹氏經驗方卒死不省人事兼治中有死産後昏暈死皆效取生薑半夏為末每用一豆許吹入鼻內得嚏則氣通而蘇或用皂角末吹之亦好祕方菉中惡卒死或先病或平居寢臥奄忽而死皆是中惡用蔥刺入耳中五寸以鼻中血出即活也如無血出即不可治矣相傳此是扁鵲祕方南陽活人書一方取蔥心黃刺入鼻孔中男左女右入七八寸鼻目血出即蘇崔氏纂要中惡卒死壯熱礬石八兩水一斗半煎湯浸腳及踝即得蘇也肘後方中惡客忤項強欲死兼治兒科麝香少許乳汁塗口中取效醋調亦可貞元廣利方燒酒醉死急以新汲水浸其發又以青布浸濕貼胸背仍以鹽調井水細細灌之至蘇乃已李瀕湖方一方心頭熱者用熱豆腐細切片遍身貼之如冷即更換之蘇省乃止李時珍方一切暴中諸凡卒中牙關不開不能進藥者用烏梅肉揉南星細辛末以中指蘸擦牙關自開衛生備要卒中仆地不語皂夾末少許吹入鼻內自蘇百一方卒中昏倒牙關緊閉涎潮壅塞不省人事急以大指掐人中候醒或用半夏末或用皂角細辛菖蒲為末吹入鼻中取嚏如口噤不開以白鹽梅蘸殭蠶擦之待其少醒然後延醫調治單方全集卒中風邪藥不能入口者防風黃耆各等分煮湯令沸盆盛病人榻下關閉門戶令藥氣熏蒸口鼻蓋以無形之氣透開有形之竅也許叔微方卒中邪魔雄黃末吹鼻中即蘇本草類方卒中五尸其狀腹痛脹急不得氣息上衝心胸旁功兩脅或硬礌湧起或牽引腰脊此乃身中尸鬼接引為害取屋上四角茅入銅器中以三尺帛覆腹著器布上燒茅令熱隨痛追逐足下癢即瘥也肘後方中風通頂散病人初中風昏憒不省人事口噤不能開者急用人參藜蘆甘草生川芎細辛各一錢石膏五分共為末吹鼻中一刻就提起頭頂心發立蘇有嚏者可治無嚏者不可治乾坤生意暗風卒倒不省人事細辛末吹入鼻中危氏得效方中惡風惡水而肉腫者取桑根下土水和敷上灸二三十壯熱氣透入即平拾遺中風痰厥喉痹不醒一切急病取燈盞內油或燈窩內油掃入喉內取吐即醒同壽菉中風痰厥氣厥中惡喉痹一切急病咽喉不利牙關緊閉者用巴豆研爛綿紙包壓取油紙作捻點煙熏鼻中或用熱煙刺入喉內即時涎出或出惡血即蘇此祕方也同上中風痰壅用此吐痰江子仁六粒豬牙皂三錢切片明礬一兩先將礬化開入二味和勻待礬枯為末每用一字吹鼻內則涎流口開若痰涎塞喉者以五分燈心湯調灌探吐一方無江子仁證治匯補中風咬牙無門下藥南星五分龍腦二分半為末頻揩左右兩旁大牙令牙熱自開然後用藥五月五日午時合者佳同上中風口喎新石灰醋調如泥塗之左喎塗右右喎塗左立便牽正寇氏衍義口眼喎斜用鱔魚一條以針刺頭上血左喎塗右右喎塗左如平正即洗去鱔魚放之則不發萬病回春一方用皂角五兩去皮子為末以陳醋和之左喎塗右手心右喎塗左手心以暖水一盞安向手心須臾便止即洗去藥並抽掣中指醫鏡身體麻木芥菜子研末醋調塗之濟生祕覽年久癱瘓並筋骨疼痛槐枝桃枝柳枝椿枝楮枝一方換柘枝茄皮蘄艾合煎水三桶大盆浸洗如冷又添熱水以被蓋出汗避風未愈再洗幾次神效奇方類編針刺法中風無汗惡寒宜針至陰出血穴在足小趾外側爪甲角針二分崑崙舉蹺穴在足外踝後跟骨針透太溪中風有汗惡風宜針風府穴在項後入發一寸針入三分禁炙已上二症皆太陽經中風也中風有汗身熱不惡寒中風有汗身熱不惡風宜針陷谷穴在足大趾次趾本節後陷中針入五分去陽明之賊兼刺厲兌穴在足瀉陽明之實已上二症皆陽明經中風也中風無汗身涼宜針隱白穴在足大趾內爪甲角去太陰之賊此太陰經中風也中風有汗無熱宜針太溪穴在足內踝後跟骨上陷中刺透崑崙此少陰經中風也中風六經混淆系之於少陽厥陰或肢節攣痛或麻木不仁少陽之經絶骨穴在外踝上三寸灸五壯灸以引其熱厥陰之井大敦穴在足大趾甲聚毛間刺以通其經俱明醫指掌分陰陽法凡治中風須分陰陽陰中者其色青或黑或白痰喘昏迷眩冒多汗甚者手足厥冷陽中者面赤唇焦牙關緊急上視強直掉眩煩渴病機沙篆中寒急救法用硫黃麝香末填臍中放蔥餅於上以尉斗盛火尉之蔥爛再易得暖氣入腹漸醒為度或以灰炒暖盛囊中尉心頭冷即易數次後若眼開始進酒漿或米湯如不醒以艾灸門牙縫候喊聲出即可救矣若不先溫其心即用火烘冷與火搏必死瀕湖集簡方溫臍法用麝香半夏皂莢末一匙填臍中將生薑切薄片貼之放大艾火於薑片上蒸灸三七壯灸關元氣海二十壯熱通於中逼寒出外手足溫暖則生明醫指掌中寒無汗芥菜子研末水調填臍內以熱物隔衣尉之取汗出妙簡便單方中寒腹痛並絞腸痧胡椒七粒以布一層包裹不拘自己或他人嚼碎納臍內隨以膏藥貼上再以熱手按之蓋被而臥少頃腹中作熱或有汗出則寒氣散而痛自愈矣聖濟總菉事後中寒腹痛凡房事後中寒腹痛甚者以蔥白頭搗爛攤臍上以艾灸之或尉之得鼻尖有汗其痛立止活人書中暑中暑不省人事急取灶內微熱灰壅之復以稍熱水蘸手巾尉腸脅間良久即蘇切不可便與冷物吃急救方中暑昏眩煩悶欲絶取田中干泥做一圈堆在病人肚上使少壯人撒尿於泥圈肚臍中片時即得生矣蘇後切不可飲冷水及臥濕地得冷即死種福堂方中暑大小便不通田螺三枚搗爛入青鹽三分攤成膏貼在臍下一寸即通同上絞腸痧絞腸痧者暑郁中焦腹痛連心上下攻絞不得吐瀉或手足皆冷乃腸絞縮腹須臾殺人急用生熟水調白礬三錢少頃探吐去其暑毒即安或刺委中穴及指爪甲令出血如胸背四肢發紅點者以菜油燈火遍焠之證治匯補旅途中暑卒倒不省或稍省而不能運動者當即時扶入陰涼干處以布巾衣服等蘸熱湯覆臍下及丹田之上續以湯淋布帛上令徹臍腹但暖則漸蘇也如倉卒無湯處掬道上熱土於臍間以多為貴冷則頻換或道途無湯處即掬熱土於臍上仍撥開作孔令衆人遺尿其中以代熱湯亦可取效多能鄙事中暑忽然不省人事宜灸百會中脘三里脾俞合谷人中陰谷三陰交斟酌用或針亦可刺灸要訣冒暑大熱霍亂吐瀉百勞委中合谷曲池三里十宣等穴酌選針灸同上中熱僵仆不醒切勿移冷地寒氣一逼即死須安置於近日暖處取路上淨熱土捏圓圈圍臍上令溺圈內或將日曬熱瓦尉其人心腹及臍下氣通則醒嚴用和濟生方中濕濕痛糯米一升煮爛飯將白酒藥六七丸搗入飯內敷痛處外用紙布裹二日愈傳家寶風寒濕痛人腿背各處患風寒濕氣徹骨疼痛藥餌難治可於夏伏天用槽坊內蒸酒的槽下鍋燒熱將布包兩包在痛處熱灸冷即更換令寒濕盡出即愈同上風濕臂痛秦艽一錢防風歸全各二錢木瓜豨蘞草海風藤白茄根各三錢麻黃五錢酒二斤沙罐內煎四五滾在臂上熏洗每日二次不可怠略錢青掄云家慈嘗患此病親試立效後治他人無不響應經驗單方風濕走痛牛皮膠一兩同薑汁半杯化成膏攤紙上熱貼之冷即易甚效一方加乳香沒藥一錢筆峰雜興風濕膝痛腳氣風濕虛汗少力多痛及陰汗燒礬末一匙頭投沸湯淋洗痛處御藥院方腿膝濕痛用燒酒糟一桶炒熱厚堆患處冷即換熱轉五六次拔出寒濕氣除根初虞世必效方寒濕疼痛廣膠四兩同生薑汁半碗米醋一盞熬成膏入肉桂花椒牙皂川烏草烏末各五六錢麝香一錢攪和攤於紵絲上先以生薑擦患處烘熱貼上甚效醫學正傳筋骨疼痛猩紅三錢枯礬四錢為末作三紙捻每旦以一捻蘸油點火熏臍被覆臥之取汗簡要濟衆方渾身骨痛破草鞋燒灰香油和貼痛處即止本草綱目皮里作痛不問何處用何首烏末薑汁調成膏塗之以帛裹住火炙鞋底尉之集效方濕痰腫痛水紅花蘿蔔莢白金鳳花水龍骨花椒槐岑蒼朮金銀花甘草各等分煎熏患處水稍溫即洗之其效如神單方彙編寒濕痹痛麻木不仁川烏草烏蓽茇甘松山奈各五錢共為末炒熱布包尉痛處神效種福堂方尉背法治胸背疼痛而悶因風寒濕而起者肉桂心附子羌活烏頭細辛川椒各一錢五分川芎一錢共為細末以帛包之微火炙令暖以尉背上取瘥止同上麩蒸法治風寒濕傷於足膝小麥麩四五升蔥三大莖川椒鹽各一撮酒醋拌勻至潤為度共放銅器內炒令極熱將所患腿腳熏蒸其上蓋以衣被多蒸汗出勻遍待一兩個時辰覺汗稍解勿令見風立效經驗廣集良方中毒中漆毒一州牧以生漆塗囚眼囚即盲適一村臾見而憐之語囚曰汝急尋蟹搗碎取汁滴眼內漆當隨汁流散囚如其言覓得一小蟹用之目睛果愈略無損景嶽全書中水銀毒水銀誤入末藥中肌肉能損筋骨以金器磨之金器白則愈宜良李氏刊方中碗絲毒飲食偶因碗邊有絲服之不知頃刻喉嚨痛脹用麻秸點著以口如用煙袋狀吸其煙即解同上中藥箭毒雄黃末敷之沸汗出愈外臺祕要姚僧坦云藥箭有三種交廣夷人用焦銅作箭鏃嶺北諸處以蛇毒螫物汁著筒中漬箭鏃此二種才傷皮內便洪濃沸爛而死若中之即飲糞汁並塗之最妙又一種用射罔煎塗箭鏃亦宜此方集驗良方中煤熏毒一時運倒不省人事用蘿蔔搗汁灌口鼻移向風吹便能醒唐瑤經驗方胡季堂云中煤毒土坑漏火氣而臭穢者人受熏蒸不覺自斃其尸軟而傷與夜臥夢魘不能復覺者相似房中置水一盆並使窗戶有透氣處則煤炭雖臭不能為害矣急救方中輕粉毒貫衆黃連各五錢水煎入冰片少許時時漱之陸氏積德堂方一方陳醬油化水頻漱之集簡方中蜀椒毒用雞毛燒煙吸之即愈千金方中水毒初得惡寒頭目微痛日輕暮劇手足逆冷三日則蟲蝕下部六七日食至五臟殺人搗藍青汁敷頭身令匝或搗蒲公英絞汁以綿染導其下部津臺路史一方用小蒜三升煮微熱若大熱即無力以浴身如身發赤斑紋者毋以他病治之也肘後方中沙蝨毒沙蝨在水中人澡浴則著人身鑽入皮里初得皮上正赤如小豆黍粟摩之痛如刺三日後寒熱發瘡毒若入骨殺人嶺南多此即以茅葉刮去以苦菜汁塗之佳同上中射工溪毒芥菜子研末和酒厚敷半日痛即止千金翼中蠼螋尿毒畫地作蠼螋形以刀細取腹中土塗二次即愈孫真人云豫得此疾經五六日不愈或教此法而瘳乃知萬物相感莫曉其由也同上一方如繞腰者敗醬煎汁塗之良楊氏産乳中蜈蚣毒舌脹出口是也刺雄雞冠血浸舌並咽之青囊雜纂附祛蜈蚣法凡人家多蜈蚣以頭髮常燒煙或床下或廚房聞之入土三尺奇方類編中蝸牛毒毒行遍身者蓼子煎湯浸之立愈但不可近陰令弱也陳藏器本草中螻蛄毒用醋和石灰塗之即愈聖惠方中蚯蚓毒形如大麻風鬚眉皆落即濃煎鹽湯浸身數次愈小兒受之鹽湯溫洗或鴨血塗之自愈單方摘要一方用石灰水浸之最妙邵真人經驗方中黃蠅毒烏蒙山峽多小黃蠅生毒鱗中齧人初無所覺漸瘠為瘡勿搔但以冷水沃之擦鹽少許即不為害方輿勝覽中金蠶毒雷丸三錢為末同白礬少許調勻倘見金蠶出見之時輒以末少許摻在蠶身之上立時化為紅水如血石室祕菉鐵圍山叢説云金蠶始蜀中延及湖廣閩粵浸多有人捨去謂之嫁金蠶率以黃金叉器綿緞置道中俾他得焉鬱林守為吾言嘗見福清縣有訟遭金蠶毒者縣官求治不得蹤或獻謀取兩刺蝟入捕必獲矣蓋金蠶畏蝟蝟入其家金蠶則不敢動惟匿榻下磚罅果為兩蝟擒出之亦可驗也近來此風少息然南寧蠻洞中尚有其毒識此以備客遊之助端素齋雜綴中諸蠱毒下血如雞肝晝夜不絶臟腑敗壞待死者以蘘荷葉置病人席下勿令病人知必自呼蠱主姓名也梅師方附蠱毒説蠱毒中土少見之世傳滇粵深山之人於端午日以毒蛇蜈蚣蝦蟆同器盛之任其互相吞食俟一物服存者則以為蠱又謂之桃生凡欲害人密置其蠱於飲食中人中其毒必心腹疴痛如有蟲齧吐下皆如爛絮若不急治食人五臟而死亦有十餘日而死更有緩者待以歲月氣血羸憊食盡五臟而後死景嶽全書附驗蠱毒法無論年代近遠但煮一鴨卵插銀叉於內並含之約一食頃取視叉卵俱黑即是中蠱毒也奇方纂要附預防中蠱法凡入有蠱之鄉所用飲食但以犀角攪試有毒者白沫竦起無沫即無毒也楊氏南行方附反蠱及主法凡入蠱鄉見人家門限屋梁絶無灰塵潔淨者其家必蓄蠱當用心防之如不得已吃其飲食即潛於初下箸時收藏一片在手盡吃不妨少頃卻將手藏之物潛埋於人行十字路下則蠱神反於本家作鬧蠱主必反來懇求或食時讓主先動箸或明問主人云莫有蠱麼以箸築桌而後食如是則蠱皆不能為害此皆驗於蠱鄉云衛生寶鑑剝馬中毒破骨刺破欲死者以馬腸中粟屎搗敷以尿洗之大效本草綱目食馬肉中毒搗蘆根汁作湯浴之即解簡易良方小兒中馬毒客忤燒馬尾煙於前每日熏之瘥乃止聖惠方誤吞針鐵誤吞針雙杏仁搗爛以豬脂調貼其針自出敬修齋方誤吞針鐵真磁石如棗核大鑽一孔線穿吞拽之立出篋中方諸物鯁咽骨鯁在咽栗子肉上皮五錢為末乳香二錢半鮎魚肝一個同搗丸如梧子大看鯁遠近以線系綿裹一丸水潤吞之提線鉤出也聖濟總菉一方用栗子內薄皮燒存性研末吹入咽中即下神效乾坤生意諸骨鯁塞五日午時韭畦中向東勿語取六一泥即蚯蚓糞收之每遇骨鯁用少許擦咽喉外其骨自消乾坤祕韞一方用獺爪於咽喉外爬之即下便易良方雞骨鯁打死活雞一隻取出雞內金洗淨燈草裹於火上燒存性竹筒吹入喉內即消不可食肉撮生方一方用五倍子末摻入喉中即化下海上方諸獸骨鯁以桑木上蟲屑末醋煎灌漱自下同壽菉一方用皂角末吹入鼻中令嚏即出聖惠方豬骨鯁象牙刮末浮於新汲水上吸之奇方類編魚骨鯁將魚刺一根暗插在他頭上勿説破自下同上一方鯁至六七日不出用琥珀珠一串推入鯁所牽引之即出外臺祕要魚刺骨或棗核擱在咽喉不上下者用活雞一隻不必殺就於肚下生取出腸去汙物不可見水用尺長弓弦一條雙套入腸內看骨核在左右將腸撥動即黏在腸上出再用血竭為末吹入患處但不可就食熱物録竹堂方木屑搶喉用鐵斧磨水灌之即愈百一選方喉中物鯁用生鰍魚線縛其頭以尾先入喉中牽拽出之普濟方桃李鯁咽用狗骨煮湯摩頭上及喉即安子母祕菉
